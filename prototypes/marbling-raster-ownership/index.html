<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Raster Ownership Marbling Prototype</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #efe4cf;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      touch-action: none;
    }
    canvas {
      display: block;
      touch-action: none;
    }
  </style>
</head>
<body>
<script>
/*
  Prototype shell and p5 lifecycle.
  Purpose: owns the standalone browser entry point, full-screen p5 canvas, paper surface,
  grain texture layer, and tiny hint rendering for the raster ownership marbling demo.
  State ownership: this initial shell owns only palette choice and paper texture state;
  later simulation modules will own grid/drop/input state while draw() coordinates them.
  Dependencies/connections: p5.js 1.11.3 from CDN, no build tooling or app integration.
  Performance assumptions: pixelDensity(1), cached grain layer, and no work while idle.
*/
p5.disableFriendlyErrors = true;

const PALETTES = [
  {
    name: 'traditional marbling',
    surface: '#efe4cf',
    grain: '#b49a72',
    ink: '#342519'
  }
];

let currentPaletteIndex = 0;
let paperLayer;
let dirty = true;

function setup() {
  pixelDensity(1);
  createCanvas(windowWidth, windowHeight);
  createPaperLayer();
  dirty = true;
}

function draw() {
  if (!dirty) return;
  renderScene();
  dirty = false;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  createPaperLayer();
  dirty = true;
}

function keyPressed() {
  if (key === 'r' || key === 'R' || keyCode === ESCAPE) {
    dirty = true;
  }
}

function createPaperLayer() {
  const palette = PALETTES[currentPaletteIndex];
  paperLayer = createGraphics(width, height);
  paperLayer.pixelDensity(1);
  paperLayer.background(palette.surface);
  paperLayer.noStroke();
  for (let i = 0; i < Math.floor(width * height * 0.0025); i++) {
    const alpha = random(5, 20);
    paperLayer.fill(red(color(palette.grain)), green(color(palette.grain)), blue(color(palette.grain)), alpha);
    paperLayer.circle(random(width), random(height), random(0.4, 1.7));
  }
}

function renderScene() {
  image(paperLayer, 0, 0, width, height);
  drawHints();
}

function drawHints() {
  const palette = PALETTES[currentPaletteIndex];
  noStroke();
  fill(52, 37, 25, 122);
  textSize(11);
  textFont('ui-monospace, SFMono-Regular, Menlo, Consolas, monospace');
  textAlign(LEFT, BOTTOM);
  text(`hold to drop · P palette · R reset · ${palette.name}`, 12, height - 12);
}
</script>
</body>
</html>
