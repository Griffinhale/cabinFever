            // previewPushX/Y is a transient push from the in-progress press
            // (added on top of displaceTargetX during the lerp); cleared on
            // commit (folded into displaceTargetX) or on cancel.
            displaceX: 0,
            displaceY: 0,
            displaceTargetX: 0,
            displaceTargetY: 0,
            previewPushX: 0,
            previewPushY: 0,
            isSatellite: false
          });
        }
        this.deformScalar = 0;
      }

      // D2 — generate interior sub-metaballs. Their offsets are sampled inside
      // the pool's effective radius; their `intensity` (∈ [-1, 1]) encodes
      // which way they tint pigment (negative → toward rim, positive → toward
      // wash). Stored in pool-local coords; renderer transforms to screen.
      makeInnerLobes() {
        randomSeed(floor(this.seed) ^ 0x5a17);
        const baseRadius = sqrt(this.targetMass / PI);
        const count = floor(lerp(INNER_LOBE_MIN, INNER_LOBE_MAX + 0.99,
          constrain(this.targetMass / 18000, 0, 1)));
        for (let i = 0; i < count; i++) {
          const angle = random(0, TWO_PI);
          const offset = random(0, baseRadius * 0.62);
          this.innerLobes.push({
            dx: cos(angle) * offset,
            dy: sin(angle) * offset,
            radius: random(baseRadius * 0.18, baseRadius * 0.42),
            intensity: random(-0.95, 0.95)
          });
        }
      }

      // Roundness envelope. For each non-satellite lobe, scan other pools and
      // record the maximum (alignment * proximity) — alignment is the dot of
      // the lobe's outward unit vector with the unit vector toward the
      // neighbor's center; proximity is 1 at touching, 0 at the engagement
      // range edge. The result is a 0..1 contactT per lobe, smoothed with
      // CONTACT_LERP unless forceInit is true (used on creation/commit so the
      // new pool's deformation is visible immediately). Sets this.deformScalar
      // = max contactT, used by fieldAt to scale radial/tendril warp.
      refreshContactPressure(forceInit) {
        if (this.preview) return;
        const myR = Math.sqrt(this.targetMass / Math.PI);
        let maxContact = 0;
        for (const lobe of this.lobes) {
          if (lobe.isSatellite) continue;
          if (!lobe.baseOffsetTarget && lobe.baseOffsetTarget !== 0) {
            lobe.baseOffsetTarget = lobe.offsetTarget;
          }
          const lx = Math.cos(lobe.angle);
          const ly = Math.sin(lobe.angle);
          let pressure = 0;
          for (const other of pools) {
            if (other === this || other.preview) continue;
            const dx = other.center.x - this.center.x;
            const dy = other.center.y - this.center.y;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d < 0.5) continue;
            const otherR = Math.sqrt(other.targetMass / Math.PI);
            const range = (myR + otherR) * CONTACT_RANGE_FACTOR;
            if (d > range) continue;
            const ux = dx / d;
            const uy = dy / d;
            const align = lx * ux + ly * uy;
            if (align <= 0) continue;
            const proximity = 1 - d / range;
            const p = align * proximity;
            if (p > pressure) pressure = p;
          }
          if (forceInit) {
            lobe.contactT = pressure;
          } else {
            lobe.contactT += (pressure - lobe.contactT) * CONTACT_LERP;
          }
          lobe.offsetTarget = lobe.baseOffsetTarget *
            (BASE_ROUNDNESS + (1 - BASE_ROUNDNESS) * lobe.contactT);
          if (lobe.contactT > maxContact) maxContact = lobe.contactT;
        }
        this.deformScalar = maxContact;
      }

      // (removed) Comb's per-lobe scar follow. The comb is now a pixel
      // smudge that operates on pigmentLayer; lobes are no longer
      // touched by combing. See applyCombImpulse for the new flow.

      update() {
        if (this.preview) return false;
        // Comb tool — formerly applied per-lobe scar follow here. The
        // comb has been re-architected as a pixel smudge that writes
        // directly to pigmentLayer (see applyCombImpulse). It no longer
        // touches lobes, so this site is intentionally a no-op.
        // applyScarFollow is still defined for diagnostic poking but
        // is never called by the main loop.
        // Pools that are otherwise settled but still have un-played
        // displacement (a new drop pushed them) need to keep updating until
        // the lerp catches up. Compute once whether any lobe still owes a
        // displacement step.
        const hasPendingDisplacement = this.lobes.some(l =>
          Math.abs((l.displaceTargetX + l.previewPushX) - l.displaceX) > 0.05 ||
          Math.abs((l.displaceTargetY + l.previewPushY) - l.displaceY) > 0.05
        );
        if (this.settled && !hasPendingDisplacement) return false;
        // Refresh contact pressure each frame the pool is alive. Cheap
        // (O(pools * lobes)); contactT smoothly tracks neighbor presence so
        // the asymmetry envelope eases in/out as drops land or get dragged.
        this.refreshContactPressure(false);

        const previousRect = this.fieldRect;
        const before = this.currentMass;
        if (this.currentMass < this.targetMass) {
          this.currentMass = lerp(this.currentMass, this.targetMass, this.growthRate);
        }
        const progress = constrain(this.currentMass / this.targetMass, 0, 1);
        let moving = Math.abs(this.currentMass - before) > 0.2;
        // Interactive-tool snap-ramp — DISPLACEMENT_RAMP (0.085) gives a
        // soft, half-second drift that's right for drop-displacement
        // settling, but it makes rake/comb feel like the lobes are
        // wading through molasses (the cursor moves faster than the
        // lerp can ever catch up). While the user is driving a session,
        // bump the per-frame catch-up to a much larger fraction so the
        // tool reads as responsive. On release the lerp returns to the
        // soft ramp and ambient settling looks unchanged.
        const interactive = rakeSession || combSession;
        const displaceRamp = interactive ? 0.55 : DISPLACEMENT_RAMP;
        for (const lobe of this.lobes) {
          if (progress < 0.998) {
            const targetR = lobe.targetRadius * sqrt(progress);
            const nextR = lerp(lobe.radius, targetR, 0.045 * lobe.growthVariation);
            const nextOffset = lerp(lobe.offsetNow, lobe.offsetTarget, 0.032 * lobe.growthVariation);
            if (Math.abs(nextR - lobe.radius) > 0.05 || Math.abs(nextOffset - lobe.offsetNow) > 0.04) moving = true;
            lobe.radius = nextR;
            // Drift is only during growth; once settled these offsets freeze.
            const drift = (noise(this.seed * 0.001, lobe.phase, progress * 1.7) - 0.5) * 4 * (1 - progress);
            lobe.offsetNow = nextOffset + drift;
          }
          // D1 — displacement lerp. Always runs (even when growth is done) so
          // a settled pool can still play out a push from a new neighbour.
          // The lerp target combines the committed displaceTarget with the
          // (transient) previewPush so the user sees mid-press feedback.
          const tgtX = lobe.displaceTargetX + lobe.previewPushX;
          const tgtY = lobe.displaceTargetY + lobe.previewPushY;
          const dxRem = tgtX - lobe.displaceX;
          const dyRem = tgtY - lobe.displaceY;
          if (Math.abs(dxRem) > 0.05 || Math.abs(dyRem) > 0.05) {
            lobe.displaceX += dxRem * displaceRamp;
            lobe.displaceY += dyRem * displaceRamp;
            moving = true;
          }
        }
        if (progress >= SETTLE_EPSILON && !moving) this.settled = true;
        if (progress >= 0.998 && !hasPendingDisplacement) {
          this.currentMass = this.targetMass;
          for (const lobe of this.lobes) {
            lobe.radius = lobe.targetRadius;
            lobe.offsetNow = lobe.offsetTarget;
          }
          this.settled = true;
          moving = true;
        }
        this.updateGeometry();
        if (moving) {
          markDirtyRect(previousRect);
          markDirtyRect(this.fieldRect);
        }
        return moving;
      }

      updateGeometry() {
        const cellSize = quality.cellSize;
        this.sampleLobes = [];
        let x0 = Infinity;
        let y0 = Infinity;
        let x1 = -Infinity;
        let y1 = -Infinity;
        for (const lobe of this.lobes) {
          // D1 — displacement is added in screen coordinates after the
          // angular offset, so pools deform asymmetrically when neighbours
          // push them: lobes closer to the new drop get pushed harder, so
          // the pool stretches away.
          const lx = this.center.x + cos(lobe.angle) * lobe.offsetNow + lobe.displaceX;
          const ly = this.center.y + sin(lobe.angle) * lobe.offsetNow + lobe.displaceY;
          const influenceRadius = Math.max(8, lobe.radius * FIELD_INFLUENCE_FACTOR + 10);
          const warpRadius = lobe.radius * 0.18;
          // Per-lobe directional warp budget + global coord-space warp budget
          // + comb scar budget. Bounds must include all three so the culling
          // rect can never reject a sample that would have been displaced
          // into the lobe's footprint by any of the warp sources.
          const totalWarp = warpRadius + DOMAIN_WARP_PX + MAX_SCAR_PER_CELL;
          this.sampleLobes.push({
            x: lx,
            y: ly,
            radius: lobe.radius,
            radius2: lobe.radius * lobe.radius,
            influence2: (influenceRadius + totalWarp) * (influenceRadius + totalWarp),
            phase: lobe.phase,
            phaseCos: cos(lobe.phase),
            phaseSin: sin(lobe.phase)
          });
          x0 = Math.min(x0, lx - influenceRadius - totalWarp);
          y0 = Math.min(y0, ly - influenceRadius - totalWarp);
          x1 = Math.max(x1, lx + influenceRadius + totalWarp);
          y1 = Math.max(y1, ly + influenceRadius + totalWarp);
        }
        this.pixelBounds = { x0, y0, x1, y1 };
        this.fieldRect = clampRect({
          x0: floor(x0 / cellSize) - 1,
          y0: floor(y0 / cellSize) - 1,
          x1: ceil(x1 / cellSize) + 1,
          y1: ceil(y1 / cellSize) + 1
        });
      }

      containsPoint(x, y) {
        const b = this.pixelBounds;
        return !!b && x >= b.x0 && x <= b.x1 && y >= b.y0 && y <= b.y1;
      }

      fieldAt(x, y) {
        // R3 + D3 — coordinate-space domain warp, decomposed into radial and
        // tangential components relative to the pool center so the boundary
        // can finger outward instead of wobbling isotropically.
        //
        // 1. Sample two-channel Perlin noise to get a "raw" warp vector (wx, wy).
        // 2. Project (wx, wy) onto the radial unit (ur) and tangential unit
        //    (ut = perp(ur)). Boost radial, dampen tangential.
        // 3. Add a coarser tendril noise (lower frequency, smaller amplitude)
        //    so finger lengths are uneven and look organic, not periodic.
        const rx = x - this.center.x;
        const ry = y - this.center.y;
        const r = Math.sqrt(rx * rx + ry * ry) + 0.001;
        const urx = rx / r;
        const ury = ry / r;

        const wx = noise(x * 0.011 + this.seed * 0.001, y * 0.011 + 13.7) - 0.5;
        const wy = noise(x * 0.011 + this.seed * 0.001 + 31.7, y * 0.011 - 5.1) - 0.5;
        // Radial / tangential decomposition. utx = -ury, uty = urx.
        const wRadial = wx * urx + wy * ury;
        const wTan = wx * (-ury) + wy * urx;
        // Roundness — solitary pools (deformScalar near 0) get a muted radial
        // boost and reduced tendril contribution, so their boundary reads as
        // a soft disk. Pools touching neighbors lerp up to full Saffman-Taylor
        // fingering along the contact axes.
        const dScale = this.deformScalar || 0;
        const radialBoost = ROUND_RADIAL_WARP_FLOOR + (RADIAL_WARP_BOOST - ROUND_RADIAL_WARP_FLOOR) * dScale;
        const tendrilPx = (ROUND_TENDRIL_FLOOR + (1 - ROUND_TENDRIL_FLOOR) * dScale) * TENDRIL_WARP_PX;
        const wxAnis = (radialBoost * wRadial * urx) + (TANGENTIAL_WARP_DAMP * wTan * (-ury));
        const wyAnis = (radialBoost * wRadial * ury) + (TANGENTIAL_WARP_DAMP * wTan * urx);

        const tendX = noise(x * 0.0042 + this.seed * 0.0007, y * 0.0042 + 7.7) - 0.5;
        const tendY = noise(x * 0.0042 - this.seed * 0.0007, y * 0.0042 + 11.3) - 0.5;

        // Comb scar sample-point warp removed. The comb is now a
        // pixel smudge applied directly to pigmentLayer (see
        // applyCombImpulse); fieldAt no longer participates in the
        // comb's visual effect, so we simply omit the subtraction.
        const sx = x + wxAnis * (DOMAIN_WARP_PX * 2) + tendX * (tendrilPx * 2);
        const sy = y + wyAnis * (DOMAIN_WARP_PX * 2) + tendY * (tendrilPx * 2);

        let sum = 0;
        for (const lobe of this.sampleLobes) {
          const roughDx = sx - lobe.x;
          const roughDy = sy - lobe.y;
          if (roughDx * roughDx + roughDy * roughDy > lobe.influence2) continue;
          // Smaller per-lobe warp retained for sub-blob asymmetry: the global
          // coord warp gives fluid pool edges, this gives lobe-internal break-up.
          const warp = (stableNoise(floor(sx * 0.025), floor(sy * 0.025), this.seed + lobe.phase) - 0.5) * lobe.radius * 0.10;
          const dx = roughDx + lobe.phaseCos * warp;
          const dy = roughDy + lobe.phaseSin * warp;
          const d2 = dx * dx + dy * dy + 18;
          sum += lobe.radius2 / d2;
        }
        return sum;
      }

      // D2 — evaluate the inner sub-metaball field at (x, y). Returns a
      // signed scalar in roughly [-1, 1] used to tint the cell color.
      // Cheap: a handful of inverse-square-distance lookups inside the
      // pool's footprint. Called once per owned cell during render.
      innerFieldAt(x, y) {
        let sum = 0;
        for (const il of this.innerLobes) {
          const dx = x - (this.center.x + il.dx);
          const dy = y - (this.center.y + il.dy);
          const d2 = dx * dx + dy * dy;
          // Effective culling radius (3x lobe radius). Beyond it the field
          // is too small to matter visually, and we save the divide.
          const cutoff = il.radius * il.radius * 9;
          if (d2 > cutoff) continue;
          const f = (il.radius * il.radius) / (d2 + 4);
          sum += f * il.intensity;
        }
        return sum;
      }
    }

    function stableNoise(x, y, seed) {
      return noise(x * 0.13 + seed * 0.0007, y * 0.13 - seed * 0.0003);
    }

    function nextPalette() {
      paletteIndex = (paletteIndex + 1) % PALETTES.length;
      selectedPigmentIndex = 0;
      renderPaper();
      buildToolbar();
      updateHint();
      markFullFieldDirty();
    }

    // Toolbar — color picker swatches and drop/drag tool toggle. Built from
    // the active palette so swatch order maps 1:1 to pigment order. Bound
    // once via bindToolButtons; rebuilt on palette change to swap colors.
    function buildToolbar() {
      const palette = PALETTES[paletteIndex];
      const nameEl = document.getElementById('paletteName');
      if (nameEl) nameEl.textContent = palette.name;
      const swatchHost = document.getElementById('swatches');
      if (!swatchHost) return;
      swatchHost.replaceChildren();
      palette.pigments.forEach((pigment, idx) => {
        const btn = document.createElement('button');
        btn.className = 'swatch';
        btn.dataset.active = String(idx === selectedPigmentIndex);
        btn.style.background = pigment.base;
        btn.title = pigment.base;
        const select = e => {
          e.preventDefault();
          e.stopPropagation();
          selectedPigmentIndex = idx;
          updateToolbarActive();
        };
        btn.addEventListener('mousedown', select);
        btn.addEventListener('touchstart', select, { passive: false });
        swatchHost.appendChild(btn);
      });
      updateToolbarActive();
    }

    function updateToolbarActive() {
      document.querySelectorAll('#swatches .swatch').forEach((el, idx) => {
        el.dataset.active = String(idx === selectedPigmentIndex);
      });
      document.querySelectorAll('#toolbar .tool-btn').forEach(el => {
        el.dataset.active = String(el.dataset.tool === toolMode);
      });
    }

    function bindToolButtons() {
      document.querySelectorAll('#toolbar .tool-btn').forEach(btn => {
        const handler = e => {
          e.preventDefault();
          e.stopPropagation();
          setToolMode(btn.dataset.tool);
        };
        btn.addEventListener('mousedown', handler);
        btn.addEventListener('touchstart', handler, { passive: false });
      });
    }

    function setToolMode(mode) {
      if (mode !== 'drop' && mode !== 'drag' && mode !== 'rake' && mode !== 'comb') return;
      if (toolMode === mode) return;
      toolMode = mode;
      // Cancel any in-flight gesture so we never strand state mid-mode.
      if (activePress) {
        clearPreviewDisplacement();
        if (lastPreviewRect) markDirtyRect(lastPreviewRect);
        activePress = null;
        lastPreviewRect = null;
      }
      dragSession = null;
      rakeSession = null;
      combSession = null;
      updateToolbarActive();
      dirty = true;
    }

    function resetAll() {
      if (pendingReset) {
        window.clearTimeout(pendingReset.timer);
        pendingReset = null;
      }
      pools = [];
      activePress = null;
      dragSession = null;
      rakeSession = null;
      combSession = null;
      lastPreviewRect = null;
      clearScarField();
      pigmentLayer.clear();
      if (combLayer) combLayer.clear();
      renderPaper();
      markFullFieldDirty();
      settled = true;
    }

    function updateHint() {
      const el = document.getElementById('hint');
      el.textContent = `pick swatch · drop / drag / rake / comb · P palette · R reset`;
    }

    function keyPressed() {
      if (key === 'p' || key === 'P') nextPalette();
      if (key === 'r' || key === 'R' || keyCode === ESCAPE) resetAll();
    }

    function mousePressed() {
      if (touches && touches.length) return false;
      startPress(mouseX, mouseY);
      return false;
    }

    function mouseReleased() {
      if (touches && touches.length) return false;
      if (finishCornerActionHold()) return false;
      endPress();
      return false;
    }

    function mouseDragged() {
      if (touches && touches.length) return false;
      handlePointerMove(mouseX, mouseY);
      return false;
    }

    function touchStarted() {
      const t = touches && touches.length ? touches[0] : { x: mouseX, y: mouseY };
      startPress(t.x, t.y);
      return false;
    }

    function touchMoved() {
      const t = touches && touches.length ? touches[0] : { x: mouseX, y: mouseY };
      handlePointerMove(t.x, t.y);
      return false;
    }

    function touchEnded() {
      if (finishCornerActionHold()) return false;
      endPress();
      return false;
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      chooseInitialQuality();
      rebuildSurfaces();
    }

    document.addEventListener('gesturestart', event => event.preventDefault());
    document.addEventListener('touchmove', event => event.preventDefault(), { passive: false });
  </script>
</body>
</html>
