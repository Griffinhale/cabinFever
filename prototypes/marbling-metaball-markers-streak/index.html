          const y = this.center.y + v * spawnR;
          mx[placed] = x;
          my[placed] = y;
          sx[placed] = x;
          sy[placed] = y;
          // M2 — random theta so default-circular markers don't all share
          // the same axis (irrelevant when aspect = 1, but cheap to do
          // here and would prevent a "fake circular" via aspect = 1.00001
          // from showing up as a coherent grain pattern).
          mt[placed] = Math.random() * Math.PI * 2;
          ma[placed] = 1.0;
          placed++;
        }
        // If somehow we couldn't fill (degenerate seed), pad with center.
        for (let i = placed; i < count; i++) {
          mx[i] = this.center.x;
          my[i] = this.center.y;
          sx[i] = this.center.x;
          sy[i] = this.center.y;
          mt[i] = 0;
          ma[i] = 1.0;
        }
        this.markersX = mx;
        this.markersY = my;
        this.markerSpawnX = sx;
        this.markerSpawnY = sy;
        this.markerTheta = mt;
        this.markerAspect = ma;
        this.maxMarkerAspect = 1;
        this.markersDirty = true;
        this.markerDriftAccum = 0;
      }

      // ------------------------------------------------------------------
      // Translate every marker by (dx, dy). Used when the whole pool is
      // dragged (drag tool) or pushed sideways by a new drop (D1
      // displacement). Spawn positions move too so the excursion clamp
      // stays well-defined relative to the new "rest" location.
      // ------------------------------------------------------------------
      translateMarkers(dx, dy) {
        if (!this.markersX) return;
        const mx = this.markersX;
        const my = this.markersY;
        const sx = this.markerSpawnX;
        const sy = this.markerSpawnY;
        for (let i = 0; i < mx.length; i++) {
          mx[i] += dx;
          my[i] += dy;
          sx[i] += dx;
          sy[i] += dy;
        }
        this.markersDirty = true;
      }

      // ------------------------------------------------------------------
      // Spatial hash rebuild. Cells are MARKER_HASH_CELL px squares; we
      // store, per cell, a list of marker indices that landed in it.
      //
      // We use a 2D array of Int32 arrays for predictable access (not a
      // Map) since the grid origin can shift but the number of cells is
      // small (~80×60 for a 2560×1440 canvas at 32px cells). Bucket
      // origin and size are computed from current marker AABB plus a
      // 1-cell buffer.
      //
      // Lazy: skip if markersDirty is false AND drift accumulator hasn't
      // crossed the threshold. The accumulator is per-marker squared
      // displacement summed since the last rebuild; the threshold is
      // (cellSize/2)² × markerCount, i.e. "average marker has moved
      // half a cell."
      // ------------------------------------------------------------------
      rebuildMarkerHashIfNeeded() {
        if (!this.markersX || this.markersX.length === 0) return;
        const needRebuild = this.markersDirty ||
          this.markerDriftAccum > MARKER_REBUILD_DISP2_FACTOR * this.markersX.length;
        if (!needRebuild && this.markerHash) return;
        const mx = this.markersX;
        const my = this.markersY;
        let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
        for (let i = 0; i < mx.length; i++) {
          if (mx[i] < x0) x0 = mx[i];
          if (mx[i] > x1) x1 = mx[i];
          if (my[i] < y0) y0 = my[i];
          if (my[i] > y1) y1 = my[i];
        }
        // Pad by one cell so adjacent-cell lookups can never reference
        // a cell outside the grid.
        const cs = MARKER_HASH_CELL;
        const ox = Math.floor(x0 / cs) * cs - cs;
        const oy = Math.floor(y0 / cs) * cs - cs;
        const cols = Math.ceil((x1 - ox) / cs) + 2;
        const rows = Math.ceil((y1 - oy) / cs) + 2;
        // First pass: count per cell.
        const counts = new Int32Array(cols * rows);
        const cellIdx = new Int32Array(mx.length);
        for (let i = 0; i < mx.length; i++) {
          const cx = ((mx[i] - ox) / cs) | 0;
          const cy = ((my[i] - oy) / cs) | 0;
          const ci = cx + cy * cols;
          cellIdx[i] = ci;
          counts[ci]++;
        }
        // Build per-cell index arrays.
        const buckets = new Array(cols * rows);
        for (let c = 0; c < counts.length; c++) {
          buckets[c] = counts[c] > 0 ? new Int32Array(counts[c]) : null;
        }
        const writePos = new Int32Array(cols * rows);
        for (let i = 0; i < mx.length; i++) {
          const ci = cellIdx[i];
          buckets[ci][writePos[ci]++] = i;
        }
        this.markerHash = buckets;
        this.markerHashOriginX = ox;
        this.markerHashOriginY = oy;
        this.markerHashCols = cols;
        this.markerHashRows = rows;
        this.markersDirty = false;
        this.markerDriftAccum = 0;
      }

      // ------------------------------------------------------------------
      // M2 — anisotropic marker field contribution at (x, y).
      //
      // Each marker contributes an ELONGATED Gaussian aligned with its
      // theta and stretched by aspect = σ_par / σ_perp. For aspect = 1
      // this is identical to the P2 circular Gaussian; for aspect > 1 it
      // produces a streak aligned along (cos θ, sin θ).
      //
      // Field math:
      //   ux, uy = cos θ, sin θ         // parallel axis
      //   d_par  = (x-mx)*ux + (y-my)*uy
      //   d_perp = -(x-mx)*uy + (y-my)*ux   // = dx*px + dy*py with px=-uy
      //   σ_par  = MARKER_SIGMA_PERP * aspect
      //   f = W * exp(-(d_par²/σ_par² + d_perp²/σ_perp²))
      //
      // Spatial hash: lookup radius widens with MARKER_HASH_RADIUS so the
      // elongated tail (σ_par × 3 along stroke axis) is captured even when
      // the marker center sits ≥1 cell away from the sample point. Per-
      // marker rough AABB rejection is kept for the elongated path.
      // Markers with aspect ≤ FAST_PATH_THRESHOLD take a circular fast
      // path: same as P2 (no rotation math, single isotropic Gaussian).
      // ------------------------------------------------------------------
      markersFieldAt(x, y) {
        if (!this.markerHash) return 0;
        const cs = MARKER_HASH_CELL;
        const cx = ((x - this.markerHashOriginX) / cs) | 0;
        const cy = ((y - this.markerHashOriginY) / cs) | 0;
        const cols = this.markerHashCols;
        const rows = this.markerHashRows;
        // If sample sits outside the marker AABB by more than the hash
        // radius, skip without iterating.
        if (cx < -MARKER_HASH_RADIUS || cy < -MARKER_HASH_RADIUS ||
            cx >= cols + MARKER_HASH_RADIUS || cy >= rows + MARKER_HASH_RADIUS) {
          return 0;
        }
        const buckets = this.markerHash;
        const mx = this.markersX;
        const my = this.markersY;
        const mt = this.markerTheta;
        const ma = this.markerAspect;
        const sigmaPerp = MARKER_SIGMA_PERP;
        const invSigmaPerp2 = 1 / (sigmaPerp * sigmaPerp);
        // Worst-case cutoff = max σ_par × MARKER_CUTOFF_FACTOR, since a
        // streaked marker can reach this far along its parallel axis.
        const maxReach = MARKER_MAX_SIGMA_PAR * MARKER_CUTOFF_FACTOR;
        const maxReach2 = maxReach * maxReach;
        const circThresh = MARKER_CIRCULAR_FAST_PATH_THRESHOLD;
        const w = MARKER_WEIGHT;
        let sum = 0;
        const r0 = Math.max(0, cy - MARKER_HASH_RADIUS);
        const r1 = Math.min(rows - 1, cy + MARKER_HASH_RADIUS);
        const c0 = Math.max(0, cx - MARKER_HASH_RADIUS);
        const c1 = Math.min(cols - 1, cx + MARKER_HASH_RADIUS);
        for (let ry = r0; ry <= r1; ry++) {
          for (let rx = c0; rx <= c1; rx++) {
            const bucket = buckets[rx + ry * cols];
            if (!bucket) continue;
            for (let k = 0; k < bucket.length; k++) {
              const idx = bucket[k];
              const ex = x - mx[idx];
              const ey = y - my[idx];
              // Cheap rejection: > worst-case 3σ_par from the marker
              // center can't contribute, regardless of orientation.
              const rough2 = ex * ex + ey * ey;
              if (rough2 > maxReach2) continue;
              const aspect = ma[idx];
              if (aspect <= circThresh) {
                // Fast path — circular Gaussian, no rotation math.
                // Cutoff against the circular footprint (3σ_perp²).
                const cutCirc2 = (sigmaPerp * MARKER_CUTOFF_FACTOR) *
                                 (sigmaPerp * MARKER_CUTOFF_FACTOR);
                if (rough2 > cutCirc2) continue;
                sum += w * Math.exp(-rough2 * invSigmaPerp2);
              } else {
                const theta = mt[idx];
                const ux = Math.cos(theta);
                const uy = Math.sin(theta);
                // d_par along (ux, uy); d_perp along (-uy, ux).
                const dpar = ex * ux + ey * uy;
                const dperp = -ex * uy + ey * ux;
                const sigmaPar = sigmaPerp * aspect;
                const invSigmaPar2 = 1 / (sigmaPar * sigmaPar);
                const arg = dpar * dpar * invSigmaPar2 +
                            dperp * dperp * invSigmaPerp2;
                // Cull by exponent magnitude — 9 = (3σ)² in normalized
                // units, beyond which exp(-9) ≈ 1e-4 is below noise.
                if (arg > 9) continue;
                sum += w * Math.exp(-arg);
              }
            }
          }
        }
        return sum;
      }

      // ------------------------------------------------------------------
      // Apply a multi-tine displacement kernel to markers. Called per
      // frame by the rake (1 tine) and comb (many tines) tools.
      //
      // Tines are parameterized as world-space points + a stroke
      // direction vector. For each marker, sum the per-tine Gaussian-
      // weighted push along the stroke direction. This is the math-
      // operators-style "sum of Gaussians" superposition that produces
      // ripples for closely-spaced tines.
      //
      // strokeDx, strokeDy: per-step displacement vector (px). Each
      //   tine pushes markers in this direction.
      // tineX, tineY: arrays of tine positions in world coords.
      // sigma: tine kernel sigma (px).
      // pushFactor: multiplier on the displacement.
      //
      // Returns true if any marker was actually moved.
      // ------------------------------------------------------------------
      applyTineDisplacement(strokeDx, strokeDy, tineX, tineY, sigma, pushFactor) {
        if (!this.markersX) return false;
        const mx = this.markersX;
        const my = this.markersY;
        const sx = this.markerSpawnX;
        const sy = this.markerSpawnY;
        const mt = this.markerTheta;
        const ma = this.markerAspect;
        const n = mx.length;
        if (n === 0) return false;
        // Tine AABB plus 3σ buffer — markers outside this can be skipped
        // entirely without computing per-tine Gaussians.
        let tx0 = Infinity, ty0 = Infinity, tx1 = -Infinity, ty1 = -Infinity;
        for (let t = 0; t < tineX.length; t++) {
          if (tineX[t] < tx0) tx0 = tineX[t];
          if (tineX[t] > tx1) tx1 = tineX[t];
          if (tineY[t] < ty0) ty0 = tineY[t];
          if (tineY[t] > ty1) ty1 = tineY[t];
        }
        const buf = sigma * MARKER_CUTOFF_FACTOR;
        tx0 -= buf; ty0 -= buf; tx1 += buf; ty1 += buf;
        const invSigma2 = 1 / (sigma * sigma);
        const cutoff2 = buf * buf;
        const maxExc2 = MARKER_MAX_EXCURSION * MARKER_MAX_EXCURSION;
        // M2 — stroke direction and target theta. atan2 once here, not
        // per marker, since the whole frame's stroke direction is uniform
        // across all tines.
        const strokeMag = Math.sqrt(strokeDx * strokeDx + strokeDy * strokeDy);
        const targetTheta = strokeMag > 0.001 ? Math.atan2(strokeDy, strokeDx) : 0;
        // M2 — when the stroke direction differs from a marker's current
        // theta by more than π/2, flipping the marker by π is closer than
        // a 180° rotation. Streaks have no head/tail (mirror symmetric
        // along the par axis), so we lerp toward (targetTheta + π) when
        // it's the shorter path.
        let moved = false;
        let drift2Sum = 0;
        let runningMaxAspect = 1;
        // Track existing max in case this frame doesn't visit every marker.
        for (let i = 0; i < n; i++) {
          if (ma[i] > runningMaxAspect) runningMaxAspect = ma[i];
        }
        for (let i = 0; i < n; i++) {
          const x = mx[i];
          const y = my[i];
          if (x < tx0 || x > tx1 || y < ty0 || y > ty1) continue;
          // Sum Gaussian weights from every tine on this marker.
          let totalW = 0;
          for (let t = 0; t < tineX.length; t++) {
            const ex = x - tineX[t];
            const ey = y - tineY[t];
            const r2 = ex * ex + ey * ey;
            if (r2 > cutoff2) continue;
            totalW += Math.exp(-r2 * invSigma2);
          }
          if (totalW < 0.001) continue;
          let dx = strokeDx * totalW * pushFactor;
          let dy = strokeDy * totalW * pushFactor;
          // Clamp by total excursion from spawn — prevents long strokes
          // from flinging a marker into a neighboring pool.
          const nx = x + dx;
          const ny = y + dy;
          const rx = nx - sx[i];
          const ry = ny - sy[i];
          const rSpawn2 = rx * rx + ry * ry;
          if (rSpawn2 > maxExc2) {
            const scale = MARKER_MAX_EXCURSION / Math.sqrt(rSpawn2);
            mx[i] = sx[i] + rx * scale;
            my[i] = sy[i] + ry * scale;
          } else {
            mx[i] = nx;
            my[i] = ny;
          }
          drift2Sum += dx * dx + dy * dy;
          moved = true;
          // M2 — anisotropy update. Per-marker theta lerps toward the
          // stroke direction (or its π-flipped equivalent, since streaks
          // are mirror-symmetric). Aspect grows toward MAX_ASPECT, scaled
          // by the per-marker Gaussian weight so markers under the tine
          // center elongate faster than those at the edge.
          if (strokeMag > 0.001) {
            const lerpAmt = Math.min(1, MARKER_THETA_LERP * totalW);
            let cur = mt[i];
            // Pick the shortest signed delta to target ±π.
            let dTheta = targetTheta - cur;
            // Wrap into [-π, π].
            while (dTheta > Math.PI) dTheta -= Math.PI * 2;
            while (dTheta < -Math.PI) dTheta += Math.PI * 2;
            // Mirror trick: streaks are axis-symmetric, so a half-flip
            // is the closest path if |dTheta| > π/2.
            if (dTheta > Math.PI * 0.5) dTheta -= Math.PI;
            else if (dTheta < -Math.PI * 0.5) dTheta += Math.PI;
            mt[i] = cur + dTheta * lerpAmt;
            // Aspect grows by the tine Gaussian weight, capped at max.
            const grown = ma[i] + MARKER_ASPECT_GAIN * totalW;
            ma[i] = grown > MARKER_MAX_ASPECT ? MARKER_MAX_ASPECT : grown;
            if (ma[i] > runningMaxAspect) runningMaxAspect = ma[i];
          }
        }
        if (moved) {
          this.markerDriftAccum += drift2Sum;
          this.maxMarkerAspect = runningMaxAspect;
        }
        return moved;
      }

      // ------------------------------------------------------------------
      // M2 — per-frame aspect decay. Every frame, multiply each marker's
      // aspect by MARKER_ASPECT_DECAY, clamped to ≥1. This relaxes
      // streaks back toward circular over ~1–2 s after the stroke ends,
      // matching how real ink streaks blur out as surface tension acts.
      //
      // Returns true if any marker is still streaky (aspect > 1.02), so
      // the pool keeps updating until everything is back to circular and
      // the streak character has dissolved.
      // ------------------------------------------------------------------
      decayMarkerAspect() {
        if (!this.markerAspect || this.markerAspect.length === 0) return false;
        // Cheap early-out: if no marker is currently streaky, skip.
        if (this.maxMarkerAspect <= 1.001) return false;
        const ma = this.markerAspect;
        const n = ma.length;
        let maxA = 1;
        let anyStreaky = false;
        for (let i = 0; i < n; i++) {
          const a = ma[i];
          if (a <= 1.001) continue;
          const next = a * MARKER_ASPECT_DECAY;
          ma[i] = next < 1.0 ? 1.0 : next;
          if (ma[i] > 1.02) anyStreaky = true;
          if (ma[i] > maxA) maxA = ma[i];
        }
        this.maxMarkerAspect = maxA;
        return anyStreaky;
      }

      // Roundness envelope. For each non-satellite lobe, scan other pools and
      // record the maximum (alignment * proximity) — alignment is the dot of
      // the lobe's outward unit vector with the unit vector toward the
      // neighbor's center; proximity is 1 at touching, 0 at the engagement
      // range edge. The result is a 0..1 contactT per lobe, smoothed with
      // CONTACT_LERP unless forceInit is true (used on creation/commit so the
      // new pool's deformation is visible immediately). Sets this.deformScalar
      // = max contactT, used by fieldAt to scale radial/tendril warp.
      refreshContactPressure(forceInit) {
        if (this.preview) return;
        const myR = Math.sqrt(this.targetMass / Math.PI);
        let maxContact = 0;
        for (const lobe of this.lobes) {
          if (lobe.isSatellite) continue;
          if (!lobe.baseOffsetTarget && lobe.baseOffsetTarget !== 0) {
            lobe.baseOffsetTarget = lobe.offsetTarget;
          }
          const lx = Math.cos(lobe.angle);
          const ly = Math.sin(lobe.angle);
          let pressure = 0;
          for (const other of pools) {
            if (other === this || other.preview) continue;
            const dx = other.center.x - this.center.x;
            const dy = other.center.y - this.center.y;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d < 0.5) continue;
            const otherR = Math.sqrt(other.targetMass / Math.PI);
            const range = (myR + otherR) * CONTACT_RANGE_FACTOR;
            if (d > range) continue;
            const ux = dx / d;
            const uy = dy / d;
            const align = lx * ux + ly * uy;
            if (align <= 0) continue;
            const proximity = 1 - d / range;
            const p = align * proximity;
            if (p > pressure) pressure = p;
          }
          if (forceInit) {
            lobe.contactT = pressure;
          } else {
            lobe.contactT += (pressure - lobe.contactT) * CONTACT_LERP;
          }
          lobe.offsetTarget = lobe.baseOffsetTarget *
            (BASE_ROUNDNESS + (1 - BASE_ROUNDNESS) * lobe.contactT);
          if (lobe.contactT > maxContact) maxContact = lobe.contactT;
        }
        this.deformScalar = maxContact;
      }

      // (removed) Comb's per-lobe scar follow. The comb is now a pixel
      // smudge that operates on pigmentLayer; lobes are no longer
      // touched by combing. See applyCombImpulse for the new flow.

      update() {
        if (this.preview) return false;
        // Comb tool — formerly applied per-lobe scar follow here. The
        // comb has been re-architected as a pixel smudge that writes
        // directly to pigmentLayer (see applyCombImpulse). It no longer
        // touches lobes, so this site is intentionally a no-op.
        // applyScarFollow is still defined for diagnostic poking but
        // is never called by the main loop.
        // Pools that are otherwise settled but still have un-played
        // displacement (a new drop pushed them) need to keep updating until
        // the lerp catches up. Compute once whether any lobe still owes a
        // displacement step.
        const hasPendingDisplacement = this.lobes.some(l =>
          Math.abs((l.displaceTargetX + l.previewPushX) - l.displaceX) > 0.05 ||
          Math.abs((l.displaceTargetY + l.previewPushY) - l.displaceY) > 0.05
        );
        // M2 — also unsettle while any marker is mid-decay back to circular.
        // The field changes every frame as σ_par shrinks, so we need to
        // re-evaluate the dirty rect until everything is back to aspect = 1.
        const hasDecayingStreaks = this.maxMarkerAspect > 1.02;
        if (hasDecayingStreaks) {
          const stillStreaky = this.decayMarkerAspect();
          if (stillStreaky) {
            this.settled = false;
            markDirtyRect(this.fieldRect);
          }
        }
        if (this.settled && !hasPendingDisplacement && !hasDecayingStreaks) return false;
        // Refresh contact pressure each frame the pool is alive. Cheap
        // (O(pools * lobes)); contactT smoothly tracks neighbor presence so
        // the asymmetry envelope eases in/out as drops land or get dragged.
        this.refreshContactPressure(false);

        const previousRect = this.fieldRect;
        const before = this.currentMass;
        if (this.currentMass < this.targetMass) {
          this.currentMass = lerp(this.currentMass, this.targetMass, this.growthRate);
        }
        const progress = constrain(this.currentMass / this.targetMass, 0, 1);
        let moving = Math.abs(this.currentMass - before) > 0.2;
        // Interactive-tool snap-ramp — DISPLACEMENT_RAMP (0.085) gives a
        // soft, half-second drift that's right for drop-displacement
        // settling, but it makes rake/comb feel like the lobes are
        // wading through molasses (the cursor moves faster than the
        // lerp can ever catch up). While the user is driving a session,
        // bump the per-frame catch-up to a much larger fraction so the
        // tool reads as responsive. On release the lerp returns to the
        // soft ramp and ambient settling looks unchanged.
        const interactive = rakeSession || combSession;
        const displaceRamp = interactive ? 0.55 : DISPLACEMENT_RAMP;
        for (const lobe of this.lobes) {
          if (progress < 0.998) {
            const targetR = lobe.targetRadius * sqrt(progress);
            const nextR = lerp(lobe.radius, targetR, 0.045 * lobe.growthVariation);
            const nextOffset = lerp(lobe.offsetNow, lobe.offsetTarget, 0.032 * lobe.growthVariation);
            if (Math.abs(nextR - lobe.radius) > 0.05 || Math.abs(nextOffset - lobe.offsetNow) > 0.04) moving = true;
            lobe.radius = nextR;
            // Drift is only during growth; once settled these offsets freeze.
            const drift = (noise(this.seed * 0.001, lobe.phase, progress * 1.7) - 0.5) * 4 * (1 - progress);
            lobe.offsetNow = nextOffset + drift;
          }
          // D1 — displacement lerp. Always runs (even when growth is done) so
          // a settled pool can still play out a push from a new neighbour.
          // The lerp target combines the committed displaceTarget with the
          // (transient) previewPush so the user sees mid-press feedback.
          const tgtX = lobe.displaceTargetX + lobe.previewPushX;
          const tgtY = lobe.displaceTargetY + lobe.previewPushY;
          const dxRem = tgtX - lobe.displaceX;
          const dyRem = tgtY - lobe.displaceY;
          if (Math.abs(dxRem) > 0.05 || Math.abs(dyRem) > 0.05) {
            lobe.displaceX += dxRem * displaceRamp;
            lobe.displaceY += dyRem * displaceRamp;
            moving = true;
          }
        }
        if (progress >= SETTLE_EPSILON && !moving) this.settled = true;
        if (progress >= 0.998 && !hasPendingDisplacement) {
          this.currentMass = this.targetMass;
          for (const lobe of this.lobes) {
            lobe.radius = lobe.targetRadius;
            lobe.offsetNow = lobe.offsetTarget;
          }
          this.settled = true;
          moving = true;
        }
        this.updateGeometry();
        if (moving) {
          markDirtyRect(previousRect);
          markDirtyRect(this.fieldRect);
        }
        return moving;
      }

      updateGeometry() {
        const cellSize = quality.cellSize;
        this.sampleLobes = [];
        let x0 = Infinity;
        let y0 = Infinity;
        let x1 = -Infinity;
        let y1 = -Infinity;
        // M2 — include markers in the bounds, padded by the *maximum*
        // σ_par × 3 (worst-case streak reach along its parallel axis).
        // A fully-elongated marker can reach MARKER_MAX_SIGMA_PAR × 3 from
        // its center, so the dirty rect must cover that or we'll get
        // truncated streaks at the pool periphery.
        if (this.markersX && this.markersX.length > 0) {
          const mx = this.markersX;
          const my = this.markersY;
          const mBuf = MARKER_MAX_SIGMA_PAR * MARKER_CUTOFF_FACTOR;
          let mx0 = Infinity, my0 = Infinity, mx1 = -Infinity, my1 = -Infinity;
          for (let i = 0; i < mx.length; i++) {
            if (mx[i] < mx0) mx0 = mx[i];
            if (mx[i] > mx1) mx1 = mx[i];
            if (my[i] < my0) my0 = my[i];
            if (my[i] > my1) my1 = my[i];
          }
          x0 = Math.min(x0, mx0 - mBuf);
          y0 = Math.min(y0, my0 - mBuf);
          x1 = Math.max(x1, mx1 + mBuf);
          y1 = Math.max(y1, my1 + mBuf);
        }
        for (const lobe of this.lobes) {
          // D1 — displacement is added in screen coordinates after the
          // angular offset, so pools deform asymmetrically when neighbours
          // push them: lobes closer to the new drop get pushed harder, so
          // the pool stretches away.
          const lx = this.center.x + cos(lobe.angle) * lobe.offsetNow + lobe.displaceX;
          const ly = this.center.y + sin(lobe.angle) * lobe.offsetNow + lobe.displaceY;
          const influenceRadius = Math.max(8, lobe.radius * FIELD_INFLUENCE_FACTOR + 10);
          const warpRadius = lobe.radius * 0.18;
          // Per-lobe directional warp budget + global coord-space warp budget
          // + comb scar budget. Bounds must include all three so the culling
          // rect can never reject a sample that would have been displaced
          // into the lobe's footprint by any of the warp sources.
          const totalWarp = warpRadius + DOMAIN_WARP_PX + MAX_SCAR_PER_CELL;
          this.sampleLobes.push({
            x: lx,
            y: ly,
            radius: lobe.radius,
            radius2: lobe.radius * lobe.radius,
            influence2: (influenceRadius + totalWarp) * (influenceRadius + totalWarp),
            phase: lobe.phase,
            phaseCos: cos(lobe.phase),
            phaseSin: sin(lobe.phase)
          });
          x0 = Math.min(x0, lx - influenceRadius - totalWarp);
          y0 = Math.min(y0, ly - influenceRadius - totalWarp);
          x1 = Math.max(x1, lx + influenceRadius + totalWarp);
          y1 = Math.max(y1, ly + influenceRadius + totalWarp);
        }
        this.pixelBounds = { x0, y0, x1, y1 };
        this.fieldRect = clampRect({
          x0: floor(x0 / cellSize) - 1,
          y0: floor(y0 / cellSize) - 1,
          x1: ceil(x1 / cellSize) + 1,
          y1: ceil(y1 / cellSize) + 1
        });
      }

      containsPoint(x, y) {
        const b = this.pixelBounds;
        return !!b && x >= b.x0 && x <= b.x1 && y >= b.y0 && y <= b.y1;
      }

      fieldAt(x, y) {
        // R3 + D3 — coordinate-space domain warp, decomposed into radial and
        // tangential components relative to the pool center so the boundary
        // can finger outward instead of wobbling isotropically.
        //
        // 1. Sample two-channel Perlin noise to get a "raw" warp vector (wx, wy).
        // 2. Project (wx, wy) onto the radial unit (ur) and tangential unit
        //    (ut = perp(ur)). Boost radial, dampen tangential.
        // 3. Add a coarser tendril noise (lower frequency, smaller amplitude)
        //    so finger lengths are uneven and look organic, not periodic.
        const rx = x - this.center.x;
        const ry = y - this.center.y;
        const r = Math.sqrt(rx * rx + ry * ry) + 0.001;
        const urx = rx / r;
        const ury = ry / r;

        const wx = noise(x * 0.011 + this.seed * 0.001, y * 0.011 + 13.7) - 0.5;
        const wy = noise(x * 0.011 + this.seed * 0.001 + 31.7, y * 0.011 - 5.1) - 0.5;
        // Radial / tangential decomposition. utx = -ury, uty = urx.
        const wRadial = wx * urx + wy * ury;
        const wTan = wx * (-ury) + wy * urx;
        // Roundness — solitary pools (deformScalar near 0) get a muted radial
        // boost and reduced tendril contribution, so their boundary reads as
        // a soft disk. Pools touching neighbors lerp up to full Saffman-Taylor
        // fingering along the contact axes.
        const dScale = this.deformScalar || 0;
        const radialBoost = ROUND_RADIAL_WARP_FLOOR + (RADIAL_WARP_BOOST - ROUND_RADIAL_WARP_FLOOR) * dScale;
        const tendrilPx = (ROUND_TENDRIL_FLOOR + (1 - ROUND_TENDRIL_FLOOR) * dScale) * TENDRIL_WARP_PX;
        const wxAnis = (radialBoost * wRadial * urx) + (TANGENTIAL_WARP_DAMP * wTan * (-ury));
        const wyAnis = (radialBoost * wRadial * ury) + (TANGENTIAL_WARP_DAMP * wTan * urx);

        const tendX = noise(x * 0.0042 + this.seed * 0.0007, y * 0.0042 + 7.7) - 0.5;
        const tendY = noise(x * 0.0042 - this.seed * 0.0007, y * 0.0042 + 11.3) - 0.5;

        // Comb scar sample-point warp removed. The comb is now a
        // pixel smudge applied directly to pigmentLayer (see
        // applyCombImpulse); fieldAt no longer participates in the
        // comb's visual effect, so we simply omit the subtraction.
        const sx = x + wxAnis * (DOMAIN_WARP_PX * 2) + tendX * (tendrilPx * 2);
        const sy = y + wyAnis * (DOMAIN_WARP_PX * 2) + tendY * (tendrilPx * 2);

        let sum = 0;
        for (const lobe of this.sampleLobes) {
          const roughDx = sx - lobe.x;
          const roughDy = sy - lobe.y;
          if (roughDx * roughDx + roughDy * roughDy > lobe.influence2) continue;
          // Smaller per-lobe warp retained for sub-blob asymmetry: the global
          // coord warp gives fluid pool edges, this gives lobe-internal break-up.
          const warp = (stableNoise(floor(sx * 0.025), floor(sy * 0.025), this.seed + lobe.phase) - 0.5) * lobe.radius * 0.10;
          const dx = roughDx + lobe.phaseCos * warp;
          const dy = roughDy + lobe.phaseSin * warp;
          const d2 = dx * dx + dy * dy + 18;
          sum += lobe.radius2 / d2;
        }
        // P2 — marker contributions. Markers add sharply-localized bumps
        // on top of the lobes' smooth field. Sampled at the *unwarped*
        // (x, y) so rake/comb-driven streaks read as sharp ripples and
        // aren't smeared by the domain warp that softens the lobe
        // boundary. Markers' own positions already carry the streak
        // information; warping the read point too would double-blur it.
        sum += this.markersFieldAt(x, y);
        return sum;
      }

      // D2 — evaluate the inner sub-metaball field at (x, y). Returns a
      // signed scalar in roughly [-1, 1] used to tint the cell color.
      // Cheap: a handful of inverse-square-distance lookups inside the
      // pool's footprint. Called once per owned cell during render.
      innerFieldAt(x, y) {
        let sum = 0;
        for (const il of this.innerLobes) {
          const dx = x - (this.center.x + il.dx);
          const dy = y - (this.center.y + il.dy);
          const d2 = dx * dx + dy * dy;
          // Effective culling radius (3x lobe radius). Beyond it the field
          // is too small to matter visually, and we save the divide.
          const cutoff = il.radius * il.radius * 9;
          if (d2 > cutoff) continue;
          const f = (il.radius * il.radius) / (d2 + 4);
          sum += f * il.intensity;
        }
        return sum;
      }
    }

    function stableNoise(x, y, seed) {
      return noise(x * 0.13 + seed * 0.0007, y * 0.13 - seed * 0.0003);
    }

    function nextPalette() {
      paletteIndex = (paletteIndex + 1) % PALETTES.length;
      selectedPigmentIndex = 0;
      renderPaper();
      buildToolbar();
      updateHint();
      markFullFieldDirty();
    }

    // Toolbar — color picker swatches and drop/drag tool toggle. Built from
    // the active palette so swatch order maps 1:1 to pigment order. Bound
    // once via bindToolButtons; rebuilt on palette change to swap colors.
    function buildToolbar() {
      const palette = PALETTES[paletteIndex];
      const nameEl = document.getElementById('paletteName');
      if (nameEl) nameEl.textContent = palette.name;
      const swatchHost = document.getElementById('swatches');
      if (!swatchHost) return;
      swatchHost.replaceChildren();
      palette.pigments.forEach((pigment, idx) => {
        const btn = document.createElement('button');
        btn.className = 'swatch';
        btn.dataset.active = String(idx === selectedPigmentIndex);
        btn.style.background = pigment.base;
        btn.title = pigment.base;
        const select = e => {
          e.preventDefault();
          e.stopPropagation();
          selectedPigmentIndex = idx;
          updateToolbarActive();
        };
        btn.addEventListener('mousedown', select);
        btn.addEventListener('touchstart', select, { passive: false });
        swatchHost.appendChild(btn);
      });
      updateToolbarActive();
    }

    function updateToolbarActive() {
      document.querySelectorAll('#swatches .swatch').forEach((el, idx) => {
        el.dataset.active = String(idx === selectedPigmentIndex);
      });
      document.querySelectorAll('#toolbar .tool-btn').forEach(el => {
        el.dataset.active = String(el.dataset.tool === toolMode);
      });
    }

    function bindToolButtons() {
      document.querySelectorAll('#toolbar .tool-btn').forEach(btn => {
        const handler = e => {
          e.preventDefault();
          e.stopPropagation();
          setToolMode(btn.dataset.tool);
        };
        btn.addEventListener('mousedown', handler);
        btn.addEventListener('touchstart', handler, { passive: false });
      });
    }

    function setToolMode(mode) {
      if (mode !== 'drop' && mode !== 'drag' && mode !== 'rake' && mode !== 'comb') return;
      if (toolMode === mode) return;
      toolMode = mode;
      // Cancel any in-flight gesture so we never strand state mid-mode.
      if (activePress) {
        clearPreviewDisplacement();
        if (lastPreviewRect) markDirtyRect(lastPreviewRect);
        activePress = null;
        lastPreviewRect = null;
      }
      dragSession = null;
      rakeSession = null;
      combSession = null;
      updateToolbarActive();
      dirty = true;
    }

    function resetAll() {
      if (pendingReset) {
        window.clearTimeout(pendingReset.timer);
        pendingReset = null;
      }
      pools = [];
      activePress = null;
      dragSession = null;
      rakeSession = null;
      combSession = null;
      lastPreviewRect = null;
      clearScarField();
      pigmentLayer.clear();
      if (combLayer) combLayer.clear();
      renderPaper();
      markFullFieldDirty();
      settled = true;
    }

    function updateHint() {
      const el = document.getElementById('hint');
      el.textContent = `M2 streak markers · drop / drag / rake / comb · P palette · R reset`;
    }

    function keyPressed() {
      if (key === 'p' || key === 'P') nextPalette();
      if (key === 'r' || key === 'R' || keyCode === ESCAPE) resetAll();
    }

    function mousePressed() {
      if (touches && touches.length) return false;
      startPress(mouseX, mouseY);
      return false;
    }

    function mouseReleased() {
      if (touches && touches.length) return false;
      if (finishCornerActionHold()) return false;
      endPress();
      return false;
    }

    function mouseDragged() {
      if (touches && touches.length) return false;
      handlePointerMove(mouseX, mouseY);
      return false;
    }

    function touchStarted() {
      const t = touches && touches.length ? touches[0] : { x: mouseX, y: mouseY };
      startPress(t.x, t.y);
      return false;
    }

    function touchMoved() {
      const t = touches && touches.length ? touches[0] : { x: mouseX, y: mouseY };
      handlePointerMove(t.x, t.y);
      return false;
    }

    function touchEnded() {
      if (finishCornerActionHold()) return false;
      endPress();
      return false;
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      chooseInitialQuality();
      rebuildSurfaces();
    }

    document.addEventListener('gesturestart', event => event.preventDefault());
    document.addEventListener('touchmove', event => event.preventDefault(), { passive: false });
  </script>
</body>
</html>
