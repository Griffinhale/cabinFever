<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Marbling Density Voronoi Prototype</title>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
  <script>window.p5 && (p5.disableFriendlyErrors = true);</script>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #f4eddf; touch-action: none; overscroll-behavior: none; -webkit-user-select: none; user-select: none; }
    canvas { display: block; touch-action: none; }
    #hint { position: fixed; left: 10px; bottom: 8px; z-index: 10; color: rgba(45,35,25,.52); font: 11px/1.35 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; letter-spacing: .02em; pointer-events: none; text-shadow: 0 1px 0 rgba(255,255,255,.38); }
    #cornerActions { position: fixed; right: 8px; bottom: 8px; z-index: 11; color: rgba(45,35,25,.34); font: 10px/1.35 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; pointer-events: none; text-align: right; }
    #topToolbar { position: fixed; left: 50%; top: 10px; z-index: 20; display: flex; gap: 6px; padding: 6px; border: 1px solid rgba(75,55,38,.20); border-radius: 999px; background: rgba(246,236,215,.76); box-shadow: 0 8px 28px rgba(48,35,22,.12); backdrop-filter: blur(8px); transform: translateX(-50%); touch-action: manipulation; }
    .toolButton { appearance: none; border: 1px solid rgba(65,46,31,.18); border-radius: 999px; background: rgba(255,250,238,.66); color: rgba(45,35,25,.72); font: 11px/1 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; letter-spacing: .03em; padding: 8px 10px; min-width: 54px; }
    .toolButton.active { background: rgba(47,36,24,.82); border-color: rgba(47,36,24,.26); color: rgba(255,248,232,.94); }
    .toolButton:active { transform: translateY(1px); }
  </style>
</head>
<body>
  <div id="hint">Voronoi material seeds · finite pigment density · hold to drop · rake moves seeds</div>
  <div id="topToolbar" aria-label="marbling tools">
    <button id="dropTool" class="toolButton active" type="button">drop</button>
    <button id="rakeTool" class="toolButton" type="button">rake</button>
    <button id="paletteTool" class="toolButton" type="button">palette</button>
    <button id="resetTool" class="toolButton" type="button">reset</button>
  </div>
  <div id="cornerActions">tap top-left: palette<br>hold top-right: reset</div>
  <script>
    /*
      Prototype E: Voronoi / material-seed finite-density marbling.
      Organic metaball-ish pools provide soft boundaries; finite colored seeds
      carry pigment mass inside those boundaries. Raking moves seeds directly,
      so bunching creates saturated veins and separation creates pale gaps.
    */

    const DEBUG_PERF = false;
    const QUALITY_TIERS = [
      { name: 'high', cellSize: 4, slowMs: 20, fastMs: 10 },
      { name: 'medium', cellSize: 6, slowMs: 16, fastMs: 8 },
      { name: 'low', cellSize: 8, slowMs: 13, fastMs: 7 }
    ];
    const FIELD_THRESHOLD = 0.92;
    const FIELD_RIM_BAND = 0.44;
    const FIELD_INFLUENCE_FACTOR = 2.35;
    const MAX_HOLD_MS = 2100;
    const MIN_HOLD_MS = 80;
    const TAP_TO_HOLD_MS = 190;
    const TAP_MOVE_TOLERANCE = 9;
    const SPLATTER_MIN_DROPS = 3;
    const SPLATTER_MAX_DROPS = 5;
    const SPLATTER_RADIUS = 34;
    const RESET_HOLD_MS = 750;
    const CORNER_ACTION_SIZE = 72;
    const SETTLE_EPSILON = 0.985;
    const DIRTY_PADDING_CELLS = 5;
    const FULL_REDRAW_COVERAGE = 0.50;
    const SEED_BUCKET_SIZE = 30;
    const MIN_SEEDS_PER_POOL = 70;
    const MAX_SEEDS_PER_POOL = 260;
    const RAKE_RADIUS = 16;
    const RAKE_TOOTH_COUNT = 5;
    const RAKE_TOOTH_SPACING = 15;
    const RAKE_STEP = 5;
    const RAKE_SMOOTHING = 0.42;
    const RAKE_STRENGTH = 1.18;
    const RAKE_MIN_MOVE = 3;

    const PALETTES = [
      { name: 'traditional marbling', surface: '#f3ead8', grain: '#d8c6a8', shadow: '#3a2a21', pigments: [
        { base: '#173b62', rim: '#0b2138', wash: '#6f8fb0' }, { base: '#7d2630', rim: '#42121a', wash: '#b96f68' }, { base: '#c18a2f', rim: '#765119', wash: '#dfbd71' }, { base: '#53673a', rim: '#2c381f', wash: '#9aa574' }, { base: '#d9c8a4', rim: '#8f7650', wash: '#f2e6c9' }
      ]},
      { name: 'bright playful', surface: '#fbf2df', grain: '#e1cfaa', shadow: '#24212b', pigments: [
        { base: '#f0645f', rim: '#9e2d32', wash: '#ffaaa0' }, { base: '#17a6a5', rim: '#08666d', wash: '#8bdad2' }, { base: '#f3cf38', rim: '#a77c0d', wash: '#ffe988' }, { base: '#8066c8', rim: '#46337d', wash: '#b9a6ed' }, { base: '#2351c6', rim: '#142a77', wash: '#7e9dea' }
      ]},
      { name: 'portfolio subdued', surface: '#f1eadc', grain: '#d0c2aa', shadow: '#2b2925', pigments: [
        { base: '#29313a', rim: '#11161b', wash: '#737b83' }, { base: '#a85f47', rim: '#653225', wash: '#d7a18b' }, { base: '#4f827f', rim: '#294a49', wash: '#9abcb7' }, { base: '#d8c6a0', rim: '#856f49', wash: '#f0e4c4' }, { base: '#b8733b', rim: '#70401f', wash: '#d6a06b' }
      ]},
      { name: 'monochrome ink', surface: '#f5f1e8', grain: '#cbc2b1', shadow: '#171a20', pigments: [
        { base: '#101b2a', rim: '#05090f', wash: '#657287' }, { base: '#3e4855', rim: '#1b2129', wash: '#8b95a1' }, { base: '#777a76', rim: '#3d403f', wash: '#babcb3' }, { base: '#b6b7aa', rim: '#74786d', wash: '#deded2' }
      ]}
    ];

    let pools = [];
    let seeds = [];
    let activePress = null;
    let activeTool = 'drop';
    let paletteIndex = 0;
    let pigmentIndex = 0;
    let poolId = 1;
    let seedId = 1;
    let dirty = true;
    let settled = true;
    let qualityIndex = 0;
    let quality = QUALITY_TIERS[0];
    let fieldCols = 0;
    let fieldRows = 0;
    let field = [];
    let seedHash = new Map();
    let seedHashDirty = true;
    let dirtyRects = [];
    let fullFieldDirty = true;
    let paperLayer;
    let pigmentLayer;
    let lastDrawHadMotion = false;
    let pendingReset = null;
    let lastRenderMs = 0;
    let slowFrameStreak = 0;
    let fastFrameStreak = 0;
    let lastPreviewRect = null;
    let raking = false;
    let lastRakePoint = null;
    let lastRakeRawPoint = null;
    let rakeDirection = null;

    function setup() {
      pixelDensity(1);
      createCanvas(windowWidth, windowHeight);
      chooseInitialQuality();
      rebuildSurfaces();
      bindToolbar();
      updateHint();
    }

    function draw() {
      let moving = !!activePress;
      for (const pool of pools) if (pool.update()) moving = true;
      markActivePreviewDirty();
      settled = !activePress && pools.every(pool => pool.settled);
      if (moving || dirty || lastDrawHadMotion) {
        adaptQuality(moving || !!activePress || raking);
        renderScene();
        dirty = false;
      } else {
        image(paperLayer, 0, 0);
        image(pigmentLayer, 0, 0);
      }
      lastDrawHadMotion = moving;
    }

    function rebuildSurfaces() {
      fieldCols = Math.ceil(width / quality.cellSize);
      fieldRows = Math.ceil(height / quality.cellSize);
      field = new Array(fieldCols * fieldRows);
      paperLayer = createGraphics(width, height);
      pigmentLayer = createGraphics(width, height);
      paperLayer.pixelDensity(1);
      pigmentLayer.pixelDensity(1);
      renderPaper();
      for (const pool of pools) pool.updateGeometry();
      lastPreviewRect = null;
      seedHashDirty = true;
      markFullFieldDirty();
    }

    function renderPaper() {
      const palette = PALETTES[paletteIndex];
      paperLayer.background(palette.surface);
      paperLayer.noStroke();
      paperLayer.randomSeed(4887);
      const grainColor = color(palette.grain);
      for (let i = 0; i < (width * height) / 46; i++) {
        const x = paperLayer.random(width);
        const y = paperLayer.random(height);
        const a = paperLayer.random(5, 18);
        const r = paperLayer.random(0.35, 1.6);
        paperLayer.fill(red(grainColor), green(grainColor), blue(grainColor), a);
        paperLayer.circle(x, y, r);
      }
      for (let y = 0; y < height; y += 3) {
        const a = 4 + 3 * noise(y * 0.008, 17.3);
        paperLayer.stroke(255, 248, 232, a);
        paperLayer.line(0, y, width, y);
      }
    }

    function renderScene() {
      image(paperLayer, 0, 0);
      renderPigmentField();
      image(pigmentLayer, 0, 0);
      renderPressPreview();
      renderRakeCursor();
    }

    function renderPigmentField() {
      const startedAt = performance.now();
      if (seedHashDirty) rebuildSeedHash();
      const showPreview = activePress && shouldRenderHoldPreview(activePress);
      const renderPools = showPreview ? pools.concat([previewPoolFromPress(activePress)]) : pools;
      const rects = consumeDirtyRects();
      clearPigmentRects(rects);
      evaluateField(renderPools, rects, showPreview);

      pigmentLayer.noStroke();
      for (const rect of rects) {
        for (let gy = rect.y0; gy < rect.y1; gy++) {
          for (let gx = rect.x0; gx < rect.x1; gx++) {
            const cell = field[gx + gy * fieldCols];
            if (!cell || cell.owner < 0) continue;
            const pool = renderPools[cell.owner];
            if (!pool) continue;
            drawPigmentCell(gx, gy, cell, pool, hasDifferentNeighbor(gx, gy, cell.owner));
          }
        }
      }
      lastRenderMs = performance.now() - startedAt;
      if (DEBUG_PERF) console.log(`[density-voronoi] ${quality.name} ${renderPools.length} pools ${seeds.length} seeds ${lastRenderMs.toFixed(1)}ms`);
    }

    function evaluateField(renderPools, rects, hasPreview) {
      const cellSize = quality.cellSize;
      for (const rect of rects) {
        const candidates = poolsForRect(renderPools, rect);
        for (let gy = rect.y0; gy < rect.y1; gy++) {
          for (let gx = rect.x0; gx < rect.x1; gx++) {
            const x = gx * cellSize + cellSize * 0.5;
            const y = gy * cellSize + cellSize * 0.5;
            const boundary = solveBoundaryAt(renderPools, candidates, x, y);
            const idx = gx + gy * fieldCols;
            if (boundary.best < 0 || boundary.bestField < FIELD_THRESHOLD) {
              field[idx] = { owner: -1, strength: boundary.bestField, margin: 0 };
              continue;
            }
            const pool = renderPools[boundary.best];
            const seedInfo = hasPreview && pool.preview ? previewSeedInfo(pool, x, y, gx, gy) : reconstructFromSeeds(pool, x, y);
            field[idx] = { owner: boundary.best, strength: boundary.bestField, margin: boundary.bestField - boundary.secondField, seedInfo };
          }
        }
      }
    }

    function solveBoundaryAt(renderPools, candidates, x, y) {
      let best = -1;
      let bestField = 0;
      let bestAge = -1;
      let secondField = 0;
      for (const i of candidates) {
        const pool = renderPools[i];
        if (!pool.containsPoint(x, y)) continue;
        const f = pool.fieldAt(x, y);
        if (f > secondField) secondField = f;
        const newerTie = Math.abs(f - bestField) < 0.045 && pool.createdAt > bestAge;
        if (f > bestField || (f > FIELD_THRESHOLD && newerTie)) {
          secondField = bestField;
          bestField = f;
          best = i;
          bestAge = pool.createdAt;
        }
      }
      return { best, bestField, bestAge, secondField };
    }

    function reconstructFromSeeds(pool, x, y) {
      const nearby = querySeeds(pool.id, x, y, 2);
      if (nearby.length === 0) return { hasSeed: false, density: 0, seam: false, nearest: null };
      let nearest = null;
      let nearestScore = Infinity;
      let second = null;
      let secondScore = Infinity;
      let density = 0;
      for (const seed of nearby) {
        const dx = x - seed.x;
        const dy = y - seed.y;
        const d2 = dx * dx + dy * dy + 1;
        const score = d2 / seed.mass;
        if (score < nearestScore) {
          second = nearest;
          secondScore = nearestScore;
          nearest = seed;
          nearestScore = score;
        } else if (score < secondScore) {
          second = seed;
          secondScore = score;
        }
        const reach = seed.radius;
        const influence = seed.mass * Math.exp(-d2 / (reach * reach));
        density += influence;
      }
      const seam = !!second && Math.abs(sqrt(nearestScore) - sqrt(secondScore)) < 1.8;
      return { hasSeed: true, density, seam, nearest, second };
    }

    function previewSeedInfo(pool, x, y, gx, gy) {
      const d = dist(x, y, pool.center.x, pool.center.y);
      const baseR = sqrt(pool.targetMass / PI) * 1.1;
      const ring = 0.5 + 0.5 * stableNoise(gx, gy, pool.seed);
      const density = constrain(1.7 - d / max(8, baseR) + ring * 0.5, 0, 2.1);
      return { hasSeed: true, density, seam: ring > 0.72, nearest: { rgb: pool.rgb, mass: 1, radius: 24, phase: pool.seed } };
    }

    function drawPigmentCell(gx, gy, cell, pool, neighborRim) {
      const info = cell.seedInfo || { density: 0, hasSeed: false };
      const cellSize = quality.cellSize;
      const x = gx * cellSize;
      const y = gy * cellSize;
      const n = stableNoise(gx, gy, pool.seed + (info.nearest ? info.nearest.phase : 0));
      const edgeT = constrain((cell.strength - FIELD_THRESHOLD) / FIELD_RIM_BAND, 0, 1);
      const densityT = constrain(info.density / 1.45, 0, 1.55);
      const finiteAlpha = info.hasSeed ? constrain(18 + densityT * 112, 10, 184) : 10;
      const paleGap = constrain(1 - densityT, 0, 1);
      const veinT = constrain((densityT - 0.72) * 1.2, 0, 0.82);
      const rimT = neighborRim ? 0.68 : max(0, 1 - edgeT) * 0.62;
      const seamT = info.seam ? 0.22 : 0;
      const ownerRgb = info.nearest && info.nearest.rgb ? info.nearest.rgb : pool.rgb;
      let c = mixRgb(ownerRgb.wash, ownerRgb.base, constrain(densityT * 0.92, 0, 1));
      c = mixRgb(c, ownerRgb.rim, max(rimT, seamT, veinT * 0.58));
      const alpha = finiteAlpha * (0.38 + edgeT * 0.62) * (info.hasSeed ? 1 : 0.25);
      pigmentLayer.fill(
        constrain(c.r + (n - 0.5) * 13 + paleGap * 16, 0, 255),
        constrain(c.g + (n - 0.5) * 13 + paleGap * 13, 0, 255),
        constrain(c.b + (n - 0.5) * 13 + paleGap * 9, 0, 255),
        alpha
      );
      pigmentLayer.rect(x, y, cellSize + 0.8, cellSize + 0.8);

      if ((neighborRim || info.seam || veinT > 0.28) && (gx + gy) % 2 === 0) {
        pigmentLayer.fill(ownerRgb.rim.r, ownerRgb.rim.g, ownerRgb.rim.b, neighborRim ? 46 : 28 + 34 * veinT);
        pigmentLayer.rect(x, y, cellSize + 0.8, cellSize + 0.8);
      }
      if (paleGap > 0.52 && edgeT > 0.4 && !neighborRim && (gx * 17 + gy * 11) % 5 === 0) {
        pigmentLayer.fill(255, 248, 232, 11 + paleGap * 26);
        pigmentLayer.rect(x, y, cellSize + 0.8, cellSize + 0.8);
      }
    }

    function rebuildSeedHash() {
      seedHash = new Map();
      for (const seed of seeds) {
        const key = seedBucketKey(seed.x, seed.y);
        if (!seedHash.has(key)) seedHash.set(key, []);
        seedHash.get(key).push(seed);
      }
      seedHashDirty = false;
    }

    function seedBucketKey(x, y) {
      return `${floor(x / SEED_BUCKET_SIZE)},${floor(y / SEED_BUCKET_SIZE)}`;
    }

    function querySeeds(poolIdValue, x, y, ring) {
      const bx = floor(x / SEED_BUCKET_SIZE);
      const by = floor(y / SEED_BUCKET_SIZE);
      const result = [];
      for (let yy = by - ring; yy <= by + ring; yy++) {
        for (let xx = bx - ring; xx <= bx + ring; xx++) {
          const bucket = seedHash.get(`${xx},${yy}`);
          if (!bucket) continue;
          for (const seed of bucket) if (seed.poolId === poolIdValue) result.push(seed);
        }
      }
      if (result.length || ring >= 4) return result;
      return querySeeds(poolIdValue, x, y, ring + 1);
    }

    function markFullFieldDirty() { fullFieldDirty = true; dirtyRects = []; dirty = true; }
    function markDirtyRect(rect) {
      if (!rect || fullFieldDirty) { dirty = true; return; }
      const clamped = clampRect(expandRect(rect, DIRTY_PADDING_CELLS));
      if (!clamped) return;
      dirtyRects.push(clamped);
      dirty = true;
    }
    function consumeDirtyRects() {
      if (fullFieldDirty || dirtyRects.length === 0) {
        fullFieldDirty = false;
        dirtyRects = [];
        return [{ x0: 0, y0: 0, x1: fieldCols, y1: fieldRows }];
      }
      const rect = dirtyRects.reduce((merged, next) => unionRects(merged, next));
      dirtyRects = [];
      return rectArea(rect) / max(1, fieldCols * fieldRows) > FULL_REDRAW_COVERAGE ? [{ x0: 0, y0: 0, x1: fieldCols, y1: fieldRows }] : [rect];
    }
    function clearPigmentRects(rects) {
      const cellSize = quality.cellSize;
      for (const rect of rects) pigmentLayer.drawingContext.clearRect(rect.x0 * cellSize, rect.y0 * cellSize, (rect.x1 - rect.x0) * cellSize + cellSize, (rect.y1 - rect.y0) * cellSize + cellSize);
    }
    function poolsForRect(renderPools, rect) {
      const candidates = [];
      for (let i = 0; i < renderPools.length; i++) if (renderPools[i].fieldRect && rectsOverlap(renderPools[i].fieldRect, rect)) candidates.push(i);
      return candidates;
    }
    function markActivePreviewDirty() {
      if (!activePress || !shouldRenderHoldPreview(activePress)) {
        if (lastPreviewRect) markDirtyRect(lastPreviewRect);
        lastPreviewRect = null;
        return;
      }
      const preview = previewPoolFromPress(activePress);
      if (lastPreviewRect) markDirtyRect(lastPreviewRect);
      markDirtyRect(preview.fieldRect);
      lastPreviewRect = preview.fieldRect;
    }
    function unionRects(a, b) { return { x0: min(a.x0, b.x0), y0: min(a.y0, b.y0), x1: max(a.x1, b.x1), y1: max(a.y1, b.y1) }; }
    function expandRect(rect, cells) { return { x0: rect.x0 - cells, y0: rect.y0 - cells, x1: rect.x1 + cells, y1: rect.y1 + cells }; }
    function clampRect(rect) {
      const clamped = { x0: constrain(floor(rect.x0), 0, fieldCols), y0: constrain(floor(rect.y0), 0, fieldRows), x1: constrain(ceil(rect.x1), 0, fieldCols), y1: constrain(ceil(rect.y1), 0, fieldRows) };
      return clamped.x1 <= clamped.x0 || clamped.y1 <= clamped.y0 ? null : clamped;
    }
    function rectsOverlap(a, b) { return a.x0 < b.x1 && a.x1 > b.x0 && a.y0 < b.y1 && a.y1 > b.y0; }
    function rectArea(rect) { return max(0, rect.x1 - rect.x0) * max(0, rect.y1 - rect.y0); }
    function totalLobeCount(list) { return list.reduce((sum, pool) => sum + pool.lobes.length, 0); }
    function parseHexRgb(hex) { const raw = hex.replace('#', ''); return { r: parseInt(raw.slice(0,2), 16), g: parseInt(raw.slice(2,4), 16), b: parseInt(raw.slice(4,6), 16) }; }
    function mixRgb(a, b, t) { return { r: a.r + (b.r - a.r) * t, g: a.g + (b.g - a.g) * t, b: a.b + (b.b - a.b) * t }; }
    function hasDifferentNeighbor(gx, gy, owner) {
      const checks = [[1,0],[-1,0],[0,1],[0,-1]];
      for (const [dx, dy] of checks) {
        const nx = gx + dx, ny = gy + dy;
        if (nx < 0 || ny < 0 || nx >= fieldCols || ny >= fieldRows) return true;
        const n = field[nx + ny * fieldCols];
        if (!n || n.owner !== owner) return true;
      }
      return false;
    }

    function chooseInitialQuality() {
      const viewportCellsAtHigh = Math.ceil(width / QUALITY_TIERS[0].cellSize) * Math.ceil(height / QUALITY_TIERS[0].cellSize);
      const mobileHint = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
      qualityIndex = mobileHint || viewportCellsAtHigh > 90000 ? 1 : 0;
      quality = QUALITY_TIERS[qualityIndex];
    }
    function adaptQuality(interacting) {
      const crowded = pools.length > 14 || seeds.length > 2200 || totalLobeCount(pools) > 92;
      const slow = lastRenderMs > quality.slowMs || (interacting && crowded && qualityIndex === 0);
      const fast = settled && lastRenderMs > 0 && lastRenderMs < quality.fastMs && pools.length < 12 && seeds.length < 1600;
      slowFrameStreak = slow ? slowFrameStreak + 1 : 0;
      fastFrameStreak = fast ? fastFrameStreak + 1 : 0;
      if (slowFrameStreak >= 3 && qualityIndex < QUALITY_TIERS.length - 1) setQuality(qualityIndex + 1);
      else if (fastFrameStreak >= 90 && qualityIndex > 0) setQuality(qualityIndex - 1);
    }
    function setQuality(nextIndex) {
      if (nextIndex === qualityIndex) return;
      qualityIndex = nextIndex;
      quality = QUALITY_TIERS[qualityIndex];
      fieldCols = Math.ceil(width / quality.cellSize);
      fieldRows = Math.ceil(height / quality.cellSize);
      field = new Array(fieldCols * fieldRows);
      for (const pool of pools) pool.updateGeometry();
      slowFrameStreak = 0;
      fastFrameStreak = 0;
      markFullFieldDirty();
    }

    function renderPressPreview() {
      if (!activePress || !shouldRenderHoldPreview(activePress)) return;
      const held = millis() - activePress.startedAt;
      const t = holdToUnit(held);
      noFill();
      stroke(35, 25, 18, 38 + 30 * t);
      strokeWeight(1);
      const r = sqrt(holdToMass(held) / PI) * 1.15;
      circle(activePress.x, activePress.y, r * 2);
      stroke(255, 250, 238, 68);
      circle(activePress.x, activePress.y, max(8, r * 0.58));
      fill(35, 25, 18, 40 + 25 * t);
      noStroke();
      textSize(10);
      textAlign(CENTER, CENTER);
      text('material seeds', activePress.x, activePress.y - r - 12);
    }
    function renderRakeCursor() {
      if (!raking || !lastRakeRawPoint) return;
      noFill();
      stroke(45, 35, 25, 70);
      strokeWeight(1);
      circle(lastRakeRawPoint.x, lastRakeRawPoint.y, RAKE_RADIUS * 2);
    }
    function shouldRenderHoldPreview(press) { return press && millis() - press.startedAt >= TAP_TO_HOLD_MS; }
    function startPress(x, y) {
      const corner = handleCornerActionStart(x, y);
      if (corner) return;
      activePress = { x: constrain(x, 0, width), y: constrain(y, 0, height), startX: constrain(x, 0, width), startY: constrain(y, 0, height), moved: false, startedAt: millis(), color: choosePigment(), seed: random(1000000) };
      lastPreviewRect = null;
      markActivePreviewDirty();
    }
    function endPress() {
      if (!activePress) return;
      const press = activePress;
      const held = millis() - press.startedAt;
      if (lastPreviewRect) markDirtyRect(lastPreviewRect);
      lastPreviewRect = null;
      activePress = null;
      if (held < TAP_TO_HOLD_MS && !press.moved) addSplatter(press.x, press.y, press.color, press.seed);
      else addPool(createPool(press.x, press.y, held, press.color, press.seed, false));
    }
    function addPool(pool) {
      pools.push(pool);
      seedPool(pool);
      markDirtyRect(pool.fieldRect);
    }
    function addSplatter(x, y, pigment, seed) {
      randomSeed(floor(seed));
      const affected = [];
      const count = floor(random(SPLATTER_MIN_DROPS, SPLATTER_MAX_DROPS + 0.99));
      for (let i = 0; i < count; i++) {
        const angle = random(TWO_PI);
        const radius = sqrt(random()) * SPLATTER_RADIUS;
        const sx = constrain(x + cos(angle) * radius, 0, width);
        const sy = constrain(y + sin(angle) * radius, 0, height);
        const mass = random(180, 620) * (i === 0 ? 1.15 : 1);
        const lobes = floor(random(2, 4.99));
        const pool = createPoolFromMass(sx, sy, mass, lobes, pigment, seed + 97 * (i + 1), false);
        pools.push(pool);
        seedPool(pool);
        affected.push(pool.fieldRect);
      }
      for (const rect of affected) markDirtyRect(rect);
    }

    function holdToUnit(ms) { const clamped = constrain(ms, MIN_HOLD_MS, MAX_HOLD_MS); const t = (clamped - MIN_HOLD_MS) / (MAX_HOLD_MS - MIN_HOLD_MS); return t * t * (3 - 2 * t); }
    function holdToMass(ms) { return lerp(1600, min(width * height * 0.105, 36000), holdToUnit(ms)); }
    function choosePigment() { const palette = PALETTES[paletteIndex]; const pigment = palette.pigments[pigmentIndex % palette.pigments.length]; pigmentIndex++; return pigment; }
    function createPool(x, y, holdMs, pigment, seed, preview) {
      const mass = holdToMass(holdMs);
      const t = holdToUnit(holdMs);
      const maxLobes = pools.length < 8 && totalLobeCount(pools) < 46 && qualityIndex === 0 ? 9 : 8;
      return createPoolFromMass(x, y, mass, floor(lerp(3, maxLobes + 0.99, t)), pigment, seed, preview);
    }
    function createPoolFromMass(x, y, mass, lobeCount, pigment, seed, preview) { return new PigmentPool(preview ? -1 : poolId++, x, y, mass, lobeCount, pigment, seed, preview); }
    function previewPoolFromPress(press) {
      const p = createPool(press.x, press.y, millis() - press.startedAt, press.color, press.seed, true);
      p.currentMass = p.targetMass * 0.38;
      for (const lobe of p.lobes) { lobe.radius = lobe.targetRadius * 0.42; lobe.offsetNow = lobe.offsetTarget * 0.45; }
      p.updateGeometry();
      return p;
    }

    function seedPool(pool) {
      randomSeed(floor(pool.seed + 2027));
      const count = floor(constrain(pool.targetMass / 145, MIN_SEEDS_PER_POOL, MAX_SEEDS_PER_POOL));
      const variations = [];
      let sumVar = 0;
      for (let i = 0; i < count; i++) { const v = random(0.72, 1.35); variations.push(v); sumVar += v; }
      let made = 0;
      let attempts = 0;
      while (made < count && attempts < count * 80) {
        attempts++;
        const a = random(TWO_PI);
        const coreBias = random() < 0.72 ? pow(random(), 1.72) : random();
        const r = sqrt(pool.targetMass / PI) * random(0.05, 1.35) * coreBias;
        const x = constrain(pool.center.x + cos(a) * r + randomGaussian() * 7, 0, width);
        const y = constrain(pool.center.y + sin(a) * r + randomGaussian() * 7, 0, height);
        const f = pool.fieldAt(x, y);
        if (f < FIELD_THRESHOLD + 0.03 && random() > 0.13) continue;
        const mass = pool.targetMass / count * variations[made] / (sumVar / count);
        const radius = constrain(sqrt(mass) * random(1.9, 3.0), 10, 32);
        seeds.push({ id: seedId++, poolId: pool.id, x, y, prevX: x, prevY: y, mass: max(0.5, mass / 18), radius, rgb: pool.rgb, phase: random(10000), lockedInside: true });
        made++;
      }
      seedHashDirty = true;
    }

    class PigmentPool {
      constructor(id, x, y, mass, lobeCount, colorValue, seed, preview) {
        this.id = id;
        this.center = { x, y };
        this.createdAt = preview ? millis() + 999999 : millis();
        this.color = colorValue;
        this.rgb = { base: parseHexRgb(colorValue.base), rim: parseHexRgb(colorValue.rim), wash: parseHexRgb(colorValue.wash) };
        this.targetMass = mass;
        this.currentMass = preview ? mass * 0.35 : 32;
        this.growthRate = random(0.010, 0.018);
        this.seed = seed;
        this.settled = false;
        this.preview = preview;
        this.lobes = [];
        this.sampleLobes = [];
        this.pixelBounds = null;
        this.fieldRect = null;
        this.makeLobes(lobeCount);
        this.updateGeometry();
      }
      makeLobes(count) {
        randomSeed(floor(this.seed));
        const baseRadius = sqrt(this.targetMass / PI);
        const weights = [];
        let total = 0;
        for (let i = 0; i < count; i++) { const w = random(0.55, 1.45); weights.push(w); total += w; }
        for (let i = 0; i < count; i++) {
          const angle = TWO_PI * i / count + random(-0.55, 0.55);
          const offsetTarget = i === 0 ? 0 : random(baseRadius * 0.12, baseRadius * 0.64);
          const lobeMass = this.targetMass * weights[i] / total * random(0.88, 1.22);
          this.lobes.push({ angle, offsetTarget, offsetNow: 0, radius: 2 + random(0, 2), targetRadius: sqrt(lobeMass / PI) * random(1.55, 2.12), growthVariation: random(0.72, 1.22), phase: random(1000) });
        }
      }
      update() {
        if (this.preview || this.settled) return false;
        const previousRect = this.fieldRect;
        const before = this.currentMass;
        this.currentMass = lerp(this.currentMass, this.targetMass, this.growthRate);
        const progress = constrain(this.currentMass / this.targetMass, 0, 1);
        let moving = Math.abs(this.currentMass - before) > 0.2;
        for (const lobe of this.lobes) {
          const targetR = lobe.targetRadius * sqrt(progress);
          const nextR = lerp(lobe.radius, targetR, 0.045 * lobe.growthVariation);
          const nextOffset = lerp(lobe.offsetNow, lobe.offsetTarget, 0.032 * lobe.growthVariation);
          if (Math.abs(nextR - lobe.radius) > 0.05 || Math.abs(nextOffset - lobe.offsetNow) > 0.04) moving = true;
          lobe.radius = nextR;
          const drift = (noise(this.seed * 0.001, lobe.phase, progress * 1.7) - 0.5) * 4 * (1 - progress);
          lobe.offsetNow = nextOffset + drift;
        }
        if (progress >= SETTLE_EPSILON && !moving) this.settled = true;
        if (progress >= 0.998) {
          this.currentMass = this.targetMass;
          for (const lobe of this.lobes) { lobe.radius = lobe.targetRadius; lobe.offsetNow = lobe.offsetTarget; }
          this.settled = true;
          moving = true;
        }
        this.updateGeometry();
        if (moving) { markDirtyRect(previousRect); markDirtyRect(this.fieldRect); }
        return moving;
      }
      updateGeometry() {
        const cellSize = quality.cellSize;
        this.sampleLobes = [];
        let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
        for (const lobe of this.lobes) {
          const lx = this.center.x + cos(lobe.angle) * lobe.offsetNow;
          const ly = this.center.y + sin(lobe.angle) * lobe.offsetNow;
          const influenceRadius = max(8, lobe.radius * FIELD_INFLUENCE_FACTOR + 10);
          const warpRadius = lobe.radius * 0.18;
          this.sampleLobes.push({ x: lx, y: ly, radius: lobe.radius, radius2: lobe.radius * lobe.radius, influence2: (influenceRadius + warpRadius) * (influenceRadius + warpRadius), phase: lobe.phase, phaseCos: cos(lobe.phase), phaseSin: sin(lobe.phase) });
          x0 = min(x0, lx - influenceRadius - warpRadius); y0 = min(y0, ly - influenceRadius - warpRadius); x1 = max(x1, lx + influenceRadius + warpRadius); y1 = max(y1, ly + influenceRadius + warpRadius);
        }
        this.pixelBounds = { x0, y0, x1, y1 };
        this.fieldRect = clampRect({ x0: floor(x0 / cellSize) - 1, y0: floor(y0 / cellSize) - 1, x1: ceil(x1 / cellSize) + 1, y1: ceil(y1 / cellSize) + 1 });
      }
      containsPoint(x, y) { const b = this.pixelBounds; return !!b && x >= b.x0 && x <= b.x1 && y >= b.y0 && y <= b.y1; }
      fieldAt(x, y) {
        let sum = 0;
        for (const lobe of this.sampleLobes) {
          const roughDx = x - lobe.x, roughDy = y - lobe.y;
          if (roughDx * roughDx + roughDy * roughDy > lobe.influence2) continue;
          const warp = (stableNoise(floor(x * 0.025), floor(y * 0.025), this.seed + lobe.phase) - 0.5) * lobe.radius * 0.18;
          const dx = roughDx + lobe.phaseCos * warp;
          const dy = roughDy + lobe.phaseSin * warp;
          sum += lobe.radius2 / (dx * dx + dy * dy + 18);
        }
        return sum;
      }
      projectInside(seed) {
        if (this.fieldAt(seed.x, seed.y) >= FIELD_THRESHOLD + 0.02) return;
        let x = seed.x;
        let y = seed.y;
        for (let i = 0; i < 7; i++) {
          x = lerp(x, this.center.x, 0.24);
          y = lerp(y, this.center.y, 0.24);
          if (this.fieldAt(x, y) >= FIELD_THRESHOLD + 0.02) break;
        }
        seed.x = constrain(x, 0, width);
        seed.y = constrain(y, 0, height);
      }
    }

    function beginRake(x, y) {
      cancelResetHold();
      activePress = null;
      if (dirty || fullFieldDirty || dirtyRects.length) renderScene();
      raking = true;
      const point = { x: constrain(x, 0, width), y: constrain(y, 0, height) };
      lastRakePoint = point;
      lastRakeRawPoint = point;
      rakeDirection = null;
    }
    function finishRake() {
      if (!raking) return false;
      raking = false;
      lastRakePoint = null;
      lastRakeRawPoint = null;
      rakeDirection = null;
      dirty = true;
      return true;
    }
    function updateRake(x, y) {
      if (!raking || !lastRakePoint) return;
      const raw = { x: constrain(x, 0, width), y: constrain(y, 0, height) };
      const smooth = smoothRakePoint(raw);
      const dx = smooth.x - lastRakePoint.x;
      const dy = smooth.y - lastRakePoint.y;
      const len = sqrt(dx * dx + dy * dy);
      if (len < RAKE_MIN_MOVE) return;
      updateRakeDirection(dx, dy, len);
      const steps = max(1, ceil(len / RAKE_STEP));
      let from = lastRakePoint;
      for (let i = 1; i <= steps; i++) {
        const t = i / steps;
        const to = { x: lerp(lastRakePoint.x, smooth.x, t), y: lerp(lastRakePoint.y, smooth.y, t) };
        applySeedRake(from.x, from.y, to.x, to.y, rakeDirection);
        from = to;
      }
      lastRakePoint = smooth;
      lastRakeRawPoint = raw;
    }
    function smoothRakePoint(raw) { return !lastRakeRawPoint || !lastRakePoint ? raw : { x: lerp(lastRakePoint.x, raw.x, RAKE_SMOOTHING), y: lerp(lastRakePoint.y, raw.y, RAKE_SMOOTHING) }; }
    function updateRakeDirection(dx, dy, len) {
      const ux = dx / len, uy = dy / len;
      if (!rakeDirection) { rakeDirection = { x: ux, y: uy }; return; }
      const bx = lerp(rakeDirection.x, ux, 0.28), by = lerp(rakeDirection.y, uy, 0.28);
      const bl = sqrt(bx * bx + by * by) || 1;
      rakeDirection = { x: bx / bl, y: by / bl };
    }
    function applySeedRake(x0, y0, x1, y1, direction) {
      const dx = x1 - x0, dy = y1 - y0, len = sqrt(dx * dx + dy * dy);
      if (len < 0.25 || seeds.length === 0) return;
      const ux = direction ? direction.x : dx / len, uy = direction ? direction.y : dy / len;
      const nx = -uy, ny = ux;
      const start = -(RAKE_TOOTH_COUNT - 1) * 0.5;
      let dirtyRect = null;
      for (let i = 0; i < RAKE_TOOTH_COUNT; i++) {
        const offset = (start + i) * RAKE_TOOTH_SPACING;
        const rect = applySingleSeedTooth(x0 + nx * offset, y0 + ny * offset, x1 + nx * offset, y1 + ny * offset, max(len, RAKE_STEP), ux, uy, i);
        if (rect) dirtyRect = dirtyRect ? unionRects(dirtyRect, rect) : rect;
      }
      if (dirtyRect) {
        seedHashDirty = true;
        markDirtyRect(dirtyRect);
      }
    }
    function applySingleSeedTooth(x0, y0, x1, y1, len, ux, uy, toothIndex) {
      const pad = RAKE_RADIUS + 26;
      const candidates = seedsInPixelRect(min(x0, x1) - pad, min(y0, y1) - pad, max(x0, x1) + pad, max(y0, y1) + pad);
      if (!candidates.length) return null;
      let px0 = Infinity, py0 = Infinity, px1 = -Infinity, py1 = -Infinity;
      for (const seed of candidates) {
        const nearest = closestPointOnSegment(seed.x, seed.y, x0, y0, x1, y1);
        const ddx = seed.x - nearest.x, ddy = seed.y - nearest.y;
        const distToTooth = sqrt(ddx * ddx + ddy * ddy);
        if (distToTooth > RAKE_RADIUS) continue;
        const falloff = smoothFalloff(1 - distToTooth / RAKE_RADIUS);
        if (falloff <= 0.01) continue;
        px0 = min(px0, seed.x); py0 = min(py0, seed.y); px1 = max(px1, seed.x); py1 = max(py1, seed.y);
        seed.prevX = seed.x; seed.prevY = seed.y;
        const lag = 0.56 + 0.36 * noise(seed.phase, millis() * 0.002, toothIndex);
        const carry = min(len * RAKE_STRENGTH * falloff * lag, 18);
        const jitter = (noise(seed.phase + 91.7, nearest.x * 0.011, nearest.y * 0.011) - 0.5) * 3.8 * falloff;
        seed.x = constrain(seed.x + ux * carry - uy * jitter, 0, width);
        seed.y = constrain(seed.y + uy * carry + ux * jitter, 0, height);
        const pool = pools.find(p => p.id === seed.poolId);
        if (pool) pool.projectInside(seed);
        px0 = min(px0, seed.x); py0 = min(py0, seed.y); px1 = max(px1, seed.x); py1 = max(py1, seed.y);
      }
      if (!isFinite(px0)) return null;
      const cellSize = quality.cellSize;
      return clampRect({ x0: floor((px0 - pad) / cellSize), y0: floor((py0 - pad) / cellSize), x1: ceil((px1 + pad) / cellSize), y1: ceil((py1 + pad) / cellSize) });
    }
    function seedsInPixelRect(x0, y0, x1, y1) {
      if (seedHashDirty) rebuildSeedHash();
      const bx0 = floor(x0 / SEED_BUCKET_SIZE), by0 = floor(y0 / SEED_BUCKET_SIZE), bx1 = floor(x1 / SEED_BUCKET_SIZE), by1 = floor(y1 / SEED_BUCKET_SIZE);
      const result = [];
      for (let by = by0; by <= by1; by++) for (let bx = bx0; bx <= bx1; bx++) {
        const bucket = seedHash.get(`${bx},${by}`);
        if (bucket) result.push(...bucket);
      }
      return result;
    }
    function smoothFalloff(t) { const clamped = constrain(t, 0, 1); return clamped * clamped * (3 - 2 * clamped); }
    function closestPointOnSegment(px, py, x0, y0, x1, y1) {
      const sx = x1 - x0, sy = y1 - y0, l2 = sx * sx + sy * sy;
      if (l2 <= 0.0001) return { x: x0, y: y0 };
      const t = constrain(((px - x0) * sx + (py - y0) * sy) / l2, 0, 1);
      return { x: x0 + sx * t, y: y0 + sy * t };
    }

    function handleCornerActionStart(x, y) { if (isTopLeftAction(x, y)) { nextPalette(); return true; } if (isTopRightAction(x, y)) { startResetHold(x, y); return true; } return false; }
    function isTopLeftAction(x, y) { return x < CORNER_ACTION_SIZE && y < CORNER_ACTION_SIZE; }
    function isTopRightAction(x, y) { return x > width - CORNER_ACTION_SIZE && y < CORNER_ACTION_SIZE; }
    function startResetHold(x, y) {
      cancelResetHold();
      pendingReset = { x, y, completed: false, timer: window.setTimeout(() => { if (!pendingReset) return; pendingReset.completed = true; resetAll(); }, RESET_HOLD_MS) };
      dirty = true;
    }
    function cancelResetHold() { if (!pendingReset) return; window.clearTimeout(pendingReset.timer); pendingReset = null; dirty = true; }
    function updateCornerActionHold(x, y) { if (pendingReset && !pendingReset.completed && !isTopRightAction(x, y)) cancelResetHold(); }
    function finishCornerActionHold() { if (pendingReset && !pendingReset.completed) { cancelResetHold(); return true; } if (pendingReset && pendingReset.completed) { pendingReset = null; return true; } return false; }
    function handlePointerMove(x, y) {
      updateCornerActionHold(x, y);
      if (!activePress) return;
      const dx = x - activePress.startX, dy = y - activePress.startY;
      if (sqrt(dx * dx + dy * dy) > TAP_MOVE_TOLERANCE) activePress.moved = true;
    }
    function touchCentroid() { if (!touches || touches.length === 0) return { x: mouseX, y: mouseY }; let x = 0, y = 0; for (const t of touches) { x += t.x; y += t.y; } return { x: x / touches.length, y: y / touches.length }; }
    function stableNoise(x, y, seed) { return noise(x * 0.13 + seed * 0.0007, y * 0.13 - seed * 0.0003); }
    function nextPalette() { paletteIndex = (paletteIndex + 1) % PALETTES.length; pigmentIndex = 0; renderPaper(); updateHint(); markFullFieldDirty(); }
    function resetAll() {
      if (pendingReset) { window.clearTimeout(pendingReset.timer); pendingReset = null; }
      pools = [];
      seeds = [];
      activePress = null;
      finishRake();
      seedHashDirty = true;
      lastPreviewRect = null;
      pigmentLayer.clear();
      renderPaper();
      markFullFieldDirty();
      settled = true;
    }
    function updateHint() {
      const el = document.getElementById('hint');
      const toolLabel = activeTool === 'rake' ? 'rake finite seeds: drag to bunch veins / open pale gaps' : 'drop finite material seeds: hold for more mass';
      el.textContent = `Voronoi material-seed density · ${toolLabel} · Shift/two-finger rake · P palette · R reset · ${PALETTES[paletteIndex].name}`;
      updateToolbarState();
    }
    function bindToolbar() {
      const toolbar = document.getElementById('topToolbar');
      if (!toolbar || toolbar.dataset.bound === 'true') return;
      toolbar.dataset.bound = 'true';
      toolbar.addEventListener('pointerdown', event => event.stopPropagation());
      toolbar.addEventListener('touchstart', event => event.stopPropagation(), { passive: false });
      document.getElementById('dropTool').addEventListener('click', event => { event.preventDefault(); setActiveTool('drop'); });
      document.getElementById('rakeTool').addEventListener('click', event => { event.preventDefault(); setActiveTool('rake'); });
      document.getElementById('paletteTool').addEventListener('click', event => { event.preventDefault(); nextPalette(); });
      document.getElementById('resetTool').addEventListener('click', event => { event.preventDefault(); resetAll(); });
      updateToolbarState();
    }
    function setActiveTool(tool) { activeTool = tool; finishRake(); activePress = null; updateHint(); }
    function updateToolbarState() {
      const drop = document.getElementById('dropTool');
      const rake = document.getElementById('rakeTool');
      if (!drop || !rake) return;
      drop.classList.toggle('active', activeTool === 'drop');
      rake.classList.toggle('active', activeTool === 'rake');
    }
    function keyPressed() { if (key === 'p' || key === 'P') nextPalette(); if (key === 'r' || key === 'R' || keyCode === ESCAPE) resetAll(); }
    function mousePressed() { if (touches && touches.length) return false; if (activeTool === 'rake' || keyIsDown(SHIFT)) { beginRake(mouseX, mouseY); return false; } startPress(mouseX, mouseY); return false; }
    function mouseReleased() { if (touches && touches.length) return false; if (finishRake()) return false; if (finishCornerActionHold()) return false; endPress(); return false; }
    function mouseDragged() { if (touches && touches.length) return false; if (raking) { updateRake(mouseX, mouseY); return false; } handlePointerMove(mouseX, mouseY); return false; }
    function touchStarted() {
      if (touches && touches.length >= 2) { const p = touchCentroid(); beginRake(p.x, p.y); return false; }
      if (activeTool === 'rake') { beginRake(mouseX, mouseY); return false; }
      const t = touches && touches.length ? touches[0] : { x: mouseX, y: mouseY };
      startPress(t.x, t.y);
      return false;
    }
    function touchMoved() {
      if (raking) { const p = touches && touches.length ? touchCentroid() : { x: mouseX, y: mouseY }; updateRake(p.x, p.y); return false; }
      const t = touches && touches.length ? touches[0] : { x: mouseX, y: mouseY };
      handlePointerMove(t.x, t.y);
      return false;
    }
    function touchEnded() { if (raking) { finishRake(); return false; } if (finishCornerActionHold()) return false; endPress(); return false; }
    function windowResized() { resizeCanvas(windowWidth, windowHeight); chooseInitialQuality(); rebuildSurfaces(); }

    document.addEventListener('gesturestart', event => event.preventDefault());
    document.addEventListener('touchmove', event => event.preventDefault(), { passive: false });
  </script>
</body>
