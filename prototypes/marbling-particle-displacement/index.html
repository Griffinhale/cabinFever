<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Marbling Particle Displacement Prototype</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; }
    body {
      touch-action: none;
      background: #f3ead7;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    canvas { display: block; }
    #hint {
      position: fixed;
      left: 10px;
      bottom: 9px;
      z-index: 2;
      color: rgba(62, 50, 36, 0.52);
      font-size: 11px;
      letter-spacing: 0.02em;
      pointer-events: none;
      user-select: none;
      text-shadow: 0 1px 0 rgba(255,255,255,0.35);
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
</head>
<body>
  <div id="hint">hold to drop · P palette · R reset</div>
  <script>
    p5.disableFriendlyErrors = true;

    function setup() {
      pixelDensity(1);
      createCanvas(windowWidth, windowHeight);
      noStroke();
      background('#f3ead7');
    }

    function draw() {
      background('#f3ead7');
      fill(75, 55, 35, 24);
      textSize(11);
      textAlign(RIGHT, TOP);
      text('particle/fluid-ish displacement probe', width - 10, 9);
    }

    function keyPressed() {
      if (key === 'r' || key === 'R') background('#f3ead7');
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
  </script>
</body>
</html>
