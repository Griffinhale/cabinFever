<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Marbling Shader / SDF Prototype</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #f4efe3; touch-action: none; }
    canvas { display: block; position: fixed; inset: 0; width: 100vw !important; height: 100vh !important; }
    .hint { position: fixed; left: 12px; bottom: 10px; z-index: 2; color: rgba(45, 38, 29, 0.48); font: 11px/1.45 ui-monospace, Menlo, monospace; letter-spacing: 0.03em; pointer-events: none; user-select: none; }
  </style>
</head>
<body>
  <div class="hint">hold to drop · P palette · R reset</div>
  <script>
    /* Standalone p5 WEBGL shader shell for the marbling SDF prototype. */
    p5.disableFriendlyErrors = true;

    const VERT_SHADER = `
      precision highp float;
      attribute vec3 aPosition;
      varying vec2 vUv;
      void main() {
        // Full-screen clip-space quad; p5 WEBGL's usual centered pixel space is bypassed.
        vUv = aPosition.xy * 0.5 + 0.5;
        gl_Position = vec4(aPosition.xy, 0.0, 1.0);
      }
    `;

    const FRAG_SHADER = `
      precision highp float;
      uniform vec2 u_resolution;
      varying vec2 vUv;
      float hash12(vec2 p) {
        vec3 p3 = fract(vec3(p.xyx) * 0.1031);
        p3 += dot(p3, p3.yzx + 33.33);
        return fract((p3.x + p3.y) * p3.z);
      }
      void main() {
        vec2 px = vUv * u_resolution;
        float grain = hash12(floor(px * 0.65));
        vec3 cream = vec3(0.957, 0.937, 0.890);
        vec3 fiber = vec3(0.78, 0.72, 0.61);
        gl_FragColor = vec4(mix(cream, fiber, grain * 0.045), 1.0);
      }
    `;

    let theShader;
    function setup() {
      createCanvas(windowWidth, windowHeight, WEBGL);
      pixelDensity(1);
      noStroke();
      theShader = createShader(VERT_SHADER, FRAG_SHADER);
    }
    function draw() {
      shader(theShader);
      theShader.setUniform('u_resolution', [width, height]);
      beginShape();
      vertex(-1, -1, 0); vertex(1, -1, 0); vertex(1, 1, 0); vertex(-1, 1, 0);
      endShape(CLOSE);
    }
    function windowResized() { resizeCanvas(windowWidth, windowHeight); }
  </script>
</body>
</html>
