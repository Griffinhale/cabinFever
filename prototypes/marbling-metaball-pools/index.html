<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Marbling Metaball Pools Prototype</title>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
  <script>window.p5 && (p5.disableFriendlyErrors = true);</script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f4eddf;
      touch-action: none;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
    }
    canvas { display: block; touch-action: none; }
    #hint {
      position: fixed;
      left: 10px;
      bottom: 8px;
      z-index: 10;
      color: rgba(45, 35, 25, 0.46);
      font: 11px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      letter-spacing: 0.02em;
      pointer-events: none;
      text-shadow: 0 1px 0 rgba(255,255,255,0.35);
    }
    #cornerActions {
      position: fixed;
      right: 8px;
      bottom: 8px;
      z-index: 11;
      color: rgba(45, 35, 25, 0.34);
      font: 10px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      pointer-events: none;
      text-align: right;
    }
  </style>
</head>
<body>
  <div id="hint">hold to drop · P palette · R reset</div>
  <div id="cornerActions">tap top-left: palette<br>hold top-right: reset</div>
  <script>
    /*
      Marbling metaballs / implicit pigment pools prototype.

      Standalone p5 sketch that tests whether same-pigment metaball lobes plus
      strongest-owner clipping can make soft marbled pools without collapsing
      all colors into one global lava-lamp blob. Kept self-contained for quick
      comparison with sibling architecture prototypes.
    */

    const DEBUG_PERF = false;
    const QUALITY_TIERS = [
      { name: 'high', cellSize: 4, slowMs: 18, fastMs: 10, maxCellsPerPass: 36000 },
      { name: 'medium', cellSize: 6, slowMs: 15, fastMs: 8, maxCellsPerPass: 24000 },
      { name: 'low', cellSize: 8, slowMs: 13, fastMs: 7, maxCellsPerPass: 16000 }
    ];
    const FIELD_THRESHOLD = 0.92;
    const FIELD_RIM_BAND = 0.42;
    const FIELD_INFLUENCE_FACTOR = 2.35;
    const DIRTY_PADDING_CELLS = 3;
    const FULL_REDRAW_COVERAGE = 0.52;
    const MAX_HOLD_MS = 2100;
    const MIN_HOLD_MS = 80;
    const RESET_HOLD_MS = 750;
    const CORNER_ACTION_SIZE = 72;
    const SETTLE_EPSILON = 0.985;

    const PALETTES = [
      {
        name: 'traditional marbling',
        surface: '#f3ead8',
        grain: '#d8c6a8',
        shadow: '#3a2a21',
        pigments: [
          { base: '#173b62', rim: '#0b2138', wash: '#6f8fb0' },
          { base: '#7d2630', rim: '#42121a', wash: '#b96f68' },
          { base: '#c18a2f', rim: '#765119', wash: '#dfbd71' },
          { base: '#53673a', rim: '#2c381f', wash: '#9aa574' },
          { base: '#d9c8a4', rim: '#8f7650', wash: '#f2e6c9' }
        ]
      },
      {
        name: 'bright playful',
        surface: '#fbf2df',
        grain: '#e1cfaa',
        shadow: '#24212b',
        pigments: [
          { base: '#f0645f', rim: '#9e2d32', wash: '#ffaaa0' },
          { base: '#17a6a5', rim: '#08666d', wash: '#8bdad2' },
          { base: '#f3cf38', rim: '#a77c0d', wash: '#ffe988' },
          { base: '#8066c8', rim: '#46337d', wash: '#b9a6ed' },
          { base: '#2351c6', rim: '#142a77', wash: '#7e9dea' }
        ]
      },
      {
        name: 'portfolio subdued',
        surface: '#f1eadc',
        grain: '#d0c2aa',
        shadow: '#2b2925',
        pigments: [
          { base: '#29313a', rim: '#11161b', wash: '#737b83' },
          { base: '#a85f47', rim: '#653225', wash: '#d7a18b' },
          { base: '#4f827f', rim: '#294a49', wash: '#9abcb7' },
          { base: '#d8c6a0', rim: '#856f49', wash: '#f0e4c4' },
          { base: '#b8733b', rim: '#70401f', wash: '#d6a06b' }
        ]
      },
      {
        name: 'monochrome ink',
        surface: '#f5f1e8',
        grain: '#cbc2b1',
        shadow: '#171a20',
        pigments: [
          { base: '#101b2a', rim: '#05090f', wash: '#657287' },
          { base: '#3e4855', rim: '#1b2129', wash: '#8b95a1' },
          { base: '#777a76', rim: '#3d403f', wash: '#babcb3' },
          { base: '#b6b7aa', rim: '#74786d', wash: '#deded2' }
        ]
      }
    ];

    let pools = [];
    let activePress = null;
    let paletteIndex = 0;
    let pigmentIndex = 0;
    let poolId = 1;
    let dirty = true;
    let settled = true;
    let qualityIndex = 0;
    let quality = QUALITY_TIERS[qualityIndex];
    let fieldCols = 0;
    let fieldRows = 0;
    let field = [];
    let dirtyRects = [];
    let fullFieldDirty = true;
    let paperLayer;
    let pigmentLayer;
    let lastDrawHadMotion = false;
    let pendingReset = null;
    let lastRenderMs = 0;
    let slowFrameStreak = 0;
    let fastFrameStreak = 0;
    let lastPreviewRect = null;

    function setup() {
      pixelDensity(1);
      createCanvas(windowWidth, windowHeight);
      chooseInitialQuality();
      rebuildSurfaces();
      updateHint();
    }

    function draw() {
      let moving = false;
      if (activePress) moving = true;

      for (const pool of pools) {
        if (pool.update()) moving = true;
      }

      markActivePreviewDirty();

      // Static-settle detection: when no press preview exists and every pool has
      // reached its target radii, stop mutating lobe offsets/noise and stop
      // recomputing the expensive field until new input/resizes/reset occurs.
      settled = !activePress && pools.every(pool => pool.settled);
      if (moving || dirty || lastDrawHadMotion) {
        adaptQuality(moving || !!activePress);
        renderScene();
        dirty = false;
      } else {
        image(paperLayer, 0, 0);
        image(pigmentLayer, 0, 0);
      }
      lastDrawHadMotion = moving;
    }

    function rebuildSurfaces() {
      fieldCols = Math.ceil(width / quality.cellSize);
      fieldRows = Math.ceil(height / quality.cellSize);
      field = new Array(fieldCols * fieldRows);
      paperLayer = createGraphics(width, height);
      pigmentLayer = createGraphics(width, height);
      pigmentLayer.pixelDensity(1);
      paperLayer.pixelDensity(1);
      renderPaper();
      for (const pool of pools) pool.updateGeometry();
      lastPreviewRect = null;
      markFullFieldDirty();
    }

    function renderPaper() {
      const palette = PALETTES[paletteIndex];
      paperLayer.background(palette.surface);
      paperLayer.noStroke();
      paperLayer.randomSeed(4887);
      const grainColor = color(palette.grain);
      for (let i = 0; i < (width * height) / 46; i++) {
        const x = paperLayer.random(width);
        const y = paperLayer.random(height);
        const a = paperLayer.random(5, 18);
        const r = paperLayer.random(0.35, 1.6);
        paperLayer.fill(red(grainColor), green(grainColor), blue(grainColor), a);
        paperLayer.circle(x, y, r);
      }
      for (let y = 0; y < height; y += 3) {
        const a = 4 + 3 * noise(y * 0.008, 17.3);
        paperLayer.stroke(255, 248, 232, a);
        paperLayer.line(0, y, width, y);
      }
    }

    function renderScene() {
      image(paperLayer, 0, 0);
      renderPigmentField();
      image(pigmentLayer, 0, 0);
      renderPressPreview();
    }

    function renderPigmentField() {
      const startedAt = performance.now();
      const renderPools = activePress ? pools.concat([previewPoolFromPress(activePress)]) : pools;
      const rects = consumeDirtyRects();
      clearPigmentRects(rects);
      evaluateField(renderPools, rects);

      pigmentLayer.noStroke();
      for (const rect of rects) {
        for (let gy = rect.y0; gy < rect.y1; gy++) {
          for (let gx = rect.x0; gx < rect.x1; gx++) {
            const cell = field[gx + gy * fieldCols];
            if (!cell || cell.owner < 0) continue;
            const pool = renderPools[cell.owner];
            if (!pool) continue;
            const neighborRim = hasDifferentNeighbor(gx, gy, cell.owner);
            drawPigmentCell(gx, gy, cell, pool, neighborRim);
          }
        }
      }

      lastRenderMs = performance.now() - startedAt;
      if (DEBUG_PERF) {
        const cells = rects.reduce((sum, rect) => sum + rectArea(rect), 0);
        console.log(`[metaballs] ${quality.name} ${quality.cellSize}px ${cells}/${fieldCols * fieldRows} cells ${renderPools.length} pools ${totalLobeCount(renderPools)} lobes ${lastRenderMs.toFixed(1)}ms`);
      }
    }

    // Metaball field evaluation: child lobes inside a pool sum their smooth
    // influence so a single pigment identity merges organically. We deliberately
    // evaluate each pool separately instead of one global field.
    function evaluateField(renderPools, rects) {
      const cellSize = quality.cellSize;
      for (const rect of rects) {
        const candidates = poolsForRect(renderPools, rect);
        for (let gy = rect.y0; gy < rect.y1; gy++) {
          const y = gy * cellSize + cellSize * 0.5;
          for (let gx = rect.x0; gx < rect.x1; gx++) {
            const x = gx * cellSize + cellSize * 0.5;
            let best = -1;
            let bestField = 0;
            let bestAge = -1;
            let secondField = 0;
            for (const i of candidates) {
              const pool = renderPools[i];
              if (!pool.containsPoint(x, y)) continue;
              const f = pool.fieldAt(x, y);
              if (f > secondField) secondField = f;
              // Ownership/clipping strategy: each cell can have exactly one owner.
              // Strongest normalized pool field wins above threshold; near-ties go
              // to the newer pool, making fresh pigment read as sitting on top while
              // preventing different pigment identities from summing into one blob.
              const newerTie = Math.abs(f - bestField) < 0.045 && pool.createdAt > bestAge;
              if (f > bestField || (f > FIELD_THRESHOLD && newerTie)) {
                secondField = bestField;
                bestField = f;
                best = i;
                bestAge = pool.createdAt;
              }
            }
            const idx = gx + gy * fieldCols;
            field[idx] = bestField >= FIELD_THRESHOLD
              ? { owner: best, strength: bestField, margin: bestField - secondField }
              : { owner: -1, strength: bestField, margin: 0 };
          }
        }
      }
    }

    function hasDifferentNeighbor(gx, gy, owner) {
      const checks = [[1,0],[-1,0],[0,1],[0,-1]];
      for (const [dx, dy] of checks) {
        const nx = gx + dx;
        const ny = gy + dy;
        if (nx < 0 || ny < 0 || nx >= fieldCols || ny >= fieldRows) return true;
        const n = field[nx + ny * fieldCols];
        if (!n || n.owner !== owner) return true;
      }
      return false;
    }

    // Contour/rim rendering: threshold bands darken the outer edge and neighbor
    // changes darken pigment-pigment seams, so clipping boundaries read as
    // intentional marbling contours instead of accidental field overlap.
    function drawPigmentCell(gx, gy, cell, pool, neighborRim) {
      const cellSize = quality.cellSize;
      const x = gx * cellSize;
      const y = gy * cellSize;
      const n = stableNoise(gx, gy, pool.seed);
      const edgeT = constrain((cell.strength - FIELD_THRESHOLD) / FIELD_RIM_BAND, 0, 1);
      const alpha = 82 + 72 * constrain(edgeT, 0, 1);
      const rimT = neighborRim ? 0.72 : Math.max(0, 1 - edgeT) * 0.62;
      const washT = constrain((cell.strength - 1.5) / 3.2, 0, 0.48);
      const washed = mixRgb(pool.rgb.base, pool.rgb.wash, washT);
      const c = mixRgb(washed, pool.rgb.rim, rimT);
      pigmentLayer.fill(
        constrain(c.r + (n - 0.5) * 10, 0, 255),
        constrain(c.g + (n - 0.5) * 10, 0, 255),
        constrain(c.b + (n - 0.5) * 10, 0, 255),
        neighborRim ? 166 : alpha
      );
      pigmentLayer.rect(x, y, cellSize + 0.8, cellSize + 0.8);

      if (neighborRim && (gx + gy) % 2 === 0) {
        pigmentLayer.fill(pool.rgb.rim.r, pool.rgb.rim.g, pool.rgb.rim.b, 46);
        pigmentLayer.rect(x, y, cellSize + 0.8, cellSize + 0.8);
      }
    }

    function chooseInitialQuality() {
      const viewportCellsAtHigh = Math.ceil(width / QUALITY_TIERS[0].cellSize) * Math.ceil(height / QUALITY_TIERS[0].cellSize);
      const mobileHint = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
      qualityIndex = mobileHint || viewportCellsAtHigh > 90000 ? 1 : 0;
      quality = QUALITY_TIERS[qualityIndex];
    }

    function adaptQuality(interacting) {
      if (fullFieldDirty && dirtyRects.length === 0) return;
      const totalLobes = totalLobeCount(pools);
      const crowded = pools.length > 14 || totalLobes > 92;
      const slow = lastRenderMs > quality.slowMs || (interacting && crowded && qualityIndex === 0);
      const fast = settled && lastRenderMs > 0 && lastRenderMs < quality.fastMs && pools.length < 12 && totalLobes < 70;

      slowFrameStreak = slow ? slowFrameStreak + 1 : 0;
      fastFrameStreak = fast ? fastFrameStreak + 1 : 0;

      if (slowFrameStreak >= 3 && qualityIndex < QUALITY_TIERS.length - 1) {
        setQuality(qualityIndex + 1);
        slowFrameStreak = 0;
        fastFrameStreak = 0;
      } else if (fastFrameStreak >= 90 && qualityIndex > 0) {
        setQuality(qualityIndex - 1);
        slowFrameStreak = 0;
        fastFrameStreak = 0;
      }
    }

    function setQuality(nextIndex) {
      if (nextIndex === qualityIndex) return;
      qualityIndex = nextIndex;
      quality = QUALITY_TIERS[qualityIndex];
      fieldCols = Math.ceil(width / quality.cellSize);
      fieldRows = Math.ceil(height / quality.cellSize);
      field = new Array(fieldCols * fieldRows);
      for (const pool of pools) pool.updateGeometry();
      if (activePress) lastPreviewRect = null;
      markFullFieldDirty();
    }

    function markFullFieldDirty() {
      fullFieldDirty = true;
      dirtyRects = [];
      dirty = true;
    }

    function markDirtyRect(rect) {
      if (!rect || fullFieldDirty) {
        dirty = true;
        return;
      }
      const clamped = clampRect(expandRect(rect, DIRTY_PADDING_CELLS));
      if (!clamped) return;
      dirtyRects.push(clamped);
      dirty = true;
    }

    function consumeDirtyRects() {
      if (fullFieldDirty || dirtyRects.length === 0) {
        fullFieldDirty = false;
        dirtyRects = [];
        return [{ x0: 0, y0: 0, x1: fieldCols, y1: fieldRows }];
      }
      const rect = dirtyRects.reduce((merged, next) => unionRects(merged, next));
      dirtyRects = [];
      const coverage = rectArea(rect) / Math.max(1, fieldCols * fieldRows);
      if (coverage > FULL_REDRAW_COVERAGE) {
        return [{ x0: 0, y0: 0, x1: fieldCols, y1: fieldRows }];
      }
      return [rect];
    }

    function clearPigmentRects(rects) {
      const cellSize = quality.cellSize;
      for (const rect of rects) {
        const px = rect.x0 * cellSize;
        const py = rect.y0 * cellSize;
        const pw = (rect.x1 - rect.x0) * cellSize + cellSize;
        const ph = (rect.y1 - rect.y0) * cellSize + cellSize;
        pigmentLayer.drawingContext.clearRect(px, py, pw, ph);
      }
    }

    function poolsForRect(renderPools, rect) {
      const candidates = [];
      for (let i = 0; i < renderPools.length; i++) {
        const pool = renderPools[i];
        if (pool.fieldRect && rectsOverlap(pool.fieldRect, rect)) candidates.push(i);
      }
      return candidates;
    }

    function markActivePreviewDirty() {
      if (!activePress) {
        lastPreviewRect = null;
        return;
      }
      const preview = previewPoolFromPress(activePress);
      if (lastPreviewRect) markDirtyRect(lastPreviewRect);
      markDirtyRect(preview.fieldRect);
      lastPreviewRect = preview.fieldRect;
    }

    function unionRects(a, b) {
      return {
        x0: Math.min(a.x0, b.x0),
        y0: Math.min(a.y0, b.y0),
        x1: Math.max(a.x1, b.x1),
        y1: Math.max(a.y1, b.y1)
      };
    }

    function expandRect(rect, cells) {
      return { x0: rect.x0 - cells, y0: rect.y0 - cells, x1: rect.x1 + cells, y1: rect.y1 + cells };
    }

    function clampRect(rect) {
      const clamped = {
        x0: constrain(floor(rect.x0), 0, fieldCols),
        y0: constrain(floor(rect.y0), 0, fieldRows),
        x1: constrain(ceil(rect.x1), 0, fieldCols),
        y1: constrain(ceil(rect.y1), 0, fieldRows)
      };
      if (clamped.x1 <= clamped.x0 || clamped.y1 <= clamped.y0) return null;
      return clamped;
    }

    function rectsOverlap(a, b) {
      return a.x0 < b.x1 && a.x1 > b.x0 && a.y0 < b.y1 && a.y1 > b.y0;
    }

    function rectArea(rect) {
      return Math.max(0, rect.x1 - rect.x0) * Math.max(0, rect.y1 - rect.y0);
    }

    function totalLobeCount(list) {
      return list.reduce((sum, pool) => sum + pool.lobes.length, 0);
    }

    function parseHexRgb(hex) {
      const raw = hex.replace('#', '');
      return {
        r: parseInt(raw.slice(0, 2), 16),
        g: parseInt(raw.slice(2, 4), 16),
        b: parseInt(raw.slice(4, 6), 16)
      };
    }

    function mixRgb(a, b, t) {
      return {
        r: a.r + (b.r - a.r) * t,
        g: a.g + (b.g - a.g) * t,
        b: a.b + (b.b - a.b) * t
      };
    }

    function renderPressPreview() {
      if (!activePress) return;
      const held = millis() - activePress.startedAt;
      const t = holdToUnit(held);
      noFill();
      stroke(35, 25, 18, 34 + 28 * t);
      strokeWeight(1);
      const r = sqrt(holdToMass(held) / PI) * 1.15;
      circle(activePress.x, activePress.y, r * 2);
      stroke(255, 250, 238, 60);
      circle(activePress.x, activePress.y, max(8, r * 0.6));
    }

    function startPress(x, y) {
      const corner = handleCornerActionStart(x, y);
      if (corner) return;
      activePress = {
        x: constrain(x, 0, width),
        y: constrain(y, 0, height),
        startedAt: millis(),
        color: choosePigment(),
        seed: random(1000000)
      };
      lastPreviewRect = null;
      markActivePreviewDirty();
    }

    function endPress() {
      if (!activePress) return;
      const held = millis() - activePress.startedAt;
      const pool = createPool(activePress.x, activePress.y, held, activePress.color, activePress.seed, false);
      pools.push(pool);
      if (lastPreviewRect) markDirtyRect(lastPreviewRect);
      markDirtyRect(pool.fieldRect);
      lastPreviewRect = null;
      activePress = null;
    }

    function handleCornerActionStart(x, y) {
      if (isTopLeftAction(x, y)) {
        nextPalette();
        return true;
      }
      if (isTopRightAction(x, y)) {
        startResetHold(x, y);
        return true;
      }
      return false;
    }

    function isTopLeftAction(x, y) {
      return x < CORNER_ACTION_SIZE && y < CORNER_ACTION_SIZE;
    }

    function isTopRightAction(x, y) {
      return x > width - CORNER_ACTION_SIZE && y < CORNER_ACTION_SIZE;
    }

    function startResetHold(x, y) {
      cancelResetHold();
      pendingReset = {
        x,
        y,
        completed: false,
        timer: window.setTimeout(() => {
          if (!pendingReset) return;
          pendingReset.completed = true;
          resetAll();
        }, RESET_HOLD_MS)
      };
      dirty = true;
    }

    function cancelResetHold() {
      if (!pendingReset) return;
      window.clearTimeout(pendingReset.timer);
      pendingReset = null;
      dirty = true;
    }

    function updateCornerActionHold(x, y) {
      if (pendingReset && !pendingReset.completed && !isTopRightAction(x, y)) {
        cancelResetHold();
      }
    }

    function finishCornerActionHold() {
      if (pendingReset && !pendingReset.completed) {
        cancelResetHold();
        return true;
      }
      if (pendingReset && pendingReset.completed) {
        pendingReset = null;
        return true;
      }
      return false;
    }

    function handlePointerMove(x, y) {
      updateCornerActionHold(x, y);
    }

    // Hold mapping: duration is clamped, eased, converted to target area/mass,
    // then split across a performance-capped 3-8/9 child lobes. This makes quick taps visibly small
    // while long holds create broader footprints with richer asymmetric edges.
    function holdToUnit(ms) {
      const clamped = constrain(ms, MIN_HOLD_MS, MAX_HOLD_MS);
      const t = (clamped - MIN_HOLD_MS) / (MAX_HOLD_MS - MIN_HOLD_MS);
      return t * t * (3 - 2 * t);
    }

    function holdToMass(ms) {
      const minArea = 1600;
      const maxArea = min(width * height * 0.105, 36000);
      return lerp(minArea, maxArea, holdToUnit(ms));
    }

    function choosePigment() {
      const palette = PALETTES[paletteIndex];
      const pigment = palette.pigments[pigmentIndex % palette.pigments.length];
      pigmentIndex++;
      return pigment;
    }

    function createPool(x, y, holdMs, pigment, seed, preview) {
      const mass = holdToMass(holdMs);
      const t = holdToUnit(holdMs);
      const lowComplexity = pools.length < 8 && totalLobeCount(pools) < 46 && qualityIndex === 0;
      const maxLobes = lowComplexity ? 9 : 8;
      const lobeCount = floor(lerp(3, maxLobes + 0.99, t));
      const id = preview ? -1 : poolId++;
      return new PigmentPool(id, x, y, mass, lobeCount, pigment, seed, preview);
    }

    function previewPoolFromPress(press) {
      const p = createPool(press.x, press.y, millis() - press.startedAt, press.color, press.seed, true);
      p.currentMass = p.targetMass * 0.38;
      for (const lobe of p.lobes) {
        lobe.radius = lobe.targetRadius * 0.42;
        lobe.offsetNow = lobe.offsetTarget * 0.45;
      }
      p.updateGeometry();
      return p;
    }

    class PigmentPool {
      constructor(id, x, y, mass, lobeCount, colorValue, seed, preview) {
        this.id = id;
        this.center = { x, y };
        this.createdAt = preview ? millis() + 999999 : millis();
        this.color = colorValue;
        this.rgb = {
          base: parseHexRgb(colorValue.base),
          rim: parseHexRgb(colorValue.rim),
          wash: parseHexRgb(colorValue.wash)
        };
        this.targetMass = mass;
        this.currentMass = preview ? mass * 0.35 : 32;
        this.growthRate = random(0.010, 0.018);
        this.seed = seed;
        this.settled = false;
        this.preview = preview;
        this.lobes = [];
        this.sampleLobes = [];
        this.pixelBounds = null;
        this.fieldRect = null;
        this.makeLobes(lobeCount);
        this.updateGeometry();
      }

      makeLobes(count) {
        randomSeed(floor(this.seed));
        const baseRadius = sqrt(this.targetMass / PI);
        let weights = [];
        let total = 0;
        for (let i = 0; i < count; i++) {
          const w = random(0.55, 1.45);
          weights.push(w);
          total += w;
        }
        for (let i = 0; i < count; i++) {
          const angle = (TWO_PI * i / count) + random(-0.55, 0.55);
          const offsetTarget = i === 0 ? 0 : random(baseRadius * 0.12, baseRadius * 0.64);
          const lobeMass = this.targetMass * weights[i] / total * random(0.88, 1.22);
          const targetRadius = sqrt(lobeMass / PI) * random(1.55, 2.12);
          this.lobes.push({
            angle,
            offsetTarget,
            offsetNow: 0,
            radius: 2 + random(0, 2),
            targetRadius,
            growthVariation: random(0.72, 1.22),
            phase: random(1000)
          });
        }
      }

      update() {
        if (this.preview || this.settled) return false;
        const previousRect = this.fieldRect;
        const before = this.currentMass;
        this.currentMass = lerp(this.currentMass, this.targetMass, this.growthRate);
        const progress = constrain(this.currentMass / this.targetMass, 0, 1);
        let moving = Math.abs(this.currentMass - before) > 0.2;
        for (const lobe of this.lobes) {
          const targetR = lobe.targetRadius * sqrt(progress);
          const nextR = lerp(lobe.radius, targetR, 0.045 * lobe.growthVariation);
          const nextOffset = lerp(lobe.offsetNow, lobe.offsetTarget, 0.032 * lobe.growthVariation);
          if (Math.abs(nextR - lobe.radius) > 0.05 || Math.abs(nextOffset - lobe.offsetNow) > 0.04) moving = true;
          lobe.radius = nextR;
          // Drift is only during growth; once settled these offsets freeze.
          const drift = (noise(this.seed * 0.001, lobe.phase, progress * 1.7) - 0.5) * 4 * (1 - progress);
          lobe.offsetNow = nextOffset + drift;
        }
        if (progress >= SETTLE_EPSILON && !moving) this.settled = true;
        if (progress >= 0.998) {
          this.currentMass = this.targetMass;
          for (const lobe of this.lobes) {
            lobe.radius = lobe.targetRadius;
            lobe.offsetNow = lobe.offsetTarget;
          }
          this.settled = true;
          moving = true;
        }
        this.updateGeometry();
        if (moving) {
          markDirtyRect(previousRect);
          markDirtyRect(this.fieldRect);
        }
        return moving;
      }

      updateGeometry() {
        const cellSize = quality.cellSize;
        this.sampleLobes = [];
        let x0 = Infinity;
        let y0 = Infinity;
        let x1 = -Infinity;
        let y1 = -Infinity;
        for (const lobe of this.lobes) {
          const lx = this.center.x + cos(lobe.angle) * lobe.offsetNow;
          const ly = this.center.y + sin(lobe.angle) * lobe.offsetNow;
          const influenceRadius = Math.max(8, lobe.radius * FIELD_INFLUENCE_FACTOR + 10);
          const warpRadius = lobe.radius * 0.18;
          this.sampleLobes.push({
            x: lx,
            y: ly,
            radius: lobe.radius,
            radius2: lobe.radius * lobe.radius,
            influence2: (influenceRadius + warpRadius) * (influenceRadius + warpRadius),
            phase: lobe.phase,
            phaseCos: cos(lobe.phase),
            phaseSin: sin(lobe.phase)
          });
          x0 = Math.min(x0, lx - influenceRadius - warpRadius);
          y0 = Math.min(y0, ly - influenceRadius - warpRadius);
          x1 = Math.max(x1, lx + influenceRadius + warpRadius);
          y1 = Math.max(y1, ly + influenceRadius + warpRadius);
        }
        this.pixelBounds = { x0, y0, x1, y1 };
        this.fieldRect = clampRect({
          x0: floor(x0 / cellSize) - 1,
          y0: floor(y0 / cellSize) - 1,
          x1: ceil(x1 / cellSize) + 1,
          y1: ceil(y1 / cellSize) + 1
        });
      }

      containsPoint(x, y) {
        const b = this.pixelBounds;
        return !!b && x >= b.x0 && x <= b.x1 && y >= b.y0 && y <= b.y1;
      }

      fieldAt(x, y) {
        let sum = 0;
        for (const lobe of this.sampleLobes) {
          const roughDx = x - lobe.x;
          const roughDy = y - lobe.y;
          if (roughDx * roughDx + roughDy * roughDy > lobe.influence2) continue;
          const warp = (stableNoise(floor(x * 0.025), floor(y * 0.025), this.seed + lobe.phase) - 0.5) * lobe.radius * 0.18;
          const dx = roughDx + lobe.phaseCos * warp;
          const dy = roughDy + lobe.phaseSin * warp;
          const d2 = dx * dx + dy * dy + 18;
          sum += lobe.radius2 / d2;
        }
        return sum;
      }
    }

    function stableNoise(x, y, seed) {
      return noise(x * 0.13 + seed * 0.0007, y * 0.13 - seed * 0.0003);
    }

    function nextPalette() {
      paletteIndex = (paletteIndex + 1) % PALETTES.length;
      pigmentIndex = 0;
      renderPaper();
      updateHint();
      markFullFieldDirty();
    }

    function resetAll() {
      if (pendingReset) {
        window.clearTimeout(pendingReset.timer);
        pendingReset = null;
      }
      pools = [];
      activePress = null;
      lastPreviewRect = null;
      pigmentLayer.clear();
      renderPaper();
      markFullFieldDirty();
      settled = true;
    }

    function updateHint() {
      const el = document.getElementById('hint');
      el.textContent = `hold to drop · P palette · R reset · ${PALETTES[paletteIndex].name}`;
    }

    function keyPressed() {
      if (key === 'p' || key === 'P') nextPalette();
      if (key === 'r' || key === 'R' || keyCode === ESCAPE) resetAll();
    }

    function mousePressed() {
      if (touches && touches.length) return false;
      startPress(mouseX, mouseY);
      return false;
    }

    function mouseReleased() {
      if (touches && touches.length) return false;
      if (finishCornerActionHold()) return false;
      endPress();
      return false;
    }

    function mouseDragged() {
      if (touches && touches.length) return false;
      handlePointerMove(mouseX, mouseY);
      return false;
    }

    function touchStarted() {
      const t = touches && touches.length ? touches[0] : { x: mouseX, y: mouseY };
      startPress(t.x, t.y);
      return false;
    }

    function touchMoved() {
      const t = touches && touches.length ? touches[0] : { x: mouseX, y: mouseY };
      handlePointerMove(t.x, t.y);
      return false;
    }

    function touchEnded() {
      if (finishCornerActionHold()) return false;
      endPress();
      return false;
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      chooseInitialQuality();
      rebuildSurfaces();
    }

    document.addEventListener('gesturestart', event => event.preventDefault());
    document.addEventListener('touchmove', event => event.preventDefault(), { passive: false });
  </script>
</body>
</html>
