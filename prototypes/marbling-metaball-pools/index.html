<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Marbling Metaball Pools Prototype</title>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
  <script>window.p5 && (p5.disableFriendlyErrors = true);</script>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #f4eddf; touch-action: none; }
    canvas { display: block; }
    #hint { position: fixed; left: 10px; bottom: 8px; color: rgba(45,35,25,0.46); font: 11px/1.35 ui-monospace, monospace; pointer-events: none; }
  </style>
</head>
<body>
  <div id="hint">hold to drop · P palette · R reset</div>
  <script>
    /* Marbling metaballs prototype shell: standalone p5 canvas for implicit pigment pool exploration. */
    let paperLayer;

    function setup() {
      pixelDensity(1);
      createCanvas(windowWidth, windowHeight);
      paperLayer = createGraphics(width, height);
      renderPaper();
    }

    function draw() {
      image(paperLayer, 0, 0);
    }

    function renderPaper() {
      paperLayer.background('#f3ead8');
      paperLayer.noStroke();
      paperLayer.randomSeed(4887);
      for (let i = 0; i < (width * height) / 70; i++) {
        paperLayer.fill(216, 198, 168, paperLayer.random(4, 14));
        paperLayer.circle(paperLayer.random(width), paperLayer.random(height), paperLayer.random(0.5, 1.5));
      }
    }

    function keyPressed() {}

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      paperLayer = createGraphics(width, height);
      renderPaper();
    }
  </script>
</body>
</html>
