<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Prototype D · Fluid Density Marbling</title>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
  <script>window.p5 && (p5.disableFriendlyErrors = true);</script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f4eddf;
      touch-action: none;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
    }
    canvas { display: block; touch-action: none; }
    #hint {
      position: fixed;
      left: 10px;
      bottom: 8px;
      z-index: 10;

    #cornerActions {

      font: 10px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      pointer-events: none;
      text-align: right;
    }
    #topToolbar {
      position: fixed;
      left: 50%;
      top: 10px;
      z-index: 20;
      display: flex;
      gap: 6px;

      border: 1px solid rgba(75, 55, 38, 0.20);
      border-radius: 999px;
      background: rgba(246, 236, 215, 0.76);
      box-shadow: 0 8px 28px rgba(48, 35, 22, 0.12);
      backdrop-filter: blur(8px);
      transform: translateX(-50%);

    }
    .toolButton {
      appearance: none;
      border: 1px solid rgba(65, 46, 31, 0.18);
      border-radius: 999px;
      background: rgba(255, 250, 238, 0.66);
      color: rgba(45, 35, 25, 0.72);
      font: 11px/1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      letter-spacing: 0.03em;

    }
    .toolButton.active {

    }

    }
  </style>
</head>
<body>
  <div id="hint">Prototype D: finite density fluid · hold to drop · rake injects velocity · P palette · R reset</div>
  <div id="topToolbar" aria-label="marbling tools">
    <button id="dropTool" class="toolButton active" type="button">drop</button>
    <button id="rakeTool" class="toolButton" type="button">rake</button>
    <button id="paletteTool" class="toolButton" type="button">palette</button>
    <button id="resetTool" class="toolButton" type="button">reset</button>
  </div>
  <div id="cornerActions">tap top-left: palette<br>hold top-right: reset</div>
  <script>
    /*
      Prototype D: stable-fluid-inspired finite density marbling.

      Standalone p5 sketch that keeps the metaball drop/growth frontend but
      bakes settled pigment into a clipped density+velocity grid. Raking injects
      velocity and stamps a persistent comb substrate: pale tine lanes, saturated
      side ridges, and dragged line history. Semi-Lagrangian advection bends both
      density and comb traces while pinned metaball borders preserve organic silhouettes.
    */

    const DEBUG_PERF = false;
    const QUALITY_TIERS = [
      { name: 'high', cellSize: 4, slowMs: 18, fastMs: 10, maxCellsPerPass: 36000 },
      { name: 'medium', cellSize: 6, slowMs: 15, fastMs: 8, maxCellsPerPass: 24000 },
      { name: 'low', cellSize: 8, slowMs: 13, fastMs: 7, maxCellsPerPass: 16000 }
    ];
    const FIELD_THRESHOLD = 0.92;
    const FIELD_RIM_BAND = 0.42;
    const FIELD_INFLUENCE_FACTOR = 2.35;
    const DIRTY_PADDING_CELLS = 3;
    const FULL_REDRAW_COVERAGE = 0.52;
    const MAX_HOLD_MS = 2100;
    const MIN_HOLD_MS = 80;
    const TAP_TO_HOLD_MS = 190;
    const TAP_MOVE_TOLERANCE = 9;
    const SPLATTER_MIN_DROPS = 3;
    const SPLATTER_MAX_DROPS = 5;
    const SPLATTER_RADIUS = 34;
    const RESET_HOLD_MS = 750;
    const CORNER_ACTION_SIZE = 72;
    const SETTLE_EPSILON = 0.985;
    const RAKE_RADIUS = 13;
    const RAKE_TOOTH_COUNT = 6;
    const RAKE_TOOTH_SPACING = 14;
    const RAKE_STEP = 5;
    const RAKE_SMOOTHING = 0.42;
    const RAKE_STRENGTH = 3.8;
    const RAKE_MAX_OFFSET = 92;
    const RAKE_MIN_MOVE = 3;
    const COMB_CENTER_LANE_RADIUS = 2.2;
    const COMB_RIDGE_OFFSET = 4.5;
    const COMB_RIDGE_WIDTH = 3.0;
    const COMB_LINE_STRENGTH = 0.78;
    const COMB_RIDGE_STRENGTH = 0.42;
    const COMB_STRETCH_STRENGTH = 0.54;
    const COMB_LINE_DECAY = 0.992;
    const COMB_AGE_DECAY = 0.985;
    const COMB_DIRECTION_BLEND = 0.35;
    const FINE_RAKE_TOOTH_COUNT = 14;
    const FINE_RAKE_TOOTH_SPACING = 6;
    const FINE_RAKE_RADIUS = 5.5;
    const FINE_RAKE_STRENGTH = 1.9;
    const FINE_RAKE_LINE_MULTIPLIER = 0.72;
    const FLUID_STEPS_PER_RAKE = 2;
    const FLUID_DT = 0.72;
    const VELOCITY_DAMPING = 0.84;
    const DENSITY_DAMPING = 0.995;
    const BORDER_VELOCITY_SCALE = 0.08;
    const BORDER_DENSITY_BLEND = 0.65;
    const ACTIVE_RAKE_BORDER_PIN_SCALE = 0.28;
    const BORDER_DRAG_CELL_STEPS = 3;
    const BORDER_DRAG_DENSITY = 0.42;
    const MAX_DENSITY_VISUAL = 2.4;
    const MIN_VISIBLE_DENSITY = 0.05;
    const DENSITY_COMPRESSION = 0.20;

    const PALETTES = [
      {
        name: 'traditional marbling',
        surface: '#f3ead8',
        grain: '#d8c6a8',
        shadow: '#3a2a21',
        pigments: [
          { base: '#173b62', rim: '#0b2138', wash: '#6f8fb0' },
          { base: '#7d2630', rim: '#42121a', wash: '#b96f68' },
          { base: '#c18a2f', rim: '#765119', wash: '#dfbd71' },
          { base: '#53673a', rim: '#2c381f', wash: '#9aa574' },
          { base: '#d9c8a4', rim: '#8f7650', wash: '#f2e6c9' }
        ]
      },
      {
        name: 'bright playful',
        surface: '#fbf2df',
        grain: '#e1cfaa',
        shadow: '#24212b',
        pigments: [
          { base: '#f0645f', rim: '#9e2d32', wash: '#ffaaa0' },
          { base: '#17a6a5', rim: '#08666d', wash: '#8bdad2' },
          { base: '#f3cf38', rim: '#a77c0d', wash: '#ffe988' },
          { base: '#8066c8', rim: '#46337d', wash: '#b9a6ed' },
          { base: '#2351c6', rim: '#142a77', wash: '#7e9dea' }
        ]
      },
      {
        name: 'portfolio subdued',
        surface: '#f1eadc',
        grain: '#d0c2aa',
        shadow: '#2b2925',
        pigments: [
          { base: '#29313a', rim: '#11161b', wash: '#737b83' },
          { base: '#a85f47', rim: '#653225', wash: '#d7a18b' },
          { base: '#4f827f', rim: '#294a49', wash: '#9abcb7' },
          { base: '#d8c6a0', rim: '#856f49', wash: '#f0e4c4' },
          { base: '#b8733b', rim: '#70401f', wash: '#d6a06b' }
        ]
      },
      {
        name: 'monochrome ink',
        surface: '#f5f1e8',
        grain: '#cbc2b1',
        shadow: '#171a20',
        pigments: [
          { base: '#101b2a', rim: '#05090f', wash: '#657287' },
          { base: '#3e4855', rim: '#1b2129', wash: '#8b95a1' },
          { base: '#777a76', rim: '#3d403f', wash: '#babcb3' },
          { base: '#b6b7aa', rim: '#74786d', wash: '#deded2' }
        ]
      }
    ];

    let pools = [];
    let activePress = null;
    let activeTool = 'drop';
    let paletteIndex = 0;
    let pigmentIndex = 0;
    let poolId = 1;
    let dirty = true;
    let settled = true;
    let qualityIndex = 0;
    let quality = QUALITY_TIERS[qualityIndex];
    let fieldCols = 0;
    let fieldRows = 0;
    let field = [];
    let fluidOwners;
    let fluidMask;
    let fluidBorderPin;
    let fluidDensity;
    let fluidDensityNext;
    let fluidVx;
    let fluidVy;
    let fluidVxNext;
    let fluidVyNext;
    let fluidBaseDensity;
    let fluidStrength;
    let fluidMatU;
    let fluidMatV;
    let fluidLine;
    let fluidLineNext;
    let fluidLineAge;
    let fluidLineAgeNext;
    let fluidLineDirX;
    let fluidLineDirY;
    let fluidRidge;
    let fluidRidgeNext;
    let fluidStretch;
    let fluidStretchNext;
    let fluidDirty = false;
    let fluidEverRaked = false;
    let raking = false;
    let lastRakePoint = null;
    let lastRakeRawPoint = null;
    let rakeDirection = null;
    let activeRakeSourceId = 0;
    let dirtyRects = [];
    let fullFieldDirty = true;
    let paperLayer;
    let pigmentLayer;
    let lastDrawHadMotion = false;
    let pendingReset = null;
    let lastRenderMs = 0;
    let slowFrameStreak = 0;
    let fastFrameStreak = 0;
    let lastPreviewRect = null;

    function setup() {
      pixelDensity(1);
      createCanvas(windowWidth, windowHeight);
      chooseInitialQuality();
      rebuildSurfaces();
      bindToolbar();
      updateHint();
    }

    function draw() {
      let moving = false;
      if (activePress) moving = true;

      for (const pool of pools) {
        if (pool.update()) moving = true;
      }

      markActivePreviewDirty();

      // Static-settle detection: when no press preview exists and every pool has
      // reached its target radii, stop mutating lobe offsets/noise and stop
      // recomputing the expensive field until new input/resizes/reset occurs.
      settled = !activePress && pools.every(pool => pool.settled);
      if (moving || dirty || lastDrawHadMotion) {
        adaptQuality(moving || !!activePress);
        renderScene();
        dirty = false;
      } else {
        image(paperLayer, 0, 0);
        image(pigmentLayer, 0, 0);
      }
      lastDrawHadMotion = moving;
    }

    function rebuildSurfaces() {
      fieldCols = Math.ceil(width / quality.cellSize);
      fieldRows = Math.ceil(height / quality.cellSize);
      field = new Array(fieldCols * fieldRows);
      allocateFluidGrid();
      paperLayer = createGraphics(width, height);
      pigmentLayer = createGraphics(width, height);
      pigmentLayer.pixelDensity(1);
      paperLayer.pixelDensity(1);
      renderPaper();
      for (const pool of pools) pool.updateGeometry();
      lastPreviewRect = null;
      markFullFieldDirty();
    }

    function renderPaper() {
      const palette = PALETTES[paletteIndex];
      paperLayer.background(palette.surface);
      paperLayer.noStroke();
      paperLayer.randomSeed(4887);
      const grainColor = color(palette.grain);
      for (let i = 0; i < (width * height) / 46; i++) {
        const x = paperLayer.random(width);
        const y = paperLayer.random(height);
        const a = paperLayer.random(5, 18);
        const r = paperLayer.random(0.35, 1.6);
        paperLayer.fill(red(grainColor), green(grainColor), blue(grainColor), a);
        paperLayer.circle(x, y, r);
      }
      for (let y = 0; y < height; y += 3) {
        const a = 4 + 3 * noise(y * 0.008, 17.3);
        paperLayer.stroke(255, 248, 232, a);
        paperLayer.line(0, y, width, y);
      }
    }

    function renderScene() {
      image(paperLayer, 0, 0);
      renderPigmentField();
      image(pigmentLayer, 0, 0);
      renderPressPreview();
    }

    function renderPigmentField() {
      const startedAt = performance.now();
      const showPreview = activePress && shouldRenderHoldPreview(activePress);
      const renderPools = showPreview ? pools.concat([previewPoolFromPress(activePress)]) : pools;
      const rects = consumeDirtyRects();
      clearPigmentRects(rects);
      evaluateField(renderPools, rects);

      syncFluidFromField(renderPools, rects, showPreview);

      pigmentLayer.noStroke();
      for (const rect of rects) {
        for (let gy = rect.y0; gy < rect.y1; gy++) {
          for (let gx = rect.x0; gx < rect.x1; gx++) {
            const idx = gx + gy * fieldCols;
            const ownerId = fluidOwners[idx];
            if (ownerId < 0 || fluidMask[idx] <= 0 || fluidDensity[idx] < MIN_VISIBLE_DENSITY) continue;
            const pool = poolById(ownerId, renderPools);
            if (!pool) continue;
            drawFluidCell(gx, gy, idx, pool);
          }
        }
      }

      lastRenderMs = performance.now() - startedAt;
      if (DEBUG_PERF) {
        const cells = rects.reduce((sum, rect) => sum + rectArea(rect), 0);
        console.log(`[metaballs] ${quality.name} ${quality.cellSize}px ${cells}/${fieldCols * fieldRows} cells ${renderPools.length} pools ${totalLobeCount(renderPools)} lobes ${lastRenderMs.toFixed(1)}ms`);
      }
    }

    // Metaball field evaluation: child lobes inside a pool sum their smooth
    // influence so a single pigment identity merges organically. We deliberately
    // evaluate each pool separately instead of one global field.
    function evaluateField(renderPools, rects) {
      const cellSize = quality.cellSize;
      for (const rect of rects) {
        const candidates = poolsForRect(renderPools, rect);
        for (let gy = rect.y0; gy < rect.y1; gy++) {
          for (let gx = rect.x0; gx < rect.x1; gx++) {
            const idx = gx + gy * fieldCols;
            const x = gx * cellSize + cellSize * 0.5;
            const y = gy * cellSize + cellSize * 0.5;
            const sampled = solveFieldAt(renderPools, candidates, x, y);
            field[idx] = sampled.bestField >= FIELD_THRESHOLD
              ? { owner: sampled.best, strength: sampled.bestField, margin: sampled.bestField - sampled.secondField }
              : { owner: -1, strength: sampled.bestField, margin: 0 };
          }
        }
      }
    }

    function solveFieldAt(renderPools, candidates, x, y) {
      let best = -1;
      let bestField = 0;
      let bestAge = -1;
      let secondField = 0;
      for (const i of candidates) {
        const pool = renderPools[i];
        if (!pool.containsPoint(x, y)) continue;
        const f = pool.fieldAt(x, y);
        if (f > secondField) secondField = f;
        // Ownership/clipping strategy: each cell can have exactly one owner.
        // Strongest normalized pool field wins above threshold; near-ties go
        // to the newer pool, making fresh pigment read as sitting on top while
        // preventing different pigment identities from summing into one blob.
        const newerTie = Math.abs(f - bestField) < 0.045 && pool.createdAt > bestAge;
        if (f > bestField || (f > FIELD_THRESHOLD && newerTie)) {
          secondField = bestField;
          bestField = f;
          best = i;
          bestAge = pool.createdAt;
        }
      }
      return { best, bestField, bestAge, secondField };
    }

    function solveFreshFieldAt(renderPools, candidates, x, y, stamp) {
      let best = -1;
      let bestField = 0;
      let bestAge = -1;
      let secondField = 0;
      for (const i of candidates) {
        const pool = renderPools[i];
        if (pool.createdAt < stamp || !pool.containsPoint(x, y)) continue;
        const f = pool.fieldAt(x, y);
        if (f < FIELD_THRESHOLD) continue;
        if (f > secondField) secondField = f;
        const newerTie = Math.abs(f - bestField) < 0.045 && pool.createdAt > bestAge;
        if (f > bestField || newerTie) {
          secondField = bestField;
          bestField = f;
          best = i;
          bestAge = pool.createdAt;
        }
      }
      return { best, bestField, bestAge, secondField };
    }

    function hasDifferentNeighbor(gx, gy, owner) {
      const checks = [[1,0],[-1,0],[0,1],[0,-1]];
      for (const [dx, dy] of checks) {
        const nx = gx + dx;
        const ny = gy + dy;
        if (nx < 0 || ny < 0 || nx >= fieldCols || ny >= fieldRows) return true;
        const n = field[nx + ny * fieldCols];
        if (!n || n.owner !== owner) return true;
      }
      return false;
    }

    function poolById(id, renderPools = pools) {
      for (const pool of renderPools) {
        if (pool && pool.id === id) return pool;
      }
      return null;
    }

    function syncFluidFromField(renderPools, rects, showPreview) {
      for (const rect of rects) {
        for (let gy = rect.y0; gy < rect.y1; gy++) {
          for (let gx = rect.x0; gx < rect.x1; gx++) {
            const idx = gx + gy * fieldCols;
            const cell = field[idx];
            const pool = cell && cell.owner >= 0 ? renderPools[cell.owner] : null;
            if (!pool || pool.preview || pool.id < 0 || cell.strength < FIELD_THRESHOLD) {
              if (!showPreview && !preserveRakedFluidCell(idx, renderPools)) clearFluidCell(idx);
              continue;
            }

            const ownerId = pool.id;
            const edgeT = constrain((cell.strength - FIELD_THRESHOLD) / FIELD_RIM_BAND, 0, 1);
            const seamPin = hasDifferentNeighbor(gx, gy, cell.owner) ? 0.92 : 0;
            const thresholdPin = Math.max(0, 1 - edgeT) * 0.72;
            const pin = constrain(Math.max(seamPin, thresholdPin), 0, 1);
            const base = 0.92 + 0.16 * stableNoise(gx, gy, pool.seed + 101);

            if (fluidOwners[idx] !== ownerId || fluidMask[idx] <= 0) {
              fluidOwners[idx] = ownerId;
              fluidDensity[idx] = base;
              fluidVx[idx] = 0;
              fluidVy[idx] = 0;
              resetCombCell(idx, gx, gy, pool);
            } else if (!fluidEverRaked) {
              fluidDensity[idx] = lerp(fluidDensity[idx], base, 0.22);
            }
            fluidMask[idx] = 1;
            fluidBorderPin[idx] = pin;
            fluidBaseDensity[idx] = base;
            fluidStrength[idx] = cell.strength;
          }
        }
      }
    }

    function preserveRakedFluidCell(idx, renderPools) {
      if (!fluidEverRaked || fluidOwners[idx] < 0 || fluidMask[idx] <= 0 || fluidDensity[idx] < MIN_VISIBLE_DENSITY) return false;
      const pool = poolById(fluidOwners[idx], renderPools);
      if (!pool || pool.preview) return false;
      fluidMask[idx] = min(1, fluidMask[idx]);
      fluidBorderPin[idx] = max(fluidBorderPin[idx] || 0, 0.72);
      fluidStrength[idx] = max(fluidStrength[idx] || 0, FIELD_THRESHOLD + 0.01);
      fluidDensity[idx] *= 0.998;
      return true;
    }

    function clearFluidCell(idx) {
      fluidOwners[idx] = -1;
      fluidMask[idx] = 0;
      fluidBorderPin[idx] = 0;
      fluidDensity[idx] = 0;
      fluidBaseDensity[idx] = 0;
      fluidStrength[idx] = 0;
      fluidVx[idx] = 0;
      fluidVy[idx] = 0;
      fluidMatU[idx] = 0;
      fluidMatV[idx] = 0;
      fluidLine[idx] = 0;
      fluidLineAge[idx] = 0;
      fluidLineDirX[idx] = 0;
      fluidLineDirY[idx] = 0;
      fluidRidge[idx] = 0;
      fluidStretch[idx] = 0;
    }

    function resetCombCell(idx, gx, gy, pool) {
      const seed = pool ? pool.seed : 0;
      fluidMatU[idx] = gx + 0.18 * stableNoise(gx, gy, seed + 1701);
      fluidMatV[idx] = gy + 0.18 * stableNoise(gx, gy, seed + 1702);
      fluidLine[idx] = 0;
      fluidLineAge[idx] = 0;
      fluidLineDirX[idx] = 0;
      fluidLineDirY[idx] = 0;
      fluidRidge[idx] = 0;
      fluidStretch[idx] = 0;
    }

    function drawFluidCell(gx, gy, idx, pool) {
      const cellSize = quality.cellSize;
      const x = gx * cellSize;
      const y = gy * cellSize;
      const density = constrain(fluidDensity[idx], 0, MAX_DENSITY_VISUAL);
      const pin = constrain(fluidBorderPin[idx], 0, 1);
      const n = stableNoise(gx, gy, pool.seed);
      const laneNoise = stableNoise(gx * 2 + 17, gy * 2 - 31, pool.seed + 771);
      const lowLane = density < 0.72 && laneNoise > lerp(0.34, 0.78, density);
      if (density < MIN_VISIBLE_DENSITY || (lowLane && pin < 0.18)) return;

      const paleT = constrain(1 - density, 0, 1);
      const saturatedT = constrain((density - 1) / (MAX_DENSITY_VISUAL - 1), 0, 1);
      const line = constrain(fluidLine[idx], -1.4, 1.8);
      const lineAge = constrain(fluidLineAge[idx], 0, 1);
      const ridgeT = constrain(fluidRidge[idx] + max(line, 0) * 0.65, 0, 1.6);
      const stretchT = constrain(fluidStretch[idx] + max(-line, 0) * 0.75, 0, 1.8);
      const combContrast = smoothFalloff(lineAge) * (1 - pin * 0.45);
      const combPaleT = constrain(paleT + stretchT * 0.45 * combContrast, 0, 1);
      const combSatT = constrain(saturatedT + ridgeT * 0.55 * combContrast, 0, 1);
      const dirX = fluidLineDirX[idx];
      const dirY = fluidLineDirY[idx];
      const dirPhase = stableNoise(
        gx * 3 + floor(fluidMatU[idx] * 11 + dirX * 17),
        gy * 3 + floor(fluidMatV[idx] * 7 + dirY * 17),
        pool.seed + 2301
      );
      const hairline = combContrast * (dirPhase > lerp(0.76, 0.40, constrain(ridgeT, 0, 1)) ? ridgeT : 0);
      let c = mixRgb(pool.rgb.base, pool.rgb.wash, 0.82 * combPaleT);
      c = mixRgb(c, pool.rgb.rim, 0.42 * combSatT);
      c = mixRgb(c, pool.rgb.rim, pin * 0.60 + hairline * 0.18);
      const alpha = constrain(
        38 + density * 76 + combSatT * 64 + pin * 44 - combPaleT * 38 + hairline * 28,
        10,
        205
      );
      pigmentLayer.fill(
        constrain(c.r + (n - 0.5) * 10, 0, 255),
        constrain(c.g + (n - 0.5) * 10, 0, 255),
        constrain(c.b + (n - 0.5) * 10, 0, 255),
        alpha
      );
      const shrink = pin > 0.4 ? 0 : combPaleT * 1.15 + stretchT * combContrast * 0.35;
      const skipLane = stretchT > 0.7 && combContrast > 0.25 && dirPhase < lerp(0.08, 0.26, constrain(stretchT, 0, 1));
      if (!skipLane) {
        pigmentLayer.rect(x + shrink, y + shrink, cellSize + 0.8 - shrink, cellSize + 0.8 - shrink);
      }

      if (pin > 0.62 && (gx + gy) % 2 === 0) {
        pigmentLayer.fill(pool.rgb.rim.r, pool.rgb.rim.g, pool.rgb.rim.b, 48 + 38 * pin);
        pigmentLayer.rect(x, y, cellSize + 0.8, cellSize + 0.8);
      }
    }

    // Contour/rim rendering: threshold bands darken the outer edge and neighbor
    // changes darken pigment-pigment seams, so clipping boundaries read as
    // intentional marbling contours instead of accidental field overlap.
    function drawPigmentCell(gx, gy, cell, pool, neighborRim) {
      const cellSize = quality.cellSize;
      const x = gx * cellSize;
      const y = gy * cellSize;
      const n = stableNoise(gx, gy, pool.seed);
      const edgeT = constrain((cell.strength - FIELD_THRESHOLD) / FIELD_RIM_BAND, 0, 1);
      const alpha = 82 + 72 * constrain(edgeT, 0, 1);
      const rimT = neighborRim ? 0.72 : Math.max(0, 1 - edgeT) * 0.62;
      const washT = constrain((cell.strength - 1.5) / 3.2, 0, 0.48);
      const washed = mixRgb(pool.rgb.base, pool.rgb.wash, washT);
      const c = mixRgb(washed, pool.rgb.rim, rimT);
      pigmentLayer.fill(
        constrain(c.r + (n - 0.5) * 10, 0, 255),
        constrain(c.g + (n - 0.5) * 10, 0, 255),
        constrain(c.b + (n - 0.5) * 10, 0, 255),
        neighborRim ? 166 : alpha
      );
      pigmentLayer.rect(x, y, cellSize + 0.8, cellSize + 0.8);

      if (neighborRim && (gx + gy) % 2 === 0) {
        pigmentLayer.fill(pool.rgb.rim.r, pool.rgb.rim.g, pool.rgb.rim.b, 46);
        pigmentLayer.rect(x, y, cellSize + 0.8, cellSize + 0.8);
      }
    }

    function chooseInitialQuality() {
      const viewportCellsAtHigh = Math.ceil(width / QUALITY_TIERS[0].cellSize) * Math.ceil(height / QUALITY_TIERS[0].cellSize);
      const mobileHint = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
      qualityIndex = mobileHint || viewportCellsAtHigh > 90000 ? 1 : 0;
      quality = QUALITY_TIERS[qualityIndex];
    }

    function adaptQuality(interacting) {
      if (fullFieldDirty && dirtyRects.length === 0) return;
      const totalLobes = totalLobeCount(pools);
      const crowded = pools.length > 14 || totalLobes > 92;
      const slow = lastRenderMs > quality.slowMs || (interacting && crowded && qualityIndex === 0);
      const fast = settled && lastRenderMs > 0 && lastRenderMs < quality.fastMs && pools.length < 12 && totalLobes < 70;

      slowFrameStreak = slow ? slowFrameStreak + 1 : 0;
      fastFrameStreak = fast ? fastFrameStreak + 1 : 0;

      if (slowFrameStreak >= 3 && qualityIndex < QUALITY_TIERS.length - 1) {
        setQuality(qualityIndex + 1);
        slowFrameStreak = 0;
        fastFrameStreak = 0;
      } else if (fastFrameStreak >= 90 && qualityIndex > 0) {
        setQuality(qualityIndex - 1);
        slowFrameStreak = 0;
        fastFrameStreak = 0;
      }
    }

    function setQuality(nextIndex) {
      if (nextIndex === qualityIndex) return;
      const previousGrid = captureFluidGrid();
      qualityIndex = nextIndex;
      quality = QUALITY_TIERS[qualityIndex];
      fieldCols = Math.ceil(width / quality.cellSize);
      fieldRows = Math.ceil(height / quality.cellSize);
      field = new Array(fieldCols * fieldRows);
      restoreFluidGrid(previousGrid);
      finishRake();
      for (const pool of pools) pool.updateGeometry();
      if (activePress) lastPreviewRect = null;
      markFullFieldDirty();
    }

    function captureFluidGrid() {
      return {
        cols: fieldCols,
        rows: fieldRows,
        cellSize: quality.cellSize,
        owners: fluidOwners,
        mask: fluidMask,
        borderPin: fluidBorderPin,
        density: fluidDensity,
        vx: fluidVx,
        vy: fluidVy,
        baseDensity: fluidBaseDensity,
        strength: fluidStrength,
        matU: fluidMatU,
        matV: fluidMatV,
        line: fluidLine,
        lineAge: fluidLineAge,
        lineDirX: fluidLineDirX,
        lineDirY: fluidLineDirY,
        ridge: fluidRidge,
        stretch: fluidStretch,
        everRaked: fluidEverRaked
      };
    }

    function restoreFluidGrid(previous) {
      allocateFluidGrid();
      if (!previous || !previous.cols || !previous.rows || !previous.owners) return;
      fluidEverRaked = !!previous.everRaked;
      for (let gy = 0; gy < fieldRows; gy++) {
        const py = gy * quality.cellSize + quality.cellSize * 0.5;
        const oldGy = constrain(floor(py / previous.cellSize), 0, previous.rows - 1);
        for (let gx = 0; gx < fieldCols; gx++) {
          const px = gx * quality.cellSize + quality.cellSize * 0.5;
          const oldGx = constrain(floor(px / previous.cellSize), 0, previous.cols - 1);
          const oldIdx = oldGx + oldGy * previous.cols;
          const idx = gx + gy * fieldCols;
          fluidOwners[idx] = previous.owners[oldIdx] ?? -1;
          fluidMask[idx] = previous.mask ? previous.mask[oldIdx] || 0 : 0;
          fluidBorderPin[idx] = previous.borderPin ? previous.borderPin[oldIdx] || 0 : 0;
          fluidDensity[idx] = previous.density ? previous.density[oldIdx] || 0 : 0;
          fluidBaseDensity[idx] = previous.baseDensity ? previous.baseDensity[oldIdx] || 0 : 0;
          fluidStrength[idx] = previous.strength ? previous.strength[oldIdx] || 0 : 0;
          fluidVx[idx] = previous.vx ? previous.vx[oldIdx] || 0 : 0;
          fluidVy[idx] = previous.vy ? previous.vy[oldIdx] || 0 : 0;
          fluidMatU[idx] = previous.matU ? previous.matU[oldIdx] || gx : gx;
          fluidMatV[idx] = previous.matV ? previous.matV[oldIdx] || gy : gy;
          fluidLine[idx] = previous.line ? previous.line[oldIdx] || 0 : 0;
          fluidLineAge[idx] = previous.lineAge ? previous.lineAge[oldIdx] || 0 : 0;
          fluidLineDirX[idx] = previous.lineDirX ? previous.lineDirX[oldIdx] || 0 : 0;
          fluidLineDirY[idx] = previous.lineDirY ? previous.lineDirY[oldIdx] || 0 : 0;
          fluidRidge[idx] = previous.ridge ? previous.ridge[oldIdx] || 0 : 0;
          fluidStretch[idx] = previous.stretch ? previous.stretch[oldIdx] || 0 : 0;
        }
      }
    }

    function allocateFluidGrid() {
      const len = Math.max(0, fieldCols * fieldRows);
      fluidOwners = new Int16Array(len);
      fluidOwners.fill(-1);
      fluidMask = new Float32Array(len);
      fluidBorderPin = new Float32Array(len);
      fluidDensity = new Float32Array(len);
      fluidDensityNext = new Float32Array(len);
      fluidVx = new Float32Array(len);
      fluidVy = new Float32Array(len);
      fluidVxNext = new Float32Array(len);
      fluidVyNext = new Float32Array(len);
      fluidBaseDensity = new Float32Array(len);
      fluidStrength = new Float32Array(len);
      fluidMatU = new Float32Array(len);
      fluidMatV = new Float32Array(len);
      fluidLine = new Float32Array(len);
      fluidLineNext = new Float32Array(len);
      fluidLineAge = new Float32Array(len);
      fluidLineAgeNext = new Float32Array(len);
      fluidLineDirX = new Float32Array(len);
      fluidLineDirY = new Float32Array(len);
      fluidRidge = new Float32Array(len);
      fluidRidgeNext = new Float32Array(len);
      fluidStretch = new Float32Array(len);
      fluidStretchNext = new Float32Array(len);
      fluidDirty = false;
      raking = false;
      lastRakePoint = null;
      lastRakeRawPoint = null;
      rakeDirection = null;
      activeRakeSourceId = 0;
    }

    function markFullFieldDirty() {
      fullFieldDirty = true;
      dirtyRects = [];
      dirty = true;
    }

    function markDirtyRect(rect) {
      if (!rect || fullFieldDirty) {
        dirty = true;
        return;
      }
      const clamped = clampRect(expandRect(rect, DIRTY_PADDING_CELLS));
      if (!clamped) return;
      dirtyRects.push(clamped);
      dirty = true;
    }

    function consumeDirtyRects() {
      if (fullFieldDirty || dirtyRects.length === 0) {
        fullFieldDirty = false;
        dirtyRects = [];
        return [{ x0: 0, y0: 0, x1: fieldCols, y1: fieldRows }];
      }
      const rect = dirtyRects.reduce((merged, next) => unionRects(merged, next));
      dirtyRects = [];
      const coverage = rectArea(rect) / Math.max(1, fieldCols * fieldRows);
      if (coverage > FULL_REDRAW_COVERAGE) {
        return [{ x0: 0, y0: 0, x1: fieldCols, y1: fieldRows }];
      }
      return [rect];
    }

    function clearPigmentRects(rects) {
      const cellSize = quality.cellSize;
      for (const rect of rects) {
        const px = rect.x0 * cellSize;
        const py = rect.y0 * cellSize;
        const pw = (rect.x1 - rect.x0) * cellSize + cellSize;
        const ph = (rect.y1 - rect.y0) * cellSize + cellSize;
        pigmentLayer.drawingContext.clearRect(px, py, pw, ph);
      }
    }

    function poolsForRect(renderPools, rect) {
      const candidates = [];
      for (let i = 0; i < renderPools.length; i++) {
        const pool = renderPools[i];
        if (pool.fieldRect && rectsOverlap(pool.fieldRect, rect)) candidates.push(i);
      }
      return candidates;
    }

    function markActivePreviewDirty() {
      if (!activePress || !shouldRenderHoldPreview(activePress)) {
        if (lastPreviewRect) markDirtyRect(lastPreviewRect);
        lastPreviewRect = null;
        return;
      }
      const preview = previewPoolFromPress(activePress);
      if (lastPreviewRect) markDirtyRect(lastPreviewRect);
      markDirtyRect(preview.fieldRect);
      lastPreviewRect = preview.fieldRect;
    }

    function unionRects(a, b) {
      return {
        x0: Math.min(a.x0, b.x0),
        y0: Math.min(a.y0, b.y0),
        x1: Math.max(a.x1, b.x1),
        y1: Math.max(a.y1, b.y1)
      };
    }

    function expandRect(rect, cells) {
      return { x0: rect.x0 - cells, y0: rect.y0 - cells, x1: rect.x1 + cells, y1: rect.y1 + cells };
    }

    function clampRect(rect) {
      const clamped = {
        x0: constrain(floor(rect.x0), 0, fieldCols),
        y0: constrain(floor(rect.y0), 0, fieldRows),
        x1: constrain(ceil(rect.x1), 0, fieldCols),
        y1: constrain(ceil(rect.y1), 0, fieldRows)
      };
      if (clamped.x1 <= clamped.x0 || clamped.y1 <= clamped.y0) return null;
      return clamped;
    }

    function rectsOverlap(a, b) {
      return a.x0 < b.x1 && a.x1 > b.x0 && a.y0 < b.y1 && a.y1 > b.y0;
    }

    function rectArea(rect) {
      return Math.max(0, rect.x1 - rect.x0) * Math.max(0, rect.y1 - rect.y0);
    }

    function totalLobeCount(list) {
      return list.reduce((sum, pool) => sum + pool.lobes.length, 0);
    }

    function parseHexRgb(hex) {
      const raw = hex.replace('#', '');
      return {
        r: parseInt(raw.slice(0, 2), 16),
        g: parseInt(raw.slice(2, 4), 16),
        b: parseInt(raw.slice(4, 6), 16)
      };
    }

    function mixRgb(a, b, t) {
      return {
        r: a.r + (b.r - a.r) * t,
        g: a.g + (b.g - a.g) * t,
        b: a.b + (b.b - a.b) * t
      };
    }

    function renderPressPreview() {
      if (!activePress || !shouldRenderHoldPreview(activePress)) return;
      const held = millis() - activePress.startedAt;
      const t = holdToUnit(held);
      noFill();
      stroke(35, 25, 18, 34 + 28 * t);
      strokeWeight(1);
      const r = sqrt(holdToMass(held) / PI) * 1.15;
      circle(activePress.x, activePress.y, r * 2);
      stroke(255, 250, 238, 60);
      circle(activePress.x, activePress.y, max(8, r * 0.6));
    }

    function shouldRenderHoldPreview(press) {
      return press && millis() - press.startedAt >= TAP_TO_HOLD_MS;
    }

    function startPress(x, y) {
      const corner = handleCornerActionStart(x, y);
      if (corner) return;
      activePress = {
        x: constrain(x, 0, width),
        y: constrain(y, 0, height),
        startX: constrain(x, 0, width),
        startY: constrain(y, 0, height),
        moved: false,
        startedAt: millis(),
        color: choosePigment(),
        seed: random(1000000)
      };
      lastPreviewRect = null;
      markActivePreviewDirty();
    }

    function endPress() {
      if (!activePress) return;
      const press = activePress;
      const held = millis() - press.startedAt;
      if (lastPreviewRect) markDirtyRect(lastPreviewRect);
      lastPreviewRect = null;
      activePress = null;

      if (held < TAP_TO_HOLD_MS && !press.moved) {
        addSplatter(press.x, press.y, press.color, press.seed);
        return;
      }

      const pool = createPool(press.x, press.y, held, press.color, press.seed, false);
      pools.push(pool);
      markDirtyRect(pool.fieldRect);
    }

    function addSplatter(x, y, pigment, seed) {
      randomSeed(floor(seed));
      const count = floor(random(SPLATTER_MIN_DROPS, SPLATTER_MAX_DROPS + 0.99));
      const affected = [];
      for (let i = 0; i < count; i++) {
        const angle = random(TWO_PI);
        const radius = sqrt(random()) * SPLATTER_RADIUS;
        const sx = constrain(x + cos(angle) * radius, 0, width);
        const sy = constrain(y + sin(angle) * radius, 0, height);
        const mass = random(180, 620) * (i === 0 ? 1.15 : 1);
        const lobes = floor(random(1, 3.99));
        const pool = createPoolFromMass(sx, sy, mass, lobes, pigment, seed + 97 * (i + 1), false);
        pools.push(pool);
        affected.push(pool.fieldRect);
      }
      for (const rect of affected) markDirtyRect(rect);
    }

    function handleCornerActionStart(x, y) {
      if (isTopLeftAction(x, y)) {
        nextPalette();
        return true;
      }
      if (isTopRightAction(x, y)) {
        startResetHold(x, y);
        return true;
      }
      return false;
    }

    function isTopLeftAction(x, y) {
      return x < CORNER_ACTION_SIZE && y < CORNER_ACTION_SIZE;
    }

    function isTopRightAction(x, y) {
      return x > width - CORNER_ACTION_SIZE && y < CORNER_ACTION_SIZE;
    }

    function startResetHold(x, y) {
      cancelResetHold();
      pendingReset = {
        x,
        y,
        completed: false,
        timer: window.setTimeout(() => {
          if (!pendingReset) return;
          pendingReset.completed = true;
          resetAll();
        }, RESET_HOLD_MS)
      };
      dirty = true;
    }

    function cancelResetHold() {
      if (!pendingReset) return;
      window.clearTimeout(pendingReset.timer);
      pendingReset = null;
      dirty = true;
    }

    function updateCornerActionHold(x, y) {
      if (pendingReset && !pendingReset.completed && !isTopRightAction(x, y)) {
        cancelResetHold();
      }
    }

    function finishCornerActionHold() {
      if (pendingReset && !pendingReset.completed) {
        cancelResetHold();
        return true;
      }
      if (pendingReset && pendingReset.completed) {
        pendingReset = null;
        return true;
      }
      return false;
    }

    function handlePointerMove(x, y) {
      updateCornerActionHold(x, y);
      if (!activePress) return;
      const dx = x - activePress.startX;
      const dy = y - activePress.startY;
      if (sqrt(dx * dx + dy * dy) > TAP_MOVE_TOLERANCE) activePress.moved = true;
    }

    function touchCentroid() {
      if (!touches || touches.length === 0) return { x: mouseX, y: mouseY };
      let x = 0;
      let y = 0;
      for (const t of touches) {
        x += t.x;
        y += t.y;
      }
      return { x: x / touches.length, y: y / touches.length };
    }

    function beginRake(x, y) {
      cancelResetHold();
      activePress = null;
      if (dirty || fullFieldDirty || dirtyRects.length) renderScene();
      raking = true;
      const point = { x: constrain(x, 0, width), y: constrain(y, 0, height) };
      activeRakeSourceId = samplePoolIdAt(point.x, point.y);
      lastRakePoint = point;
      lastRakeRawPoint = point;
      rakeDirection = null;
    }

    function finishRake() {
      if (!raking) return false;
      raking = false;
      lastRakePoint = null;
      lastRakeRawPoint = null;
      rakeDirection = null;
      activeRakeSourceId = 0;
      dirty = true;
      return true;
    }

    function samplePoolIdAt(x, y) {
      const gx = constrain(floor(x / quality.cellSize), 0, fieldCols - 1);
      const gy = constrain(floor(y / quality.cellSize), 0, fieldRows - 1);
      const cell = field[gx + gy * fieldCols];
      if (!cell || cell.owner < 0) return 0;
      const pool = pools[cell.owner];
      return pool ? pool.id : 0;
    }

    function updateRake(x, y) {
      if (!raking || !lastRakePoint) return;
      const raw = { x: constrain(x, 0, width), y: constrain(y, 0, height) };
      const smooth = smoothRakePoint(raw);
      const dx = smooth.x - lastRakePoint.x;
      const dy = smooth.y - lastRakePoint.y;
      const len = sqrt(dx * dx + dy * dy);
      if (len < RAKE_MIN_MOVE) return;

      updateRakeDirection(dx, dy, len);
      const steps = max(1, ceil(len / RAKE_STEP));
      let from = lastRakePoint;
      for (let i = 1; i <= steps; i++) {
        const t = i / steps;
        const to = {
          x: lerp(lastRakePoint.x, smooth.x, t),
          y: lerp(lastRakePoint.y, smooth.y, t)
        };
        applyFluidRake(from.x, from.y, to.x, to.y, rakeDirection);
        from = to;
      }
      lastRakePoint = smooth;
      lastRakeRawPoint = raw;
    }

    function smoothRakePoint(raw) {
      if (!lastRakeRawPoint || !lastRakePoint) return raw;
      return {
        x: lerp(lastRakePoint.x, raw.x, RAKE_SMOOTHING),
        y: lerp(lastRakePoint.y, raw.y, RAKE_SMOOTHING)
      };
    }

    function updateRakeDirection(dx, dy, len) {
      const ux = dx / len;
      const uy = dy / len;
      if (!rakeDirection) {
        rakeDirection = { x: ux, y: uy };
        return;
      }
      const blendedX = lerp(rakeDirection.x, ux, 0.28);
      const blendedY = lerp(rakeDirection.y, uy, 0.28);
      const blendedLen = sqrt(blendedX * blendedX + blendedY * blendedY) || 1;
      rakeDirection = { x: blendedX / blendedLen, y: blendedY / blendedLen };
    }

    // Stable-fluid-inspired rake: each comb tooth injects velocity into the
    // clipped owner grid. A few semi-Lagrangian steps then advect finite density;
    // pinned rims damp velocity and restore density so silhouettes stay organic.
    function applyFluidRake(x0, y0, x1, y1, direction) {
      const dx = x1 - x0;
      const dy = y1 - y0;
      const len = sqrt(dx * dx + dy * dy);
      if (len < 0.25 || fieldCols <= 0 || fieldRows <= 0) return;

      const ux = direction ? direction.x : dx / len;
      const uy = direction ? direction.y : dy / len;
      const nx = -uy;
      const ny = ux;
      const profile = currentRakeProfile();
      const start = -(profile.toothCount - 1) * 0.5;
      let dirtyRect = null;
      for (let i = 0; i < profile.toothCount; i++) {
        const offset = (start + i) * profile.toothSpacing;
        const toothRect = injectFluidTooth(
          x0 + nx * offset,
          y0 + ny * offset,
          x1 + nx * offset,
          y1 + ny * offset,
          max(len, RAKE_STEP),
          ux,
          uy,
          nx,
          ny,
          i,
          profile
        );
        if (toothRect) dirtyRect = dirtyRect ? unionRects(dirtyRect, toothRect) : toothRect;
      }
      if (!dirtyRect) return;
      fluidEverRaked = true;
      for (let i = 0; i < FLUID_STEPS_PER_RAKE; i++) {
        clampVelocityToMask();
        advectVelocitySemiLagrangian();
        advectDensitySemiLagrangian();
        advectCombFieldsSemiLagrangian();
        dampCombFields();
        dampAndPinFluid();
      }
      const combPad = profile.radius + COMB_RIDGE_OFFSET + COMB_RIDGE_WIDTH;
      markDirtyRect(expandRect(dirtyRect, ceil((RAKE_MAX_OFFSET + combPad) / quality.cellSize)));
    }

    function currentRakeProfile() {
      const altKeyCode = typeof ALT !== 'undefined' ? ALT : 18;
      const fine = typeof keyIsDown === 'function' && keyIsDown(altKeyCode);
      return fine
        ? { toothCount: FINE_RAKE_TOOTH_COUNT, toothSpacing: FINE_RAKE_TOOTH_SPACING, radius: FINE_RAKE_RADIUS, strength: FINE_RAKE_STRENGTH, lineMultiplier: FINE_RAKE_LINE_MULTIPLIER }
        : { toothCount: RAKE_TOOTH_COUNT, toothSpacing: RAKE_TOOTH_SPACING, radius: RAKE_RADIUS, strength: RAKE_STRENGTH, lineMultiplier: 1 };
    }

    function shouldStepFluidOwner(owner) {
      return activeRakeSourceId <= 0 || owner === activeRakeSourceId;
    }

    function activeBorderPin(pin) {
      return activeRakeSourceId > 0 ? pin * ACTIVE_RAKE_BORDER_PIN_SCALE : pin;
    }

    function injectFluidTooth(x0, y0, x1, y1, len, ux, uy, nx, ny, toothIndex, profile) {
      const cellSize = quality.cellSize;
      const editPad = profile.radius + COMB_RIDGE_OFFSET + COMB_RIDGE_WIDTH + cellSize * 2;
      const rect = clampRect({
        x0: floor((min(x0, x1) - editPad) / cellSize),
        y0: floor((min(y0, y1) - editPad) / cellSize),
        x1: ceil((max(x0, x1) + editPad) / cellSize),
        y1: ceil((max(y0, y1) + editPad) / cellSize)
      });
      if (!rect) return null;

      let touched = false;
      for (let gy = rect.y0; gy < rect.y1; gy++) {
        const cy = gy * cellSize + cellSize * 0.5;
        for (let gx = rect.x0; gx < rect.x1; gx++) {
          const cx = gx * cellSize + cellSize * 0.5;
          const nearest = closestPointOnSegment(cx, cy, x0, y0, x1, y1);
          const ddx = cx - nearest.x;
          const ddy = cy - nearest.y;
          const dist = sqrt(ddx * ddx + ddy * ddy);
          if (dist > profile.radius) continue;
          const idx = gx + gy * fieldCols;
          const ownerId = fluidOwners[idx];
          if (ownerId < 0 || fluidMask[idx] <= 0) continue;
          // Lock each rake stroke to the first pigment it touches. Without this,
          // every tooth injects velocity into every crossed owner, so a comb pass
          // visually drains all colors at once instead of dragging one spread color.
          if (activeRakeSourceId <= 0) activeRakeSourceId = ownerId;
          if (ownerId !== activeRakeSourceId) continue;
          const falloff = smoothFalloff(1 - dist / profile.radius);
          const pin = constrain(fluidBorderPin[idx], 0, 1);
          const activePin = activeBorderPin(pin);
          const force = profile.strength * falloff * lerp(1, BORDER_VELOCITY_SCALE, activePin);
          if (force <= 0.01) continue;
          const jitter = (stableNoise(gx + toothIndex * 19, gy - toothIndex * 23, 4219) - 0.5) * 0.42;
          fluidVx[idx] += ux * force + nx * force * jitter;
          fluidVy[idx] += uy * force + ny * force * jitter;
          const signed = (cx - nearest.x) * nx + (cy - nearest.y) * ny;
          const centerLane = Math.exp(-(signed * signed) / (2 * COMB_CENTER_LANE_RADIUS * COMB_CENTER_LANE_RADIUS));
          const ridgeA = Math.exp(-((signed - COMB_RIDGE_OFFSET) * (signed - COMB_RIDGE_OFFSET)) / (2 * COMB_RIDGE_WIDTH * COMB_RIDGE_WIDTH));
          const ridgeB = Math.exp(-((signed + COMB_RIDGE_OFFSET) * (signed + COMB_RIDGE_OFFSET)) / (2 * COMB_RIDGE_WIDTH * COMB_RIDGE_WIDTH));
          const ridge = max(ridgeA, ridgeB);
          const lane = centerLane;
          const stamp = falloff * lerp(1, 0.18, activePin) * profile.lineMultiplier;
          fluidLine[idx] = constrain(fluidLine[idx] + ridge * COMB_LINE_STRENGTH * stamp - lane * COMB_LINE_STRENGTH * stamp, -1.4, 1.8);
          fluidRidge[idx] = constrain(fluidRidge[idx] + ridge * COMB_RIDGE_STRENGTH * stamp, 0, 2.0);
          fluidStretch[idx] = constrain(fluidStretch[idx] + lane * COMB_STRETCH_STRENGTH * stamp, 0, 2.0);
          fluidLineAge[idx] = min(1, fluidLineAge[idx] + 0.65 * stamp);
          fluidLineDirX[idx] = lerp(fluidLineDirX[idx] || ux, ux, COMB_DIRECTION_BLEND * stamp);
          fluidLineDirY[idx] = lerp(fluidLineDirY[idx] || uy, uy, COMB_DIRECTION_BLEND * stamp);
          const deposit = ridge * 0.08 * stamp;
          const thin = lane * 0.055 * stamp;
          fluidDensity[idx] = constrain(fluidDensity[idx] + deposit - thin, 0.03, MAX_DENSITY_VISUAL * 1.25);
          if (pin > 0.35) seedBorderDragCells(gx, gy, idx, ux, uy, nx, ny, falloff, stamp);
          touched = true;
        }
      }
      return touched ? rect : null;
    }

    function seedBorderDragCells(gx, gy, sourceIdx, ux, uy, nx, ny, falloff, stamp) {
      const owner = fluidOwners[sourceIdx];
      if (owner < 0 || owner !== activeRakeSourceId) return;
      const sourceDensity = fluidDensity[sourceIdx];
      const sourceLine = fluidLine[sourceIdx];
      const sourceAge = fluidLineAge[sourceIdx];
      const sourceRidge = fluidRidge[sourceIdx];
      const sourceStretch = fluidStretch[sourceIdx];
      for (let step = 1; step <= BORDER_DRAG_CELL_STEPS; step++) {
        const tx = constrain(floor(gx + ux * step), 0, fieldCols - 1);
        const ty = constrain(floor(gy + uy * step), 0, fieldRows - 1);
        const idx = tx + ty * fieldCols;
        if (idx === sourceIdx) continue;
        if (fluidOwners[idx] >= 0 && fluidOwners[idx] !== owner) continue;
        const outward = smoothFalloff(1 - (step - 1) / BORDER_DRAG_CELL_STEPS) * falloff;
        if (outward <= 0.04) continue;
        fluidOwners[idx] = owner;
        fluidMask[idx] = 1;
        fluidBorderPin[idx] = max(fluidBorderPin[idx] || 0, 0.72);
        fluidStrength[idx] = max(fluidStrength[idx] || 0, FIELD_THRESHOLD + 0.01);
        fluidBaseDensity[idx] = max(fluidBaseDensity[idx] || 0, 0.36);
        fluidDensity[idx] = max(fluidDensity[idx], sourceDensity * BORDER_DRAG_DENSITY * outward);
        fluidVx[idx] = lerp(fluidVx[idx] || 0, ux * RAKE_STRENGTH * outward, 0.55);
        fluidVy[idx] = lerp(fluidVy[idx] || 0, uy * RAKE_STRENGTH * outward, 0.55);
        fluidMatU[idx] = fluidMatU[sourceIdx] + ux * step + nx * 0.15;
        fluidMatV[idx] = fluidMatV[sourceIdx] + uy * step + ny * 0.15;
        fluidLine[idx] = lerp(fluidLine[idx] || 0, sourceLine, 0.42 * stamp);
        fluidLineAge[idx] = max(fluidLineAge[idx] || 0, sourceAge * 0.86);
        fluidLineDirX[idx] = ux;
        fluidLineDirY[idx] = uy;
        fluidRidge[idx] = max(fluidRidge[idx] || 0, sourceRidge * 0.72 * outward);
        fluidStretch[idx] = max(fluidStretch[idx] || 0, sourceStretch * 0.72 * outward);
      }
    }

    function clampVelocityToMask() {
      for (let gy = 0; gy < fieldRows; gy++) {
        for (let gx = 0; gx < fieldCols; gx++) {
          const idx = gx + gy * fieldCols;
          if (fluidOwners[idx] < 0 || fluidMask[idx] <= 0) {
            fluidVx[idx] = 0;
            fluidVy[idx] = 0;
            continue;
          }
          const owner = fluidOwners[idx];
          if (!shouldStepFluidOwner(owner)) {
            fluidVx[idx] *= VELOCITY_DAMPING;
            fluidVy[idx] *= VELOCITY_DAMPING;
            continue;
          }
          const nextX = constrain(gx + fluidVx[idx] * FLUID_DT, 0, fieldCols - 1);
          const nextY = constrain(gy + fluidVy[idx] * FLUID_DT, 0, fieldRows - 1);
          const nidx = floor(nextX) + floor(nextY) * fieldCols;
          if (fluidOwners[nidx] !== owner || fluidMask[nidx] <= 0) {
            fluidVx[idx] *= -0.18;
            fluidVy[idx] *= -0.18;
          }
          const pinDamp = lerp(1, BORDER_VELOCITY_SCALE, activeBorderPin(fluidBorderPin[idx]));
          fluidVx[idx] *= pinDamp;
          fluidVy[idx] *= pinDamp;
        }
      }
    }

    function advectVelocitySemiLagrangian() {
      for (let gy = 0; gy < fieldRows; gy++) {
        for (let gx = 0; gx < fieldCols; gx++) {
          const idx = gx + gy * fieldCols;
          const owner = fluidOwners[idx];
          if (owner < 0 || fluidMask[idx] <= 0) {
            fluidVxNext[idx] = 0;
            fluidVyNext[idx] = 0;
            continue;
          }
          if (!shouldStepFluidOwner(owner)) {
            fluidVxNext[idx] = fluidVx[idx];
            fluidVyNext[idx] = fluidVy[idx];
            continue;
          }
          const sx = gx - fluidVx[idx] * FLUID_DT;
          const sy = gy - fluidVy[idx] * FLUID_DT;
          fluidVxNext[idx] = sampleFluidScalar(fluidVx, owner, sx, sy, fluidVx[idx]);
          fluidVyNext[idx] = sampleFluidScalar(fluidVy, owner, sx, sy, fluidVy[idx]);
        }
      }
      [fluidVx, fluidVxNext] = [fluidVxNext, fluidVx];
      [fluidVy, fluidVyNext] = [fluidVyNext, fluidVy];
    }

    function advectDensitySemiLagrangian() {
      for (let gy = 0; gy < fieldRows; gy++) {
        for (let gx = 0; gx < fieldCols; gx++) {
          const idx = gx + gy * fieldCols;
          const owner = fluidOwners[idx];
          if (owner < 0 || fluidMask[idx] <= 0) {
            fluidDensityNext[idx] = 0;
            continue;
          }
          if (!shouldStepFluidOwner(owner)) {
            fluidDensityNext[idx] = fluidDensity[idx];
            continue;
          }
          const sx = gx - fluidVx[idx] * FLUID_DT;
          const sy = gy - fluidVy[idx] * FLUID_DT;
          let d = sampleFluidScalar(fluidDensity, owner, sx, sy, fluidDensity[idx]);
          const div = velocityDivergence(gx, gy, owner);
          d += constrain(-div * DENSITY_COMPRESSION, -0.20, 0.36);
          fluidDensityNext[idx] = constrain(d * DENSITY_DAMPING, 0, MAX_DENSITY_VISUAL * 1.35);
        }
      }
      [fluidDensity, fluidDensityNext] = [fluidDensityNext, fluidDensity];
    }

    function advectCombFieldsSemiLagrangian() {
      for (let gy = 0; gy < fieldRows; gy++) {
        for (let gx = 0; gx < fieldCols; gx++) {
          const idx = gx + gy * fieldCols;
          const owner = fluidOwners[idx];
          if (owner < 0 || fluidMask[idx] <= 0) {
            fluidLineNext[idx] = 0;
            fluidLineAgeNext[idx] = 0;
            fluidRidgeNext[idx] = 0;
            fluidStretchNext[idx] = 0;
            continue;
          }
          if (!shouldStepFluidOwner(owner)) {
            fluidLineNext[idx] = fluidLine[idx];
            fluidLineAgeNext[idx] = fluidLineAge[idx];
            fluidRidgeNext[idx] = fluidRidge[idx];
            fluidStretchNext[idx] = fluidStretch[idx];
            continue;
          }
          const sx = gx - fluidVx[idx] * FLUID_DT;
          const sy = gy - fluidVy[idx] * FLUID_DT;
          fluidLineNext[idx] = sampleFluidScalar(fluidLine, owner, sx, sy, fluidLine[idx]);
          fluidLineAgeNext[idx] = sampleFluidScalar(fluidLineAge, owner, sx, sy, fluidLineAge[idx]);
          fluidRidgeNext[idx] = sampleFluidScalar(fluidRidge, owner, sx, sy, fluidRidge[idx]);
          fluidStretchNext[idx] = sampleFluidScalar(fluidStretch, owner, sx, sy, fluidStretch[idx]);
        }
      }
      [fluidLine, fluidLineNext] = [fluidLineNext, fluidLine];
      [fluidLineAge, fluidLineAgeNext] = [fluidLineAgeNext, fluidLineAge];
      [fluidRidge, fluidRidgeNext] = [fluidRidgeNext, fluidRidge];
      [fluidStretch, fluidStretchNext] = [fluidStretchNext, fluidStretch];
    }

    function dampCombFields() {
      for (let i = 0; i < fluidOwners.length; i++) {
        if (fluidOwners[i] < 0 || fluidMask[i] <= 0 || !shouldStepFluidOwner(fluidOwners[i])) continue;
        const pin = activeBorderPin(constrain(fluidBorderPin[i], 0, 1));
        fluidLine[i] *= COMB_LINE_DECAY;
        fluidLineAge[i] *= COMB_AGE_DECAY;
        fluidRidge[i] *= 0.992;
        fluidStretch[i] *= 0.990;
        const borderNeutral = pin * 0.25;
        if (borderNeutral > 0) {
          fluidLine[i] = lerp(fluidLine[i], 0, borderNeutral);
          fluidStretch[i] = lerp(fluidStretch[i], 0, borderNeutral);
          fluidRidge[i] = lerp(fluidRidge[i], 0, borderNeutral * 0.7);
        }
      }
    }

    function sampleFluidScalar(buffer, owner, x, y, fallback) {
      if (x < 0 || y < 0 || x > fieldCols - 1 || y > fieldRows - 1) return fallback;
      const x0 = floor(x);
      const y0 = floor(y);
      const x1 = min(fieldCols - 1, x0 + 1);
      const y1 = min(fieldRows - 1, y0 + 1);
      const tx = x - x0;
      const ty = y - y0;
      let sum = 0;
      let weight = 0;
      const taps = [
        [x0, y0, (1 - tx) * (1 - ty)],
        [x1, y0, tx * (1 - ty)],
        [x0, y1, (1 - tx) * ty],
        [x1, y1, tx * ty]
      ];
      for (const tap of taps) {
        const idx = tap[0] + tap[1] * fieldCols;
        if (fluidOwners[idx] !== owner || fluidMask[idx] <= 0) continue;
        sum += buffer[idx] * tap[2];
        weight += tap[2];
      }
      return weight > 0.001 ? sum / weight : fallback;
    }

    function velocityDivergence(gx, gy, owner) {
      const c = gx + gy * fieldCols;
      const l = gx > 0 && fluidOwners[c - 1] === owner ? c - 1 : c;
      const r = gx < fieldCols - 1 && fluidOwners[c + 1] === owner ? c + 1 : c;
      const u = gy > 0 && fluidOwners[c - fieldCols] === owner ? c - fieldCols : c;
      const d = gy < fieldRows - 1 && fluidOwners[c + fieldCols] === owner ? c + fieldCols : c;
      return (fluidVx[r] - fluidVx[l] + fluidVy[d] - fluidVy[u]) * 0.5;
    }

    function dampAndPinFluid() {
      for (let i = 0; i < fluidOwners.length; i++) {
        if (fluidOwners[i] < 0 || fluidMask[i] <= 0 || !shouldStepFluidOwner(fluidOwners[i])) continue;
        const pin = activeBorderPin(constrain(fluidBorderPin[i], 0, 1));
        fluidVx[i] *= VELOCITY_DAMPING * lerp(1, BORDER_VELOCITY_SCALE, pin);
        fluidVy[i] *= VELOCITY_DAMPING * lerp(1, BORDER_VELOCITY_SCALE, pin);
        if (pin > 0.05) {
          const restore = BORDER_DENSITY_BLEND * pin;
          fluidDensity[i] = lerp(fluidDensity[i], fluidBaseDensity[i] || 1, restore);
        }
      }
    }

    function smoothFalloff(t) {
      const clamped = constrain(t, 0, 1);
      return clamped * clamped * (3 - 2 * clamped);
    }

    function closestPointOnSegment(px, py, x0, y0, x1, y1) {
      const sx = x1 - x0;
      const sy = y1 - y0;
      const l2 = sx * sx + sy * sy;
      if (l2 <= 0.0001) return { x: x0, y: y0 };
      const t = constrain(((px - x0) * sx + (py - y0) * sy) / l2, 0, 1);
      return { x: x0 + sx * t, y: y0 + sy * t };
    }

    // Hold mapping: duration is clamped, eased, converted to target area/mass,
    // then split across a performance-capped 3-8/9 child lobes. This makes quick taps visibly small
    // while long holds create broader footprints with richer asymmetric edges.
    function holdToUnit(ms) {
      const clamped = constrain(ms, MIN_HOLD_MS, MAX_HOLD_MS);
      const t = (clamped - MIN_HOLD_MS) / (MAX_HOLD_MS - MIN_HOLD_MS);
      return t * t * (3 - 2 * t);
    }

    function holdToMass(ms) {
      const minArea = 1600;
      const maxArea = min(width * height * 0.105, 36000);
      return lerp(minArea, maxArea, holdToUnit(ms));
    }

    function choosePigment() {
      const palette = PALETTES[paletteIndex];
      const pigment = palette.pigments[pigmentIndex % palette.pigments.length];
      pigmentIndex++;
      return pigment;
    }

    function createPool(x, y, holdMs, pigment, seed, preview) {
      const mass = holdToMass(holdMs);
      const t = holdToUnit(holdMs);
      const lowComplexity = pools.length < 8 && totalLobeCount(pools) < 46 && qualityIndex === 0;
      const maxLobes = lowComplexity ? 9 : 8;
      const lobeCount = floor(lerp(3, maxLobes + 0.99, t));
      return createPoolFromMass(x, y, mass, lobeCount, pigment, seed, preview);
    }

    function createPoolFromMass(x, y, mass, lobeCount, pigment, seed, preview) {
      const id = preview ? -1 : poolId++;
      return new PigmentPool(id, x, y, mass, lobeCount, pigment, seed, preview);
    }

    function previewPoolFromPress(press) {
      const p = createPool(press.x, press.y, millis() - press.startedAt, press.color, press.seed, true);
      p.currentMass = p.targetMass * 0.38;
      for (const lobe of p.lobes) {
        lobe.radius = lobe.targetRadius * 0.42;
        lobe.offsetNow = lobe.offsetTarget * 0.45;
      }
      p.updateGeometry();
      return p;
    }

    class PigmentPool {
      constructor(id, x, y, mass, lobeCount, colorValue, seed, preview) {
        this.id = id;
        this.center = { x, y };
        this.createdAt = preview ? millis() + 999999 : millis();
        this.color = colorValue;
        this.rgb = {
          base: parseHexRgb(colorValue.base),
          rim: parseHexRgb(colorValue.rim),
          wash: parseHexRgb(colorValue.wash)
        };
        this.targetMass = mass;
        this.currentMass = preview ? mass * 0.35 : 32;
        this.growthRate = random(0.010, 0.018);
        this.seed = seed;
        this.settled = false;
        this.preview = preview;
        this.lobes = [];
        this.sampleLobes = [];
        this.pixelBounds = null;
        this.fieldRect = null;
        this.makeLobes(lobeCount);
        this.updateGeometry();
      }

      makeLobes(count) {
        randomSeed(floor(this.seed));
        const baseRadius = sqrt(this.targetMass / PI);
        let weights = [];
        let total = 0;
        for (let i = 0; i < count; i++) {
          const w = random(0.55, 1.45);
          weights.push(w);
          total += w;
        }
        for (let i = 0; i < count; i++) {
          const angle = (TWO_PI * i / count) + random(-0.55, 0.55);
          const offsetTarget = i === 0 ? 0 : random(baseRadius * 0.12, baseRadius * 0.64);
          const lobeMass = this.targetMass * weights[i] / total * random(0.88, 1.22);
          const targetRadius = sqrt(lobeMass / PI) * random(1.55, 2.12);
          this.lobes.push({
            angle,
            offsetTarget,
            offsetNow: 0,
            radius: 2 + random(0, 2),
            targetRadius,
            growthVariation: random(0.72, 1.22),
            phase: random(1000)
          });
        }
      }

      update() {
        if (this.preview || this.settled) return false;
        const previousRect = this.fieldRect;
        const before = this.currentMass;
        this.currentMass = lerp(this.currentMass, this.targetMass, this.growthRate);
        const progress = constrain(this.currentMass / this.targetMass, 0, 1);
        let moving = Math.abs(this.currentMass - before) > 0.2;
        for (const lobe of this.lobes) {
          const targetR = lobe.targetRadius * sqrt(progress);
          const nextR = lerp(lobe.radius, targetR, 0.045 * lobe.growthVariation);
          const nextOffset = lerp(lobe.offsetNow, lobe.offsetTarget, 0.032 * lobe.growthVariation);
          if (Math.abs(nextR - lobe.radius) > 0.05 || Math.abs(nextOffset - lobe.offsetNow) > 0.04) moving = true;
          lobe.radius = nextR;
          // Drift is only during growth; once settled these offsets freeze.
          const drift = (noise(this.seed * 0.001, lobe.phase, progress * 1.7) - 0.5) * 4 * (1 - progress);
          lobe.offsetNow = nextOffset + drift;
        }
        if (progress >= SETTLE_EPSILON && !moving) this.settled = true;
        if (progress >= 0.998) {
          this.currentMass = this.targetMass;
          for (const lobe of this.lobes) {
            lobe.radius = lobe.targetRadius;
            lobe.offsetNow = lobe.offsetTarget;
          }
          this.settled = true;
          moving = true;
        }
        this.updateGeometry();
        if (moving) {
          markDirtyRect(previousRect);
          markDirtyRect(this.fieldRect);
        }
        return moving;
      }

      updateGeometry() {
        const cellSize = quality.cellSize;
        this.sampleLobes = [];
        let x0 = Infinity;
        let y0 = Infinity;
        let x1 = -Infinity;
        let y1 = -Infinity;
        for (const lobe of this.lobes) {
          const lx = this.center.x + cos(lobe.angle) * lobe.offsetNow;
          const ly = this.center.y + sin(lobe.angle) * lobe.offsetNow;
          const influenceRadius = Math.max(8, lobe.radius * FIELD_INFLUENCE_FACTOR + 10);
          const warpRadius = lobe.radius * 0.18;
          this.sampleLobes.push({
            x: lx,
            y: ly,
            radius: lobe.radius,
            radius2: lobe.radius * lobe.radius,
            influence2: (influenceRadius + warpRadius) * (influenceRadius + warpRadius),
            phase: lobe.phase,
            phaseCos: cos(lobe.phase),
            phaseSin: sin(lobe.phase)
          });
          x0 = Math.min(x0, lx - influenceRadius - warpRadius);
          y0 = Math.min(y0, ly - influenceRadius - warpRadius);
          x1 = Math.max(x1, lx + influenceRadius + warpRadius);
          y1 = Math.max(y1, ly + influenceRadius + warpRadius);
        }
        this.pixelBounds = { x0, y0, x1, y1 };
        this.fieldRect = clampRect({
          x0: floor(x0 / cellSize) - 1,
          y0: floor(y0 / cellSize) - 1,
          x1: ceil(x1 / cellSize) + 1,
          y1: ceil(y1 / cellSize) + 1
        });
      }

      containsPoint(x, y) {
        const b = this.pixelBounds;
        return !!b && x >= b.x0 && x <= b.x1 && y >= b.y0 && y <= b.y1;
      }

      fieldAt(x, y) {
        let sum = 0;
        for (const lobe of this.sampleLobes) {
          const roughDx = x - lobe.x;
          const roughDy = y - lobe.y;
          if (roughDx * roughDx + roughDy * roughDy > lobe.influence2) continue;
          const warp = (stableNoise(floor(x * 0.025), floor(y * 0.025), this.seed + lobe.phase) - 0.5) * lobe.radius * 0.18;
          const dx = roughDx + lobe.phaseCos * warp;
          const dy = roughDy + lobe.phaseSin * warp;
          const d2 = dx * dx + dy * dy + 18;
          sum += lobe.radius2 / d2;
        }
        return sum;
      }
    }

    function stableNoise(x, y, seed) {
      return noise(x * 0.13 + seed * 0.0007, y * 0.13 - seed * 0.0003);
    }

    function nextPalette() {
      paletteIndex = (paletteIndex + 1) % PALETTES.length;
      pigmentIndex = 0;
      renderPaper();
      updateHint();
      markFullFieldDirty();
    }

    function resetAll() {
      if (pendingReset) {
        window.clearTimeout(pendingReset.timer);
        pendingReset = null;
      }
      pools = [];
      activePress = null;
      allocateFluidGrid();
      fluidEverRaked = false;
      lastPreviewRect = null;
      pigmentLayer.clear();
      renderPaper();
      markFullFieldDirty();
      settled = true;
    }

    function updateHint() {
      const el = document.getElementById('hint');
      const toolLabel = activeTool === 'rake' ? 'Prototype D fluid: drag comb/rake tines' : 'Prototype D fluid: hold/tap to add finite density';
      el.textContent = `${toolLabel} · pale lanes + dark ridges · Alt=fine rake · Shift/two-finger rake · P palette · R reset · ${PALETTES[paletteIndex].name}`;
      updateToolbarState();
    }

    function bindToolbar() {
      const toolbar = document.getElementById('topToolbar');
      if (!toolbar || toolbar.dataset.bound === 'true') return;
      toolbar.dataset.bound = 'true';
      toolbar.addEventListener('pointerdown', event => event.stopPropagation());
      toolbar.addEventListener('touchstart', event => event.stopPropagation(), { passive: false });
      document.getElementById('dropTool').addEventListener('click', event => {
        event.preventDefault();
        setActiveTool('drop');
      });
      document.getElementById('rakeTool').addEventListener('click', event => {
        event.preventDefault();
        setActiveTool('rake');
      });
      document.getElementById('paletteTool').addEventListener('click', event => {
        event.preventDefault();
        nextPalette();
      });
      document.getElementById('resetTool').addEventListener('click', event => {
        event.preventDefault();
        resetAll();
      });
      updateToolbarState();
    }

    function setActiveTool(tool) {
      activeTool = tool;
      finishRake();
      activePress = null;
      updateHint();
    }

    function updateToolbarState() {
      const drop = document.getElementById('dropTool');
      const rake = document.getElementById('rakeTool');
      if (!drop || !rake) return;
      drop.classList.toggle('active', activeTool === 'drop');
      rake.classList.toggle('active', activeTool === 'rake');
    }

    function keyPressed() {
      if (key === 'p' || key === 'P') nextPalette();
      if (key === 'r' || key === 'R' || keyCode === ESCAPE) resetAll();
    }

    function mousePressed() {
      if (touches && touches.length) return false;
      if (activeTool === 'rake' || keyIsDown(SHIFT)) {
        beginRake(mouseX, mouseY);
        return false;
      }
      startPress(mouseX, mouseY);
      return false;
    }

    function mouseReleased() {
      if (touches && touches.length) return false;
      if (finishRake()) return false;
      if (finishCornerActionHold()) return false;
      endPress();
      return false;
    }

    function mouseDragged() {
      if (touches && touches.length) return false;
      if (raking) {
        updateRake(mouseX, mouseY);
        return false;
      }
      handlePointerMove(mouseX, mouseY);
      return false;
    }

    function touchStarted() {
      if (touches && touches.length >= 2) {
        const p = touchCentroid();
        beginRake(p.x, p.y);
        return false;
      }
      if (activeTool === 'rake') {
        beginRake(mouseX, mouseY);
        return false;
      }
      const t = touches && touches.length ? touches[0] : { x: mouseX, y: mouseY };
      startPress(t.x, t.y);
      return false;
    }

    function touchMoved() {
      if (raking) {
        const p = touches && touches.length ? touchCentroid() : { x: mouseX, y: mouseY };
        updateRake(p.x, p.y);
        return false;
      }
      const t = touches && touches.length ? touches[0] : { x: mouseX, y: mouseY };
      handlePointerMove(t.x, t.y);
      return false;
    }

    function touchEnded() {
      if (raking) {
        finishRake();
        return false;
      }
      if (finishCornerActionHold()) return false;
      endPress();
      return false;
    }

    function windowResized() {
      const previousGrid = captureFluidGrid();
      resizeCanvas(windowWidth, windowHeight);
      chooseInitialQuality();
      rebuildSurfaces();
      restoreFluidGrid(previousGrid);
      markFullFieldDirty();
    }

    document.addEventListener('gesturestart', event => event.preventDefault());
    document.addEventListener('touchmove', event => event.preventDefault(), { passive: false });
  </script>
</body>
